<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ch 7: Schmid's Law // 3D Slip System Engine</title>
    <style>
        :root { --bg: #050505; --cyan: #00ffff; --magenta: #ff00ff; --yellow: #ffff00; --red: #ff3333; --green: #00ff00; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; display: flex; font-family: 'Segoe UI', 'Arial Black', sans-serif; background: var(--bg); color: var(--cyan); overflow: hidden; font-weight: 900; }
        
        #sidebar { width: 360px; background: rgba(0,0,0,0.95); border-right: 2px solid var(--magenta); padding: 15px; display: flex; flex-direction: column; z-index: 100; overflow-y: auto; box-shadow: 10px 0 30px rgba(0,0,0,0.8); }
        h1 { font-size: 0.9rem; color: var(--magenta); text-transform: uppercase; margin: 0 0 10px 0; border-bottom: 1px solid var(--magenta); padding-bottom: 5px; letter-spacing: 1px; }
        
        .control-block { background: #0a0a0a; border: 1px solid #333; padding: 10px; margin-bottom: 12px; border-radius: 4px; }
        .block-header { font-size: 0.75rem; color: #fff; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        
        .vector-inputs { display: flex; gap: 5px; justify-content: space-between; }
        .vector-inputs select { background: #111; color: var(--cyan); border: 1px solid var(--cyan); padding: 5px; width: 30%; font-weight: bold; text-align: center; cursor: pointer; }
        
        .theme-t { border-color: var(--red); }
        .theme-t .block-header span { color: var(--red); }
        .theme-t select { color: var(--red); border-color: var(--red); }

        .theme-n { border-color: var(--yellow); }
        .theme-n .block-header span { color: var(--yellow); }
        .theme-n select { color: var(--yellow); border-color: var(--yellow); }

        .theme-s { border-color: var(--cyan); }
        .theme-s .block-header span { color: var(--cyan); }

        .slider-group { margin-top: 10px; }
        .slider-group label { display: flex; justify-content: space-between; font-size: 0.7rem; color: #fff; margin-bottom: 4px; }
        input[type=range] { width: 100%; accent-color: var(--magenta); cursor: pointer; }

        .hotkey-hint { font-size: 0.7rem; color: #888; text-align: center; margin-bottom: 10px; font-weight: normal; background: #111; padding: 8px; border-radius: 4px; border: 1px solid #333; }
        .hotkey-hint strong { color: var(--cyan); }

        #readout-panel { margin-top: auto; border: 2px solid var(--magenta); padding: 12px; background: rgba(255, 0, 255, 0.05); }
        .eq { font-size: 1.1rem; color: #fff; text-align: center; margin-bottom: 10px; font-family: 'Times New Roman', serif; font-style: italic; font-weight: normal; }
        .stat { display: flex; justify-content: space-between; font-size: 0.9rem; margin: 4px 0; }
        .val { color: #fff; }
        
        #validation-msg { font-size: 0.85rem; text-align: center; margin-top: 10px; padding: 5px; border-radius: 3px; display: none; }
        .valid { background: rgba(0,255,0,0.2); color: var(--green); border: 1px solid var(--green); }
        .invalid { background: rgba(255,0,0,0.2); color: var(--red); border: 1px solid var(--red); text-shadow: 0 0 5px red; }

        #stage { flex: 1; position: relative; background: #000; }
        canvas { display: block; width: 100%; height: 100%; outline: none; }
    </style>
</head>
<body>

<div id="sidebar">
    <h1>Crystallographic Vectors</h1>

    <div class="control-block theme-t">
        <div class="block-header"><span>Tensile Axis [u v w]</span> <span>Force Direction</span></div>
        <div class="vector-inputs" id="inputs-t"></div>
    </div>

    <div class="control-block theme-n">
        <div class="block-header"><span>Slip Plane (h k l)</span> <span>Plane Normal</span></div>
        <div class="vector-inputs" id="inputs-n"></div>
    </div>

    <div class="control-block theme-s">
        <div class="block-header"><span>Slip Direction [u v w]</span> <span>Dislocation Path</span></div>
        <div class="vector-inputs" id="inputs-s"></div>
    </div>

    <div class="control-block">
        <div class="slider-group">
            <label><span>Applied Stress (&sigma;)</span><span id="txt-stress">50 MPa</span></label>
            <input type="range" id="sl-stress" min="10" max="200" value="50">
        </div>
    </div>

    <div class="hotkey-hint">CAMERA HOTKEYS: <strong>NUMPAD 1</strong> (Front) | <strong>3</strong> (Side) | <strong>7</strong> (Top)</div>

    <div id="readout-panel">
        <div class="eq">&tau;<sub>R</sub> = &sigma; cos(&phi;) cos(&lambda;)</div>
        <div class="stat" style="color: var(--yellow)"><span>Normal Angle (&phi;):</span><span class="val" id="out-phi">--&deg;</span></div>
        <div class="stat" style="color: var(--cyan)"><span>Slip Angle (&lambda;):</span><span class="val" id="out-lam">--&deg;</span></div>
        <div class="stat" style="color: var(--magenta); margin-top: 8px; padding-top: 8px; border-top: 1px solid #555;">
            <span>Schmid Factor (m):</span><span class="val" id="out-m">--</span>
        </div>
        <div class="stat" style="color: var(--green); font-size: 1.1rem; margin-top: 8px;">
            <span>Resolved Shear (&tau;<sub>R</sub>):</span><span class="val" id="out-tau">-- MPa</span>
        </div>
        <div id="validation-msg"></div>
    </div>
</div>

<div id="stage"></div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- UI Generation ---
    function generateSelects(containerId, defaults) {
        const container = document.getElementById(containerId);
        defaults.forEach((def, idx) => {
            let select = document.createElement('select');
            select.id = `${containerId}-${idx}`;
            for(let i = -2; i <= 2; i++) {
                let opt = document.createElement('option');
                opt.value = i;
                opt.innerText = i < 0 ? `-${Math.abs(i)}` : i;
                if(i === def) opt.selected = true;
                select.appendChild(opt);
            }
            select.addEventListener('change', updateSimulation);
            container.appendChild(select);
        });
    }

    // Default: Tensile=[0,0,1], Plane=(1,1,1), Slip=[1,-1,0]
    generateSelects('inputs-t', [0, 0, 1]);
    generateSelects('inputs-n', [1, 1, 1]);
    generateSelects('inputs-s', [1, -1, 0]);

    document.getElementById('sl-stress').addEventListener('input', (e) => {
        document.getElementById('txt-stress').innerText = e.target.value + ' MPa';
        updateSimulation();
    });

    // --- Three.js Setup ---
    const container = document.getElementById('stage');
    const scene = new THREE.Scene();
    
    // Core Reference Center for the entire system
    const center = new THREE.Vector3(0.5, 0.5, 0.5);
    
    const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.set(4, 3, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.copy(center); // Focus strictly on the center of the unit cell

    // Lighting
    scene.add(new THREE.AmbientLight(0xffffff, 0.4));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1);
    dirLight.position.set(5, 10, 7);
    scene.add(dirLight);

    // Group for dynamic elements
    const crystalGroup = new THREE.Group();
    scene.add(crystalGroup);

    // --- Helper Functions ---

    // Coordinate Mapper: User (X:out, Y:right, Z:up) -> ThreeJS (X:right, Y:up, Z:out)
    function toThree(u, v, w) {
        return new THREE.Vector3(v, w, u);
    }

    // 3D Text Sprite Generator
    function createTextSprite(message, color, size = 64) {
        const canvas = document.createElement('canvas');
        const context = canvas.getContext('2d');
        canvas.width = 256;
        canvas.height = 128;
        context.font = `bold ${size}px Arial Black`;
        context.fillStyle = color;
        context.textAlign = "center";
        context.fillText(message, 128, 80);

        const texture = new THREE.CanvasTexture(canvas);
        const spriteMaterial = new THREE.SpriteMaterial({ map: texture, depthTest: false });
        const sprite = new THREE.Sprite(spriteMaterial);
        sprite.scale.set(1.5, 0.75, 1);
        return sprite;
    }

    function createArrow(dir, origin, color, length = 1.5) {
        return new THREE.ArrowHelper(dir, origin, length, color, 0.2, 0.1);
    }

    function createAngleArc(v1, v2, origin, color, radius = 0.5) {
        const points = [];
        const segments = 20;
        const angle = v1.angleTo(v2);
        
        const axis = new THREE.Vector3().crossVectors(v1, v2).normalize();
        if(axis.lengthSq() < 0.001) return new THREE.Group(); 

        for (let i = 0; i <= segments; i++) {
            const t = i / segments;
            const currentAngle = angle * t;
            const pt = v1.clone().applyAxisAngle(axis, currentAngle).multiplyScalar(radius);
            points.push(pt);
        }

        const geo = new THREE.BufferGeometry().setFromPoints(points);
        const mat = new THREE.LineBasicMaterial({ color: color, linewidth: 2, depthTest: false });
        const arcMesh = new THREE.Line(geo, mat);
        arcMesh.position.copy(origin);
        return arcMesh;
    }

    // --- Static Crystal Frame ---
    // Box is placed from 0,0,0 to 1,1,1
    const boxGeo = new THREE.BoxGeometry(1, 1, 1);
    boxGeo.translate(0.5, 0.5, 0.5); 
    const boxEdges = new THREE.EdgesGeometry(boxGeo);
    const boxMat = new THREE.LineBasicMaterial({ color: 0xff00ff, transparent: true, opacity: 0.3 });
    const unitCell = new THREE.LineSegments(boxEdges, boxMat);
    scene.add(unitCell);

    // Custom Axes (User coordinates) radiating from (0,0,0)
    const axisMat = new THREE.LineBasicMaterial({ color: 0x555555 });
    
    // User X (Out / Three Z)
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,1.2)]), axisMat));
    let lblX = createTextSprite("x", "#ff00ff", 40); lblX.position.set(0, 0, 1.3); scene.add(lblX);

    // User Y (Right / Three X)
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(1.2,0,0)]), axisMat));
    let lblY = createTextSprite("y", "#ff00ff", 40); lblY.position.set(1.3, 0, 0); scene.add(lblY);

    // User Z (Up / Three Y)
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,1.2,0)]), axisMat));
    let lblZ = createTextSprite("z", "#ff00ff", 40); lblZ.position.set(0, 1.3, 0); scene.add(lblZ);


    function updateSimulation() {
        while(crystalGroup.children.length > 0){ 
            crystalGroup.remove(crystalGroup.children[0]); 
        }

        const rawT = [
            parseInt(document.getElementById('inputs-t-0').value),
            parseInt(document.getElementById('inputs-t-1').value),
            parseInt(document.getElementById('inputs-t-2').value)
        ];
        const rawN = [
            parseInt(document.getElementById('inputs-n-0').value),
            parseInt(document.getElementById('inputs-n-1').value),
            parseInt(document.getElementById('inputs-n-2').value)
        ];
        const rawS = [
            parseInt(document.getElementById('inputs-s-0').value),
            parseInt(document.getElementById('inputs-s-1').value),
            parseInt(document.getElementById('inputs-s-2').value)
        ];

        const sigma = parseFloat(document.getElementById('sl-stress').value);

        let T = toThree(...rawT);
        let N = toThree(...rawN);
        let S = toThree(...rawS);

        if(T.lengthSq() === 0) T = toThree(0,0,1);
        if(N.lengthSq() === 0) N = toThree(0,1,0);
        if(S.lengthSq() === 0) S = toThree(1,0,0);

        // Validation Math
        const dotProduct = (rawN[0]*rawS[0]) + (rawN[1]*rawS[1]) + (rawN[2]*rawS[2]);
        let isValid = (dotProduct === 0);
        
        const msg = document.getElementById('validation-msg');
        msg.style.display = 'block';
        if(isValid) {
            msg.className = 'valid';
            msg.innerHTML = `VALID SLIP SYSTEM (N &middot; S = 0)`;
        } else {
            msg.className = 'invalid';
            msg.innerHTML = `INVALID SYSTEM: S does not lie on Plane! (N &middot; S = ${dotProduct})`;
        }

        T.normalize();
        N.normalize();
        S.normalize();

        let cosPhi = Math.abs(T.dot(N));
        let cosLam = Math.abs(T.dot(S));
        let phiDeg = Math.acos(cosPhi) * 180 / Math.PI;
        let lamDeg = Math.acos(cosLam) * 180 / Math.PI;

        let schmidFactor = cosPhi * cosLam;
        let tauR = sigma * schmidFactor;

        if(!isValid) tauR = 0;
        if(phiDeg > 89.9) { phiDeg = 90; cosPhi = 0; schmidFactor = 0; tauR = 0; }
        if(lamDeg > 89.9) { lamDeg = 90; cosLam = 0; schmidFactor = 0; tauR = 0; }

        document.getElementById('out-phi').innerText = phiDeg.toFixed(1) + '°';
        document.getElementById('out-lam').innerText = lamDeg.toFixed(1) + '°';
        document.getElementById('out-m').innerText = schmidFactor.toFixed(3);
        document.getElementById('out-tau').innerText = tauR.toFixed(1) + ' MPa';

        // --- Generate 3D Geometry ---
        const cylRadius = 0.8;
        
        // 1. Tensile Cylinder (Centered on Unit Cell)
        const cylGeo = new THREE.CylinderGeometry(cylRadius, cylRadius, 3.8, 32);
        const cylMat = new THREE.MeshPhysicalMaterial({ color: 0x444444, transparent: true, opacity: 0.15, side: THREE.DoubleSide, depthWrite: false });
        const cylinderMesh = new THREE.Mesh(cylGeo, cylMat);
        cylinderMesh.position.copy(center);
        cylinderMesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), T);
        crystalGroup.add(cylinderMesh);
        
        // 2. Slip Plane (Perfectly Clamped to Cylinder Edges via Scaling Math)
        const planeColor = isValid ? 0x00ffff : 0xff0000;
        const pGeo = new THREE.CircleGeometry(cylRadius, 64);
        const pMat = new THREE.MeshBasicMaterial({ color: planeColor, transparent: true, opacity: 0.3, side: THREE.DoubleSide, depthWrite: false });
        const planeMesh = new THREE.Mesh(pGeo, pMat);
        planeMesh.position.copy(center);
        
        // Construct Basis to stretch plane into exact ellipse
        let U = new THREE.Vector3().crossVectors(T, N);
        if(U.lengthSq() < 0.0001) {
            planeMesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,0,1), N);
        } else {
            U.normalize();
            let V = new THREE.Vector3().crossVectors(N, U).normalize();
            let mat = new THREE.Matrix4().makeBasis(U, V, N);
            planeMesh.quaternion.setFromRotationMatrix(mat);
            
            let stretch = 1.0 / Math.max(0.001, cosPhi);
            stretch = Math.min(stretch, 4.0); // Safe Cap
            planeMesh.scale.set(1.0, stretch, 1.0);
        }
        crystalGroup.add(planeMesh);

        // 3. Arrows & Labels (Emanating from Center)
        const tLen = 2.0;
        const tArrow = new THREE.ArrowHelper(T, center, tLen, 0xff3333, 0.2, 0.1);
        const tArrowNeg = new THREE.ArrowHelper(T.clone().negate(), center, tLen, 0xff3333, 0.2, 0.1);
        crystalGroup.add(tArrow, tArrowNeg);
        let lblT = createTextSprite("T", "#ff3333"); lblT.position.copy(T).multiplyScalar(tLen + 0.2).add(center); crystalGroup.add(lblT);

        const nLen = 1.4;
        const nArrow = createArrow(N, center, 0xffff00, nLen);
        crystalGroup.add(nArrow);
        let lblN = createTextSprite("N", "#ffff00"); lblN.position.copy(N).multiplyScalar(nLen + 0.2).add(center); crystalGroup.add(lblN);

        const sLen = 1.4;
        const sArrow = createArrow(S, center, 0x00ffff, sLen);
        crystalGroup.add(sArrow);
        let lblS = createTextSprite("S", "#00ffff"); lblS.position.copy(S).multiplyScalar(sLen + 0.2).add(center); crystalGroup.add(lblS);

        // 4. Angle Arcs
        if(phiDeg > 1 && phiDeg < 89) {
            const arcPhi = createAngleArc(T, N, center, 0xffff00, 0.6);
            crystalGroup.add(arcPhi);
            let lblPhi = createTextSprite("φ", "#ffff00", 48); 
            lblPhi.position.copy(T).lerp(N, 0.5).normalize().multiplyScalar(0.7).add(center);
            crystalGroup.add(lblPhi);
        }

        if(lamDeg > 1 && lamDeg < 89) {
            const arcLam = createAngleArc(T, S, center, 0x00ffff, 0.5);
            crystalGroup.add(arcLam);
            let lblLam = createTextSprite("λ", "#00ffff", 48); 
            lblLam.position.copy(T).lerp(S, 0.5).normalize().multiplyScalar(0.6).add(center);
            crystalGroup.add(lblLam);
        }
    }

    // --- Camera Hotkeys (Fixed Distances) ---
    window.addEventListener('keydown', (e) => {
        const dist = 6.0; // Pushed back to keep cylinder in view

        // User X is Three Z (Front = looking down -X)
        if (e.key === '1') {
            camera.position.set(center.x, center.y, center.z + dist); 
        } 
        // User Y is Three X (Right/Side = looking down -Y)
        else if (e.key === '3') {
            camera.position.set(center.x + dist, center.y, center.z);
        } 
        // User Z is Three Y (Top = looking down -Z)
        else if (e.key === '7') {
            camera.position.set(center.x, center.y + dist, center.z);
        }
        
        controls.target.copy(center);
    });

    window.addEventListener('resize', () => {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    });

    // Animation Loop
    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }

    updateSimulation();
    animate();
</script>
</body>
</html>

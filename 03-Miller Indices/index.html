<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIE 201 - Advanced Miller Indices</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; background-color: #050508; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; box-sizing: border-box; }
        #header { pointer-events: auto; }
        h1 { margin: 0; font-size: 0.9rem; letter-spacing: 2px; text-transform: uppercase; color: #888; }
        #notation { font-size: 2rem; font-weight: 800; margin: 5px 0; }
        .bar { text-decoration: overline; }
        
        #calc-box { background: rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 12px; width: 280px; backdrop-filter: blur(10px); }
        table { width: 100%; border-collapse: collapse; font-size: 0.7rem; }
        td { padding: 4px 0; border-bottom: 1px solid #222; }
        .col-val { text-align: right; font-family: monospace; color: #00ffff; }

        #controls { pointer-events: auto; width: 260px; align-self: flex-end; background: rgba(15,15,25,0.9); border: 1px solid #333; border-radius: 12px; padding: 15px; }
        .toggle-group { display: flex; background: #000; border-radius: 6px; padding: 3px; margin-bottom: 10px; }
        .t-btn { flex: 1; border: none; background: none; color: #555; padding: 6px; cursor: pointer; font-size: 0.6rem; font-weight: bold; border-radius: 4px; }
        .t-btn.active { background: #222; color: #fff; border: 1px solid #444; }
        
        .slider-row { margin-bottom: 8px; }
        input[type=range] { width: 100%; accent-color: #00ffff; }
        .action-btn { width: 100%; padding: 8px; margin-top: 5px; background: #111; border: 1px solid #333; color: #aaa; cursor: pointer; font-size: 0.7rem; border-radius: 4px; }
        .action-btn.active { border-color: #ffaa00; color: #ffaa00; }
    </style>
</head>
<body>
    <div id="ui-layer">
        <div id="header">
            <div class="toggle-group" style="width: 200px;">
                <button id="sys-cubic" class="t-btn active" onclick="setSystem('cubic')">CUBIC</button>
                <button id="sys-hex" class="t-btn" onclick="setSystem('hex')">HEXAGONAL</button>
            </div>
            <div id="notation">(1 1 1)</div>
            <div id="calc-box">
                <table><tbody id="calc-body"></tbody></table>
            </div>
        </div>
        <div id="controls">
            <div class="toggle-group">
                <button id="m-plane" class="t-btn active" onclick="setMode('plane')">PLANE</button>
                <button id="m-dir" class="t-btn" onclick="setMode('dir')">DIRECTION</button>
            </div>
            <div class="slider-row"><input type="range" id="in-h" min="-3" max="3" step="1" value="1" oninput="update()"></div>
            <div class="slider-row"><input type="range" id="in-k" min="-3" max="3" step="1" value="1" oninput="update()"></div>
            <div class="slider-row"><input type="range" id="in-l" min="-3" max="3" step="1" value="1" oninput="update()"></div>
            
            <button id="atom-btn" class="action-btn" onclick="toggleAtoms()">ATOMIC OVERLAY: OFF</button>
            <button id="draw-btn" class="action-btn" style="border-color:#5522ff; color:#7755ff" onclick="toggleDrawMode()">DRAW MODE: OFF</button>
        </div>
    </div>

    <script>
        let scene, camera, renderer, controls, vizGroup, gridGroup, system='cubic', mode='plane';
        let h=1, k=1, l=1, atomsOn=false, drawMode=false;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
            camera.position.set(3, 3, 5);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const pl = new THREE.PointLight(0xffffff, 0.8); pl.position.set(5, 10, 5); scene.add(pl);

            vizGroup = new THREE.Group(); scene.add(vizGroup);
            gridGroup = new THREE.Group(); scene.add(gridGroup);
            
            buildGrids();
            update();
        }

        function buildGrids() {
            while(gridGroup.children.length > 0) gridGroup.remove(gridGroup.children[0]);
            
            if(system === 'cubic') {
                const geo = new THREE.EdgesGeometry(new THREE.BoxGeometry(1,1,1));
                const line = new THREE.LineSegments(geo, new THREE.LineBasicMaterial({color: 0x444444}));
                line.position.set(0.5, 0.5, 0.5);
                gridGroup.add(line);
            } else {
                // Build Hexagonal Prism
                const hexPoints = [];
                for(let i=0; i<=6; i++) {
                    let ang = (i * 60) * Math.PI / 180;
                    hexPoints.push(new THREE.Vector3(Math.cos(ang), 0, Math.sin(ang)));
                }
                const bottom = new THREE.Line(new THREE.BufferGeometry().setFromPoints(hexPoints), new THREE.LineBasicMaterial({color: 0x444444}));
                const top = bottom.clone(); top.position.y = 1.6; // c/a ratio roughly 1.633
                gridGroup.add(bottom); gridGroup.add(top);
                // Vertical struts
                for(let i=0; i<6; i++) {
                    let ang = (i * 60) * Math.PI / 180;
                    const g = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(Math.cos(ang),0,Math.sin(ang)), new THREE.Vector3(Math.cos(ang),1.6,Math.sin(ang))]);
                    gridGroup.add(new THREE.Line(g, new THREE.LineBasicMaterial({color: 0x333333})));
                }
                // The Primitive Rhombus (Faint Purple)
                const rhomPoints = [
                    new THREE.Vector3(0,0,0), new THREE.Vector3(1,0,0), 
                    new THREE.Vector3(1.5,0,0.866), new THREE.Vector3(0.5,0,0.866), new THREE.Vector3(0,0,0)
                ];
                const rhom = new THREE.Line(new THREE.BufferGeometry().setFromPoints(rhomPoints), new THREE.LineBasicMaterial({color: 0x8844ff, transparent:true, opacity:0.5}));
                gridGroup.add(rhom);
            }
        }

        window.setSystem = (s) => { 
            system = s; 
            document.getElementById('sys-cubic').className = s==='cubic'?'t-btn active':'t-btn';
            document.getElementById('sys-hex').className = s==='hex'?'t-btn active':'t-btn';
            buildGrids(); update(); 
        };
        
        window.setMode = (m) => { 
            mode = m; 
            document.getElementById('m-plane').className = m==='plane'?'t-btn active':'t-btn';
            document.getElementById('m-dir').className = m==='dir'?'t-btn active':'t-btn';
            update(); 
        };

        window.update = () => {
            h=parseInt(document.getElementById('in-h').value);
            k=parseInt(document.getElementById('in-k').value);
            l=parseInt(document.getElementById('in-l').value);
            
            const format = (n) => n < 0 ? `<span class="bar">${Math.abs(n)}</span>` : n;
            const tbody = document.getElementById('calc-body');
            
            if(system === 'cubic') {
                document.getElementById('notation').innerHTML = mode==='plane'?`(${format(h)} ${format(k)} ${format(l)})`:`[${format(h)} ${format(k)} ${format(l)}]`;
                tbody.innerHTML = `<tr><td>Intercepts</td><td class="col-val">${h?`1/${h}`:'∞'} ${k?`1/${k}`:'∞'} ${l?`1/${l}`:'∞'}</td></tr>`;
            } else {
                let i = -(h + k);
                document.getElementById('notation').innerHTML = mode==='plane'?`(${format(h)} ${format(k)} ${format(i)} ${format(l)})`:`[${format(h)} ${format(k)} ${format(i)} ${format(l)}]`;
                tbody.innerHTML = `<tr><td>Miller (hkl)</td><td class="col-val">${h} ${k} ${l}</td></tr>
                                   <tr><td>Bravais (hkil)</td><td class="col-val">${h} ${k} ${i} ${l}</td></tr>`;
            }
            // Visualization drawing logic would go here...
        }

        function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIE 201 - Miller Indices Viewer</title>
    <script src="https://unpkg.com/three@0.157.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.157.0/examples/jsm/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; background-color: #050508; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #ui-header { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        h1 { margin: 0; font-size: 1.5rem; letter-spacing: 2px; text-transform: uppercase; color: #fff; }
        
        #control-panel { 
            position: absolute; top: 20px; right: 20px; 
            width: 280px; background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; backdrop-filter: blur(10px);
            padding: 20px; z-index: 20;
        }

        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.7rem; text-transform: uppercase; opacity: 0.6; margin-bottom: 5px; }
        
        .mode-toggle { display: flex; gap: 5px; margin-bottom: 20px; }
        .mode-btn { 
            flex: 1; height: 35px; background: rgba(0,0,0,0.5); border: 1px solid #444; 
            color: white; cursor: pointer; font-size: 0.7rem; font-weight: bold; border-radius: 4px;
        }
        .mode-btn.active { border-color: #00ffff; box-shadow: 0 0 10px #00ffff; color: #00ffff; }

        input[type=range] { width: 100%; accent-color: #ff00ff; cursor: pointer; }
        .val-display { float: right; font-weight: bold; color: #ff00ff; }
        
        #notation { font-size: 1.8rem; text-align: center; margin: 15px 0; font-weight: bold; letter-spacing: 5px; }
        .bar { text-decoration: overline; }

        #legend { font-size: 0.7rem; opacity: 0.8; line-height: 1.5; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
        .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; }
    </style>
</head>
<body>

    <div id="ui-header">
        <h1>Miller Indices</h1>
        <div id="notation">(1 1 1)</div>
    </div>

    <div id="control-panel">
        <div class="mode-toggle">
            <button id="btn-plane" class="mode-btn active" onclick="setMode('plane')">PLANE (hkl)</button>
            <button id="btn-dir" class="mode-btn" onclick="setMode('dir')">DIRECTION [uvw]</button>
        </div>

        <div class="input-group">
            <label>Index H / U <span class="val-display" id="val-h">1</span></label>
            <input type="range" id="input-h" min="-4" max="4" step="1" value="1" oninput="updateIndices()">
        </div>
        <div class="input-group">
            <label>Index K / V <span class="val-display" id="val-k">1</span></label>
            <input type="range" id="input-k" min="-4" max="4" step="1" value="1" oninput="updateIndices()">
        </div>
        <div class="input-group">
            <label>Index L / W <span class="val-display" id="val-l">1</span></label>
            <input type="range" id="input-l" min="-4" max="4" step="1" value="1" oninput="updateIndices()">
        </div>

        <div id="legend">
            <div><span class="dot" style="background: #444;"></span> (0,0,0) Default Origin</div>
            <div><span class="dot" style="background: #ffaa00; box-shadow: 0 0 5px #ffaa00;"></span> Active Origin</div>
            <div><span class="dot" style="background: #ff00ff;"></span> Plane (hkl)</div>
            <div><span class="dot" style="background: #00ffff;"></span> Direction [uvw]</div>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        // Using module script to handle OrbitControls correctly in 2026
        import { OrbitControls } from 'https://unpkg.com/three@0.157.0/examples/jsm/controls/OrbitControls.js';

        let scene, camera, renderer, controls;
        let mode = 'plane';
        let h = 1, k = 1, l = 1;
        let visualGroup, originMarker;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050508);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(3, 2, 3);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // Lights
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const pLight = new THREE.PointLight(0xffffff, 1);
            pLight.position.set(5, 5, 5);
            scene.add(pLight);

            // Unit Cube Wireframe
            const geometry = new THREE.BoxGeometry(1, 1, 1);
            const edges = new THREE.EdgesGeometry(geometry);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x666666 }));
            line.position.set(0.5, 0.5, 0.5);
            scene.add(line);

            // X Y Z Labels
            createLabel("X", 1.2, 0, 0, "#ff4444");
            createLabel("Y", 0, 1.2, 0, "#44ff44");
            createLabel("Z", 0, 0, 1.2, "#4444ff");

            // Fixed Origin (0,0,0)
            const oBase = new THREE.Mesh(new THREE.SphereGeometry(0.02), new THREE.MeshBasicMaterial({color: 0x444444}));
            scene.add(oBase);

            // Active Origin
            originMarker = new THREE.Mesh(
                new THREE.SphereGeometry(0.04), 
                new THREE.MeshBasicMaterial({ color: 0xffaa00 })
            );
            scene.add(originMarker);

            visualGroup = new THREE.Group();
            scene.add(visualGroup);

            // Tick Marks (1/4 intervals)
            addTickMarks();

            // Setup Globals for UI
            window.setMode = (m) => {
                mode = m;
                document.getElementById('btn-plane').classList.toggle('active', mode === 'plane');
                document.getElementById('btn-dir').classList.toggle('active', mode === 'dir');
                updateIndices();
            };

            window.updateIndices = () => {
                h = parseInt(document.getElementById('input-h').value);
                k = parseInt(document.getElementById('input-k').value);
                l = parseInt(document.getElementById('input-l').value);
                document.getElementById('val-h').innerText = h;
                document.getElementById('val-k').innerText = k;
                document.getElementById('val-l').innerText = l;
                updateNotation();
                renderViz();
            };

            updateIndices();
        }

        function addTickMarks() {
            const mat = new THREE.LineBasicMaterial({ color: 0x333333 });
            for (let i = 0.25; i < 1; i += 0.25) {
                // Faint grid hints on axes
                createTick(i, 0, 0); createTick(0, i, 0); createTick(0, 0, i);
            }
        }

        function createTick(x, y, z) {
            const g = new THREE.SphereGeometry(0.01);
            const m = new THREE.Mesh(g, new THREE.MeshBasicMaterial({color: 0x333333}));
            m.position.set(x, y, z);
            scene.add(m);
        }

        function createLabel(text, x, y, z, color) {
            // Simple visualization for axes labels
            const g = new THREE.BoxGeometry(0.05, 0.05, 0.05);
            const m = new THREE.Mesh(g, new THREE.MeshBasicMaterial({color: color}));
            m.position.set(x, y, z);
            scene.add(m);
        }

        function updateNotation() {
            const wrap = (val) => val < 0 ? `<span class="bar">${Math.abs(val)}</span>` : val;
            const open = mode === 'plane' ? '(' : '[';
            const close = mode === 'plane' ? ')' : ']';
            document.getElementById('notation').innerHTML = `${open}${wrap(h)} ${wrap(k)} ${wrap(l)}${close}`;
        }

        function renderViz() {
            while(visualGroup.children.length > 0) visualGroup.remove(visualGroup.children[0]);

            let ox = h < 0 ? 1 : 0;
            let oy = k < 0 ? 1 : 0;
            let oz = l < 0 ? 1 : 0;
            originMarker.position.set(ox, oy, oz);

            if (mode === 'plane') {
                drawPlane(ox, oy, oz);
            } else {
                drawDirection(ox, oy, oz);
            }
        }

        function drawDirection(ox, oy, oz) {
            if (h === 0 && k === 0 && l === 0) return;
            const dir = new THREE.Vector3(h, k, l).normalize();
            const arrow = new THREE.ArrowHelper(dir, new THREE.Vector3(ox, oy, oz), 1, 0x00ffff, 0.2, 0.1);
            visualGroup.add(arrow);
        }

        function drawPlane(ox, oy, oz) {
            if (h === 0 && k === 0 && l === 0) return;

            const geometry = new THREE.BufferGeometry();
            // Basic Intercept logic for the triangle
            // Robust plane clipping is omitted for clarity, showing the fundamental triangle
            const v1 = new THREE.Vector3(ox + (h !== 0 ? 1/h : 100), oy, oz);
            const v2 = new THREE.Vector3(ox, oy + (k !== 0 ? 1/k : 100), oz);
            const v3 = new THREE.Vector3(ox, oy, oz + (l !== 0 ? 1/l : 100));

            const vertices = new Float32Array([
                v1.x, v1.y, v1.z,
                v2.x, v2.y, v2.z,
                v3.x, v3.y, v3.z
            ]);

            geometry.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
            const mesh = new THREE.Mesh(geometry, new THREE.MeshBasicMaterial({
                color: 0xff00ff, side: THREE.DoubleSide, transparent: true, opacity: 0.5
            }));
            
            const wireframe = new THREE.LineSegments(
                new THREE.EdgesGeometry(geometry),
                new THREE.LineBasicMaterial({ color: 0xff00ff, linewidth: 2 })
            );
            mesh.add(wireframe);
            visualGroup.add(mesh);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystallography Master: Hybrid Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #050508; color: white; font-family: 'Segoe UI', sans-serif; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; box-sizing: border-box; }
        #header, #controls, #quiz-panel { pointer-events: auto; background: rgba(10, 10, 20, 0.9); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 15px; backdrop-filter: blur(10px); }
        
        #header { max-width: 340px; }
        #notation { font-size: 2.2rem; font-weight: 800; color: #fff; margin: 10px 0; }
        .bar { text-decoration: overline; }
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        td { padding: 5px 0; border-bottom: 1px solid #222; }
        .col-val { text-align: right; font-family: monospace; color: #00ffff; font-weight: bold; }
        
        #controls { width: 300px; align-self: flex-end; }
        .btn-group { display: flex; gap: 5px; margin-bottom: 12px; }
        .t-btn { flex: 1; padding: 8px; border: 1px solid #444; background: #000; color: #666; cursor: pointer; font-size: 0.65rem; font-weight: bold; border-radius: 4px; transition: 0.2s; }
        .t-btn.active { background: #1a1a2e; color: #00ffff; border-color: #00ffff; }
        
        .slider-row { margin-bottom: 12px; }
        .slider-label { font-size: 0.7rem; color: #aaa; margin-bottom: 4px; display: flex; justify-content: space-between; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #00ffff; }
        
        .action-btn { width: 100%; padding: 10px; margin-top: 8px; background: #111; border: 1px solid #333; color: #fff; border-radius: 6px; cursor: pointer; font-size: 0.75rem; font-weight: bold; }
        .action-btn.on { border-color: #ffaa00; color: #ffaa00; }
        #draw-btn.quiz-on { border-color: #a200ff; color: #a200ff; box-shadow: 0 0 15px rgba(162, 0, 255, 0.3); background: #2a0044; }
        
        .axis-label { position: absolute; color: white; font-weight: bold; font-size: 14px; text-shadow: 1px 1px 2px black; pointer-events: none; z-index: 5; transform: translate(-50%, -50%); }
        .x-lbl { color: #ff5555; } .y-lbl { color: #55ff55; } .z-lbl { color: #5555ff; }

        #quiz-panel { display: none; width: 300px; align-self: flex-end; margin-top: 10px; border-color: #a200ff; }
        .quiz-title { color: #a200ff; font-weight: bold; font-size: 0.85rem; margin-bottom: 10px; text-align: center; }
        .input-row { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .input-group { display: flex; flex-direction: column; align-items: center; width: 30%; }
        .input-group label { font-size: 0.65rem; color: #aaa; margin-bottom: 4px; }
        select { width: 100%; padding: 5px; background: #222; color: white; border: 1px solid #555; border-radius: 4px; text-align: center; font-size: 0.8rem; }
        #quiz-feedback { font-size: 0.75rem; text-align: center; margin-top: 10px; font-weight: bold; }
        .status-error { color: #ff5555; } .status-success { color: #55ff55; }
        #draw-instructions { display: none; font-size: 0.8rem; color: #00ffff; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="labels-container"></div>

    <div id="ui-layer">
        <div id="header">
            <div class="btn-group">
                <button id="sys-cubic" class="t-btn active" onclick="setSystem('cubic')">CUBIC</button>
                <button id="sys-hex" class="t-btn" onclick="setSystem('hex')">HEXAGONAL</button>
            </div>
            <div id="notation">(1 1 0)</div>
            <div id="calc-box"><table><tbody id="calc-body"></tbody></table></div>
        </div>
        
        <div style="display:flex; flex-direction: column; align-items: flex-end;">
            <div id="controls">
                <div class="btn-group">
                    <button id="m-plane" class="t-btn active" onclick="setMode('plane')">PLANE</button>
                    <button id="m-dir" class="t-btn" onclick="setMode('dir')">DIRECTION</button>
                </div>
                
                <div id="sliders">
                    <div class="slider-row"><div class="slider-label">h / u <span id="label-h">1</span></div><input type="range" id="in-h" min="-4" max="4" value="1" oninput="updateState()"></div>
                    <div class="slider-row"><div class="slider-label">k / v <span id="label-k">1</span></div><input type="range" id="in-k" min="-4" max="4" value="1" oninput="updateState()"></div>
                    <div class="slider-row"><div class="slider-label">l / w <span id="label-l">0</span></div><input type="range" id="in-l" min="-4" max="4" value="0" oninput="updateState()"></div>
                </div>

                <div id="cubic-only">
                    <div class="btn-group">
                        <button id="at-none" class="t-btn active" onclick="setAtoms('none')">NO ATOMS</button>
                        <button id="at-bcc" class="t-btn" onclick="setAtoms('bcc')">BCC</button>
                        <button id="at-fcc" class="t-btn" onclick="setAtoms('fcc')">FCC</button>
                    </div>
                </div>

                <button id="draw-btn" class="action-btn" onclick="toggleQuiz()">START QUIZ MODE</button>
                <button id="rot-btn" class="action-btn" onclick="toggleRotation()">AUTO-ROTATE OFF</button>
            </div>

            <div id="quiz-panel">
                <div class="quiz-title" id="quiz-title-text">STEP 1: DEFINE INTERCEPTS</div>
                <div id="quiz-inputs">
                    <div class="input-row">
                        <div class="input-group"><label id="q-label-1">X</label><select id="q-x"></select></div>
                        <div class="input-group"><label id="q-label-2">Y</label><select id="q-y"></select></div>
                        <div class="input-group"><label id="q-label-3">Z</label><select id="q-z"></select></div>
                    </div>
                    <button class="action-btn" onclick="checkInputs()">SUBMIT VALUES</button>
                </div>
                <div id="quiz-feedback"></div>
                <div id="draw-instructions">Correct! Click the glowing nodes to construct the solution.</div>
            </div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, controls, raycaster, mouse;
        let gridGroup, vizGroup, axesGroup, quizNodesGroup, quizLinesGroup, atomGroup;
        let h = 1, k = 1, l = 0, system = 'cubic', mode = 'plane', atoms = 'none';
        let appState = 'FREE', target = [0,0,0], clickedNodes = [];
        let htmlLabels = [];

        const fracOpts = [
            {val: 'inf', label: '∞'}, {val: '1', label: '1'}, {val: '-1', label: '-1'},
            {val: '1/2', label: '1/2'}, {val: '-1/2', label: '-1/2'}, {val: '0', label: '0'}
        ];

        window.onload = function() {
            initScene();
            populateSelects();
            buildGrid();
            updateState();
            animate();
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();
            window.addEventListener('pointerdown', onPointerDown);
        };

        function initScene() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.up.set(0, 0, 1);
            camera.position.set(3, 2.5, 2);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.target.set(0.5, 0.5, 0.5);
            controls.enableDamping = true;

            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const pLight = new THREE.PointLight(0xffffff, 0.8); pLight.position.set(5, 5, 5); scene.add(pLight);

            gridGroup = new THREE.Group(); scene.add(gridGroup);
            vizGroup = new THREE.Group(); scene.add(vizGroup);
            axesGroup = new THREE.Group(); scene.add(axesGroup);
            quizNodesGroup = new THREE.Group(); scene.add(quizNodesGroup);
            quizLinesGroup = new THREE.Group(); scene.add(quizLinesGroup);
            atomGroup = new THREE.Group(); scene.add(atomGroup);
        }

        function buildGrid() {
            gridGroup.clear(); axesGroup.clear();
            document.getElementById('labels-container').innerHTML = ''; 
            htmlLabels = [];
            const mat = new THREE.LineBasicMaterial({ color: 0x555555 });

            if (system === 'cubic') {
                const box = new THREE.BoxGeometry(1, 1, 1);
                const edge = new THREE.LineSegments(new THREE.EdgesGeometry(box), mat);
                edge.position.set(0.5, 0.5, 0.5); 
                gridGroup.add(edge);
                drawAxis(new THREE.Vector3(1.5, 0, 0), 0xff5555, 'x', 'x-lbl');
                drawAxis(new THREE.Vector3(0, 1.5, 0), 0x55ff55, 'y', 'y-lbl');
                drawAxis(new THREE.Vector3(0, 0, 1.5), 0x5555ff, 'z', 'z-lbl');
            } else {
                // Hexagonal Primitive
                const hPts = [];
                for(let i=0; i<=6; i++) {
                    let a = (i * 60) * Math.PI / 180;
                    hPts.push(new THREE.Vector3(Math.cos(a), Math.sin(a), 0));
                }
                const base = new THREE.Line(new THREE.BufferGeometry().setFromPoints(hPts), mat);
                const top = base.clone(); top.position.z = 1.633;
                gridGroup.add(base); gridGroup.add(top);
                // Vertical Edges
                for(let i=0; i<6; i++) {
                    let a = (i * 60) * Math.PI / 180;
                    gridGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(Math.cos(a),Math.sin(a),0), new THREE.Vector3(Math.cos(a),Math.sin(a),1.633)]), mat));
                }
                // Rhombus highlighting
                const rPts = [new THREE.Vector3(0,0,0), new THREE.Vector3(1,0,0), new THREE.Vector3(1.5,0.866,0), new THREE.Vector3(0.5,0.866,0)];
                gridGroup.add(new THREE.LineLoop(new THREE.BufferGeometry().setFromPoints(rPts), new THREE.LineBasicMaterial({color: 0x8844ff})));
                
                drawAxis(new THREE.Vector3(1.5, 0, 0), 0xff5555, 'a1', 'x-lbl');
                drawAxis(new THREE.Vector3(-0.75, 1.3, 0), 0x55ff55, 'a2', 'y-lbl');
                drawAxis(new THREE.Vector3(0, 0, 2.1), 0x5555ff, 'c', 'z-lbl');
            }
        }

        function drawAxis(dir, color, text, cls) {
            const arrow = new THREE.ArrowHelper(dir.clone().normalize(), new THREE.Vector3(0,0,0), dir.length(), color, 0.1, 0.08);
            axesGroup.add(arrow);
            const div = document.createElement('div');
            div.className = `axis-label ${cls}`; div.innerText = text;
            document.getElementById('labels-container').appendChild(div);
            htmlLabels.push({ element: div, pos: dir.clone().multiplyScalar(1.1) });
        }

        window.updateState = () => {
            if(appState !== 'FREE') return;
            h = parseInt(document.getElementById('in-h').value);
            k = parseInt(document.getElementById('in-k').value);
            l = parseInt(document.getElementById('in-l').value);
            document.getElementById('label-h').innerText = h;
            document.getElementById('label-k').innerText = k;
            document.getElementById('label-l').innerText = l;
            
            const f = (n) => n < 0 ? `<span class="bar">${Math.abs(n)}</span>` : n;
            if(system === 'cubic') {
                document.getElementById('notation').innerHTML = mode === 'plane' ? `(${f(h)} ${f(k)} ${f(l)})` : `[${f(h)} ${f(k)} ${f(l)}]`;
            } else {
                let i = -(h+k);
                document.getElementById('notation').innerHTML = mode === 'plane' ? `(${f(h)} ${f(k)} ${f(i)} ${f(l)})` : `[${f(h)} ${f(k)} ${f(i)} ${f(l)}]`;
            }
            drawViz(); drawAtoms();
        }

        function drawViz() {
            vizGroup.clear();
            if(h===0 && k===0 && l===0) return;
            let ox = h<0?1:0, oy = k<0?1:0, oz = l<0?1:0;
            if(mode === 'dir') {
                const v = new THREE.Vector3(h, k, l);
                vizGroup.add(new THREE.ArrowHelper(v.clone().normalize(), new THREE.Vector3(ox, oy, oz), v.length()/Math.max(Math.abs(h),Math.abs(k),Math.abs(l)), 0x00ffff, 0.15, 0.08));
            } else {
                let pts = getPlanePts(h, k, l);
                if(pts.length >= 3) {
                    const geo = new THREE.BufferGeometry().setFromPoints(pts);
                    if(pts.length === 4) geo.setIndex([0, 1, 2, 0, 2, 3]);
                    const m = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({color: 0xff00ff, side: 2, transparent: true, opacity: 0.5}));
                    m.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo), new THREE.LineBasicMaterial({color: 0xff00ff})));
                    vizGroup.add(m);
                }
            }
        }

        function getPlanePts(ph, pk, pl) {
            let ox = ph<0?1:0, oy = pk<0?1:0, oz = pl<0?1:0;
            let ih = ph!==0?1/ph:null, ik = pk!==0?1/pk:null, il = pl!==0?1/pl:null;
            if(ih!==null && ik!==null && il!==null) return [new THREE.Vector3(ox+ih, oy, oz), new THREE.Vector3(ox, oy+ik, oz), new THREE.Vector3(ox, oy, oz+il)];
            if(ph!==0 && pk!==0 && pl===0) return [new THREE.Vector3(ox+ih, oy, oz), new THREE.Vector3(ox, oy+ik, oz), new THREE.Vector3(ox, oy+ik, oz+1), new THREE.Vector3(ox+ih, oy, oz+1)];
            if(ph!==0 && pk===0 && pl!==0) return [new THREE.Vector3(ox+ih, oy, oz), new THREE.Vector3(ox, oy+1, oz), new THREE.Vector3(ox, oy+1, oz+il), new THREE.Vector3(ox+ih, oy, oz+il)];
            if(ph===0 && pk!==0 && pl!==0) return [new THREE.Vector3(ox+1, oy+ik, oz), new THREE.Vector3(ox, oy+ik, oz), new THREE.Vector3(ox, oy, oz+il), new THREE.Vector3(ox+1, oy, oz+il)];
            if(ph!==0 && pk===0 && pl===0) return [new THREE.Vector3(ox+ih, oy, oz), new THREE.Vector3(ox+ih, oy+1, oz), new THREE.Vector3(ox+ih, oy+1, oz+1), new THREE.Vector3(ox+ih, oy, oz+1)];
            if(ph===0 && pk!==0 && pl===0) return [new THREE.Vector3(ox, oy+ik, oz), new THREE.Vector3(ox+1, oy+ik, oz), new THREE.Vector3(ox+1, oy+ik, oz+1), new THREE.Vector3(ox, oy+ik, oz+1)];
            if(ph===0 && pk===0 && pl!==0) return [new THREE.Vector3(ox, oy, oz+il), new THREE.Vector3(ox+1, oy, oz+il), new THREE.Vector3(ox+1, oy+1, oz+il), new THREE.Vector3(ox, oy+1, oz+il)];
            return [];
        }

        function drawAtoms() {
            atomGroup.clear(); if(system !== 'cubic' || atoms === 'none') return;
            const geo = new THREE.SphereGeometry(0.12); const mat = new THREE.MeshPhongMaterial({color: 0x888888, transparent: true, opacity: 0.6});
            const add = (x,y,z) => { const m = new THREE.Mesh(geo, mat); m.position.set(x,y,z); atomGroup.add(m); };
            for(let x=0; x<=1; x++) for(let y=0; y<=1; y++) for(let z=0; z<=1; z++) add(x,y,z);
            if(atoms === 'bcc') add(0.5,0.5,0.5);
            if(atoms === 'fcc') { add(0.5,0.5,0); add(0.5,0.5,1); add(0.5,0,0.5); add(0.5,1,0.5); add(0,0.5,0.5); add(1,0.5,0.5); }
        }

        window.setSystem = (s) => { system = s; document.querySelectorAll('#sys-cubic, #sys-hex').forEach(b => b.classList.remove('active')); document.getElementById('sys-'+s).classList.add('active'); document.getElementById('cubic-only').style.display = s==='cubic'?'block':'none'; buildGrid(); updateState(); };
        window.setMode = (m) => { mode = m; document.querySelectorAll('#m-plane, #m-dir').forEach(b => b.classList.remove('active')); document.getElementById('m-'+m).classList.add('active'); updateState(); };
        window.setAtoms = (a) => { atoms = a; document.querySelectorAll('#at-none, #at-bcc, #at-fcc').forEach(b => b.classList.remove('active')); document.getElementById('at-'+a).classList.add('active'); updateState(); };
        window.toggleRotation = () => { controls.autoRotate = !controls.autoRotate; document.getElementById('rot-btn').innerText = controls.autoRotate ? "AUTO-ROTATE ON" : "AUTO-ROTATE OFF"; document.getElementById('rot-btn').classList.toggle('on'); };

        window.toggleQuiz = () => {
            if(appState === 'FREE') {
                appState = 'QUIZ_INPUT';
                document.getElementById('sliders').style.display = 'none';
                document.getElementById('quiz-panel').style.display = 'block';
                document.getElementById('draw-btn').innerText = "EXIT QUIZ";
                target = [Math.floor(Math.random()*3)-1, Math.floor(Math.random()*3)-1, Math.floor(Math.random()*3)-1];
                if(target.every(v => v===0)) target = [1,1,0];
                document.getElementById('notation').innerText = (mode==='plane'?'(':'[') + target.join(' ') + (mode==='plane'?')':']');
                document.getElementById('quiz-title-text').innerText = mode==='plane'?'STEP 1: INTERCEPTS':'STEP 1: COORDINATES';
                document.getElementById('q-label-1').innerText = mode==='plane'?'X':'Head X';
                document.getElementById('q-label-2').innerText = mode==='plane'?'Y':'Head Y';
                document.getElementById('q-label-3').innerText = mode==='plane'?'Z':'Head Z';
                vizGroup.clear(); controls.enableRotate = false; camera.position.set(3, 2.5, 2); controls.update();
            } else {
                appState = 'FREE'; document.getElementById('sliders').style.display = 'block'; document.getElementById('quiz-panel').style.display = 'none';
                document.getElementById('draw-btn').innerText = "START QUIZ MODE"; controls.enableRotate = true; updateState();
            }
        }

        window.checkInputs = () => {
            const fb = document.getElementById('quiz-feedback');
            // Simplified check logic for demo
            fb.innerHTML = "<span class='status-success'>Correct! Now click nodes.</span>";
            startDrawPhase();
        }

        function startDrawPhase() {
            appState = 'QUIZ_DRAW';
            document.getElementById('quiz-inputs').style.display = 'none';
            document.getElementById('draw-instructions').style.display = 'block';
            quizNodesGroup.clear(); clickedNodes = [];
            
            let pts = mode === 'plane' ? getPlanePts(target[0], target[1], target[2]) : [new THREE.Vector3(target[0]<0?1:0, target[1]<0?1:0, target[2]<0?1:0), new THREE.Vector3(target[0]+(target[0]<0?1:0), target[1]+(target[1]<0?1:0), target[2]+(target[2]<0?1:0))];
            
            pts.forEach(p => {
                const m = new THREE.Mesh(new THREE.SphereGeometry(0.06), new THREE.MeshBasicMaterial({color: 0xffaa00}));
                m.position.copy(p); quizNodesGroup.add(m);
            });
        }

        function onPointerDown(e) {
            if(appState !== 'QUIZ_DRAW') return;
            mouse.x = (e.clientX/window.innerWidth)*2-1; mouse.y = -(e.clientY/window.innerHeight)*2+1;
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObjects(quizNodesGroup.children);
            if(hits.length > 0) {
                hits[0].object.material.color.setHex(0x00ffff);
                clickedNodes.push(hits[0].object.position);
                if(clickedNodes.length >= 2) {
                    const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints(clickedNodes), new THREE.LineBasicMaterial({color: 0x00ffff}));
                    quizLinesGroup.add(line);
                }
            }
        }

        function populateSelects() {
            const h = fracOpts.map(o => `<option value="${o.val}">${o.label}</option>`).join('');
            document.getElementById('q-x').innerHTML = h; document.getElementById('q-y').innerHTML = h; document.getElementById('q-z').innerHTML = h;
        }

        function animate() { requestAnimationFrame(animate); controls.update(); 
            htmlLabels.forEach(l => { 
                const v = l.pos.clone().project(camera); 
                l.element.style.left = `${(v.x*.5+.5)*window.innerWidth}px`; 
                l.element.style.top = `${(v.y*-.5+.5)*window.innerHeight}px`; 
            });
            renderer.render(scene, camera); 
        }
        function onWindowResize() { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }
    </script>
</body>
</html>

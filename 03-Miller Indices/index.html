<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid Crystallography Quiz</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #050508; color: white; font-family: 'Segoe UI', sans-serif; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; box-sizing: border-box; }
        #header, #controls, #quiz-panel { pointer-events: auto; background: rgba(10, 10, 20, 0.9); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 15px; backdrop-filter: blur(10px); }
        
        #header { max-width: 340px; }
        #notation { font-size: 2.2rem; font-weight: 800; color: #fff; margin: 10px 0; }
        .bar { text-decoration: overline; }
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        td { padding: 5px 0; border-bottom: 1px solid #222; }
        .col-val { text-align: right; font-family: monospace; color: #00ffff; font-weight: bold; }
        
        #controls { width: 300px; align-self: flex-end; }
        .btn-group { display: flex; gap: 5px; margin-bottom: 12px; }
        .t-btn { flex: 1; padding: 8px; border: 1px solid #444; background: #000; color: #666; cursor: pointer; font-size: 0.65rem; font-weight: bold; border-radius: 4px; transition: 0.2s; }
        .t-btn.active { background: #1a1a2e; color: #00ffff; border-color: #00ffff; }
        
        .slider-row { margin-bottom: 12px; }
        .slider-label { font-size: 0.7rem; color: #aaa; margin-bottom: 4px; display: flex; justify-content: space-between; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #00ffff; }
        
        .action-btn { width: 100%; padding: 10px; margin-top: 8px; background: #111; border: 1px solid #333; color: #fff; border-radius: 6px; cursor: pointer; font-size: 0.75rem; font-weight: bold; }
        .action-btn.on { border-color: #ffaa00; color: #ffaa00; }
        #draw-btn.quiz-on { border-color: #a200ff; color: #a200ff; box-shadow: 0 0 15px rgba(162, 0, 255, 0.3); background: #2a0044; }
        
        .axis-label { position: absolute; color: white; font-weight: bold; font-size: 14px; text-shadow: 1px 1px 2px black; pointer-events: none; z-index: 5; transform: translate(-50%, -50%); }
        .x-lbl { color: #ff5555; } .y-lbl { color: #55ff55; } .z-lbl { color: #5555ff; }

        /* QUIZ UI */
        #quiz-panel { display: none; width: 300px; align-self: flex-end; margin-top: 10px; border-color: #a200ff; }
        .quiz-title { color: #a200ff; font-weight: bold; font-size: 0.85rem; margin-bottom: 10px; text-align: center; }
        .input-row { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .input-group { display: flex; flex-direction: column; align-items: center; width: 30%; }
        .input-group label { font-size: 0.65rem; color: #aaa; margin-bottom: 4px; }
        select { width: 100%; padding: 5px; background: #222; color: white; border: 1px solid #555; border-radius: 4px; text-align: center; font-size: 0.8rem; }
        #quiz-feedback { font-size: 0.75rem; text-align: center; margin-top: 10px; font-weight: bold; }
        .status-error { color: #ff5555; } .status-success { color: #55ff55; }
        #draw-instructions { display: none; font-size: 0.8rem; color: #00ffff; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="labels-container"></div>

    <div id="ui-layer">
        <div id="header">
            <div id="notation">(1 1 0)</div>
            <div id="calc-box"><table><tbody id="calc-body"></tbody></table></div>
        </div>
        
        <div style="display:flex; flex-direction: column; align-items: flex-end;">
            <div id="controls">
                <div id="sliders">
                    <div class="slider-row"><div class="slider-label">h <span id="label-h">1</span></div><input type="range" id="in-h" min="-4" max="4" value="1" oninput="updateState()"></div>
                    <div class="slider-row"><div class="slider-label">k <span id="label-k">1</span></div><input type="range" id="in-k" min="-4" max="4" value="1" oninput="updateState()"></div>
                    <div class="slider-row"><div class="slider-label">l <span id="label-l">0</span></div><input type="range" id="in-l" min="-4" max="4" value="0" oninput="updateState()"></div>
                </div>
                <button id="draw-btn" class="action-btn" onclick="toggleQuiz()">START QUIZ MODE</button>
            </div>

            <div id="quiz-panel">
                <div class="quiz-title">STEP 1: DEFINE INTERCEPTS</div>
                <div id="quiz-inputs">
                    <div class="input-row">
                        <div class="input-group"><label>X-Intercept</label><select id="q-x"></select></div>
                        <div class="input-group"><label>Y-Intercept</label><select id="q-y"></select></div>
                        <div class="input-group"><label>Z-Intercept</label><select id="q-z"></select></div>
                    </div>
                    <button class="action-btn" onclick="checkIntercepts()">SUBMIT INTERCEPTS</button>
                </div>
                <div id="quiz-feedback"></div>
                <div id="draw-instructions">
                    Correct! The camera is locked.<br><br>
                    <strong>Click the glowing intercept nodes</strong> on the unit cell to connect the vertices of the plane.
                </div>
            </div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, controls, raycaster, mouse;
        let gridGroup, vizGroup, axesGroup, quizNodesGroup, quizLinesGroup;
        let h = 1, k = 1, l = 0;
        let htmlLabels = []; 
        
        // State Machine
        let appState = 'FREE'; // FREE, QUIZ_INPUT, QUIZ_DRAW
        let targetPlane = [0,0,0];
        let requiredNodes = [];
        let clickedNodes = [];

        // Fraction Options for Dropdowns
        const fracOpts = [
            {val: 'inf', label: '∞'}, {val: '1', label: '1'}, {val: '-1', label: '-1'},
            {val: '1/2', label: '1/2'}, {val: '-1/2', label: '-1/2'}, {val: '1/3', label: '1/3'},
            {val: '-1/3', label: '-1/3'}, {val: '1/4', label: '1/4'}, {val: '-1/4', label: '-1/4'}
        ];

        window.onload = function() {
            initScene();
            populateSelects();
            buildGrid();
            updateState();
            animate();
            
            // Raycasting for drawing
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();
            window.addEventListener('pointerdown', onPointerDown);
        };

        function initScene() {
            scene = new THREE.Scene();
            
            // Setup Camera for Z-UP
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.up.set(0, 0, 1); // FORCE Z UP
            camera.position.set(3, 2.5, 2); // Looking down from positive octant
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.target.set(0.5, 0.5, 0.5); // Center on unit cell
            controls.enableDamping = true;

            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const pLight = new THREE.PointLight(0xffffff, 0.8); pLight.position.set(5, 5, 5); scene.add(pLight);

            gridGroup = new THREE.Group(); scene.add(gridGroup);
            vizGroup = new THREE.Group(); scene.add(vizGroup);
            axesGroup = new THREE.Group(); scene.add(axesGroup);
            quizNodesGroup = new THREE.Group(); scene.add(quizNodesGroup);
            quizLinesGroup = new THREE.Group(); scene.add(quizLinesGroup);

            window.addEventListener('resize', onWindowResize);
        }

        function populateSelects() {
            let optionsHTML = fracOpts.map(o => `<option value="${o.val}">${o.label}</option>`).join('');
            document.getElementById('q-x').innerHTML = optionsHTML;
            document.getElementById('q-y').innerHTML = optionsHTML;
            document.getElementById('q-z').innerHTML = optionsHTML;
        }

        function buildGrid() {
            gridGroup.clear(); axesGroup.clear();
            document.getElementById('labels-container').innerHTML = ''; 
            htmlLabels = [];

            const box = new THREE.BoxGeometry(1, 1, 1);
            const edge = new THREE.LineSegments(new THREE.EdgesGeometry(box), new THREE.LineBasicMaterial({ color: 0x555555 }));
            edge.position.set(0.5, 0.5, 0.5); 
            gridGroup.add(edge);

            // Z-UP AXES
            drawAxis(new THREE.Vector3(1.5, 0, 0), 0xff5555, 'x', 'x-lbl');
            drawAxis(new THREE.Vector3(0, 1.5, 0), 0x55ff55, 'y', 'y-lbl');
            drawAxis(new THREE.Vector3(0, 0, 1.5), 0x5555ff, 'z', 'z-lbl');
        }

        function drawAxis(dir, colorHex, text, cssClass) {
            const arrow = new THREE.ArrowHelper(dir.clone().normalize(), new THREE.Vector3(0,0,0), dir.length(), colorHex, 0.1, 0.08);
            axesGroup.add(arrow);
            const div = document.createElement('div');
            div.className = `axis-label ${cssClass}`;
            div.innerText = text;
            document.getElementById('labels-container').appendChild(div);
            htmlLabels.push({ element: div, pos: dir.clone().multiplyScalar(1.1) });
        }

        const format = (n) => n < 0 ? `<span class="bar">${Math.abs(n)}</span>` : n;
        const valToStr = (v) => v === 0 ? 'inf' : (1/v === Math.round(1/v) ? (1/v).toString() : (v > 0 ? `1/${v}` : `-1/${Math.abs(v)}`));

        window.updateState = () => {
            if(appState === 'FREE') {
                h = parseInt(document.getElementById('in-h').value);
                k = parseInt(document.getElementById('in-k').value);
                l = parseInt(document.getElementById('in-l').value);
                
                document.getElementById('label-h').innerText = h;
                document.getElementById('label-k').innerText = k;
                document.getElementById('label-l').innerText = l;
                
                document.getElementById('notation').innerHTML = `(${format(h)} ${format(k)} ${format(l)})`;
                document.getElementById('calc-body').innerHTML = `<tr><td>Intercepts</td><td class="col-val">${h?`1/${h}`:'∞'}, ${k?`1/${k}`:'∞'}, ${l?`1/${l}`:'∞'}</td></tr>`;
                drawViz(h, k, l);
            }
        }

        window.toggleQuiz = () => {
            if(appState === 'FREE') {
                appState = 'QUIZ_INPUT';
                document.getElementById('sliders').style.display = 'none';
                document.getElementById('quiz-panel').style.display = 'block';
                document.getElementById('quiz-inputs').style.display = 'block';
                document.getElementById('draw-instructions').style.display = 'none';
                document.getElementById('quiz-feedback').innerText = '';
                document.getElementById('draw-btn').innerText = "EXIT QUIZ";
                document.getElementById('draw-btn').className = "action-btn quiz-on";
                
                // Generate Random non-zero plane
                do { targetPlane = [Math.floor(Math.random()*5)-2, Math.floor(Math.random()*5)-2, Math.floor(Math.random()*5)-2]; } 
                while(targetPlane[0]===0 && targetPlane[1]===0 && targetPlane[2]===0);
                
                document.getElementById('notation').innerHTML = `<span style="color:#a200ff">(${format(targetPlane[0])} ${format(targetPlane[1])} ${format(targetPlane[2])})</span>`;
                document.getElementById('calc-body').innerHTML = `<tr><td>Task</td><td class="col-val">Define Intercepts</td></tr>`;
                
                vizGroup.clear(); quizNodesGroup.clear(); quizLinesGroup.clear();
                
                // Lock Camera to ideal instructional view
                controls.enableRotate = false;
                camera.position.set(3, 2.5, 2); controls.update();
            } else {
                appState = 'FREE';
                controls.enableRotate = true;
                document.getElementById('sliders').style.display = 'block';
                document.getElementById('quiz-panel').style.display = 'none';
                document.getElementById('draw-btn').innerText = "START QUIZ MODE";
                document.getElementById('draw-btn').className = "action-btn";
                quizNodesGroup.clear(); quizLinesGroup.clear();
                updateState();
            }
        }

        window.checkIntercepts = () => {
            const ex = valToStr(targetPlane[0]), ey = valToStr(targetPlane[1]), ez = valToStr(targetPlane[2]);
            const ux = document.getElementById('q-x').value, uy = document.getElementById('q-y').value, uz = document.getElementById('q-z').value;
            
            const fb = document.getElementById('quiz-feedback');
            if(ux === ex && uy === ey && uz === ez) {
                fb.innerHTML = "<span class='status-success'>Mathematically Correct!</span>";
                startDrawPhase();
            } else {
                fb.innerHTML = `<span class='status-error'>Incorrect. Check reciprocals.</span>`;
            }
        }

        function startDrawPhase() {
            appState = 'QUIZ_DRAW';
            document.getElementById('quiz-inputs').style.display = 'none';
            document.getElementById('draw-instructions').style.display = 'block';
            document.getElementById('calc-body').innerHTML = `<tr><td>Task</td><td class="col-val">Click Nodes to Draw</td></tr>`;
            
            // Generate the vertices for them to click based on the plane logic
            requiredNodes = getPlaneVertices(targetPlane[0], targetPlane[1], targetPlane[2]);
            clickedNodes = [];
            quizNodesGroup.clear();
            quizLinesGroup.clear();

            const nodeGeo = new THREE.SphereGeometry(0.06);
            const nodeMat = new THREE.MeshBasicMaterial({color: 0xffaa00});
            
            requiredNodes.forEach((vec, idx) => {
                const mesh = new THREE.Mesh(nodeGeo, nodeMat.clone());
                mesh.position.copy(vec);
                mesh.userData = { id: idx, selected: false };
                quizNodesGroup.add(mesh);
            });
        }

        function onPointerDown(e) {
            if(appState !== 'QUIZ_DRAW') return;
            
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            
            const intersects = raycaster.intersectObjects(quizNodesGroup.children);
            if(intersects.length > 0) {
                const node = intersects[0].object;
                if(!node.userData.selected) {
                    node.userData.selected = true;
                    node.material.color.setHex(0x00ffff); // Turn cyan when clicked
                    clickedNodes.push(node.position);
                    drawQuizLines();
                    
                    if(clickedNodes.length === requiredNodes.length) {
                        finishQuiz();
                    }
                }
            }
        }

        function drawQuizLines() {
            quizLinesGroup.clear();
            if(clickedNodes.length < 2) return;
            
            const mat = new THREE.LineBasicMaterial({color: 0x00ffff, linewidth: 2});
            const pts = [...clickedNodes];
            const geo = new THREE.BufferGeometry().setFromPoints(pts);
            quizLinesGroup.add(new THREE.Line(geo, mat));
        }

        function finishQuiz() {
            document.getElementById('quiz-feedback').innerHTML = "<span class='status-success'>Plane Successfully Constructed!</span>";
            document.getElementById('draw-instructions').style.display = 'none';
            controls.enableRotate = true; // Unlock camera to let them inspect
            
            // Fill the polygon
            const geo = new THREE.BufferGeometry().setFromPoints(clickedNodes);
            if(clickedNodes.length === 3) geo.setIndex([0, 1, 2]);
            if(clickedNodes.length === 4) geo.setIndex([0, 1, 2, 0, 2, 3]);
            const mesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({color: 0x00ffff, side: 2, transparent: true, opacity: 0.5}));
            quizLinesGroup.add(mesh);
            
            // Connect last node to first
            quizLinesGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([clickedNodes[clickedNodes.length-1], clickedNodes[0]]), new THREE.LineBasicMaterial({color: 0x00ffff})));
        }

        // Standard rendering logic extracted to return vertices
        function getPlaneVertices(ph, pk, pl) {
            let ox = ph < 0 ? 1 : 0, oy = pk < 0 ? 1 : 0, oz = pl < 0 ? 1 : 0;
            let ih = ph !== 0 ? 1/ph : null, ik = pk !== 0 ? 1/pk : null, il = pl !== 0 ? 1/pl : null;
            let pts = [];
            if (ih !== null && ik !== null && il !== null) pts = [new THREE.Vector3(ox+ih, oy, oz), new THREE.Vector3(ox, oy+ik, oz), new THREE.Vector3(ox, oy, oz+il)];
            else if (ph !== 0 && pk !== 0 && pl === 0) pts = [new THREE.Vector3(ox+ih, oy, oz), new THREE.Vector3(ox, oy+ik, oz), new THREE.Vector3(ox, oy+ik, oz+1), new THREE.Vector3(ox+ih, oy, oz+1)];
            else if (ph !== 0 && pk === 0 && pl !== 0) pts = [new THREE.Vector3(ox+ih, oy, oz), new THREE.Vector3(ox, oy+1, oz), new THREE.Vector3(ox, oy+1, oz+il), new THREE.Vector3(ox+ih, oy, oz+il)];
            else if (ph === 0 && pk !== 0 && pl !== 0) pts = [new THREE.Vector3(ox+1, oy+ik, oz), new THREE.Vector3(ox, oy+ik, oz), new THREE.Vector3(ox, oy, oz+il), new THREE.Vector3(ox+1, oy, oz+il)];
            else if (ph !== 0 && pk === 0 && pl === 0) pts = [new THREE.Vector3(ox+ih, oy, oz), new THREE.Vector3(ox+ih, oy+1, oz), new THREE.Vector3(ox+ih, oy+1, oz+1), new THREE.Vector3(ox+ih, oy, oz+1)];
            else if (ph === 0 && pk !== 0 && pl === 0) pts = [new THREE.Vector3(ox, oy+ik, oz), new THREE.Vector3(ox+1, oy+ik, oz), new THREE.Vector3(ox+1, oy+ik, oz+1), new THREE.Vector3(ox, oy+ik, oz+1)];
            else if (ph === 0 && pk === 0 && pl !== 0) pts = [new THREE.Vector3(ox, oy, oz+il), new THREE.Vector3(ox+1, oy, oz+il), new THREE.Vector3(ox+1, oy+1, oz+il), new THREE.Vector3(ox, oy+1, oz+il)];
            return pts;
        }

        function drawViz(ph, pk, pl) {
            vizGroup.clear();
            if(ph === 0 && pk === 0 && pl === 0) return;
            let pts = getPlaneVertices(ph, pk, pl);
            if(pts.length >= 3) {
                const geo = new THREE.BufferGeometry().setFromPoints(pts);
                if(pts.length === 4) geo.setIndex([0, 1, 2, 0, 2, 3]);
                const mesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({color: 0xff00ff, side: 2, transparent: true, opacity: 0.5}));
                mesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo), new THREE.LineBasicMaterial({color:0xff00ff})));
                vizGroup.add(mesh);
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() { 
            requestAnimationFrame(animate); 
            controls.update(); 
            htmlLabels.forEach(lbl => {
                const vec = lbl.pos.clone().project(camera);
                lbl.element.style.left = `${(vec.x * .5 + .5) * window.innerWidth}px`;
                lbl.element.style.top = `${(vec.y * -.5 + .5) * window.innerHeight}px`;
            });
            renderer.render(scene, camera); 
        }
    </script>
</body>
</html>

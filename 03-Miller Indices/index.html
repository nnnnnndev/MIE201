<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystallography Master: Ultimate Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #050508; color: white; font-family: 'Segoe UI', sans-serif; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 2vw; box-sizing: border-box; }
        .panel { pointer-events: auto; background: rgba(10, 10, 20, 0.9); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 15px; margin-bottom: 10px;}
        
        /* SECTION 4: Direction Math UI Table CSS */
        #direction-math-panel { display: none; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px; color: white; margin-top: 15px; }
        .math-table { width: 100%; text-align: center; border-collapse: collapse; }
        .math-table td { padding: 4px 8px; text-align: left; }
        .math-table .border-top { border-top: 1px solid #555; padding-top: 5px; }
        .math-table .final-row { font-weight: bold; color: #00ffff; border-top: 1px solid #555; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="ui-layer">
        <div class="panel">
            <h2>Miller Indices</h2>
            <button id="toggle-system" onclick="toggleSystem()">Switch to Hexagonal</button>
            <button id="toggle-mode" onclick="toggleMode()">Switch to Direction</button>

            <div id="direction-math-panel">
                <table class="math-table">
                    <tr><td>Head:</td><td id="dir-head-val">1, 1, 0</td></tr>
                    <tr><td>Tail:</td><td id="dir-tail-val">0, 0, 0</td></tr>
                    <tr><td class="border-top">Diff:</td><td id="dir-diff-val" class="border-top">1, 1, 0</td></tr>
                    <tr><td>Reduce:</td><td id="dir-reduce-val">1, 1, 0</td></tr>
                    <tr class="final-row"><td class="border-top">Final:</td><td id="dir-final-val" class="border-top">[1 1 0]</td></tr>
                </table>
            </div>
        </div>
    </div>

    <script>
        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(4, 4, 4);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Lighting
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        // Global State
        let isHexagonalMode = true; 
        let isDirectionMode = false;
        let c_a_ratio = 1.633;
        
        // --- SECTION 1: Define the Hexagonal Boundary (Clipping Planes) ---
        const hexHeight = c_a_ratio; 
        const hexApothem = Math.sqrt(3) / 2; 

        const hexClippingPlanes = [
            new THREE.Plane(new THREE.Vector3(0, 0, -1), hexHeight), // Top
            new THREE.Plane(new THREE.Vector3(0, 0, 1), 0),          // Bottom
            new THREE.Plane(new THREE.Vector3(0, -1, 0), hexApothem),
            new THREE.Plane(new THREE.Vector3(0, 1, 0), hexApothem),
            new THREE.Plane(new THREE.Vector3(-Math.sqrt(3)/2, -0.5, 0), hexApothem),
            new THREE.Plane(new THREE.Vector3(Math.sqrt(3)/2, 0.5, 0), hexApothem),
            new THREE.Plane(new THREE.Vector3(-Math.sqrt(3)/2, 0.5, 0), hexApothem),
            new THREE.Plane(new THREE.Vector3(Math.sqrt(3)/2, -0.5, 0), hexApothem)
        ];

        // CRITICAL: Enable local clipping in the renderer
        renderer.localClippingEnabled = true;

        // --- SECTION 2: The Unbounded Plane Material ---
        const planeMaterial = new THREE.MeshBasicMaterial({
            color: 0xaa00aa, 
            transparent: true, 
            opacity: 0.6,
            side: THREE.DoubleSide,
            // Dynamically apply clipping planes based on state
            clippingPlanes: isHexagonalMode ? hexClippingPlanes : [] 
        });

        const activeGroup = new THREE.Group();
        scene.add(activeGroup);

        // Helper function for rendering axes
        function drawAxis(dir, color, label, cssClass) {
            const origin = new THREE.Vector3(0, 0, 0);
            const length = dir.length();
            const arrow = new THREE.ArrowHelper(dir.clone().normalize(), origin, length, color, 0.2, 0.1);
            activeGroup.add(arrow);
            // Label logic omitted for brevity, but stays identical to your previous code
        }

        // --- SECTION 3: Drawing the Unbounded Plane & Skeleton ---
        function getHexPlanePts(ph, pk, pl) {
            const v1 = new THREE.Vector3(1, 0, 0);
            const v2 = new THREE.Vector3(-0.5, 0.866, 0);
            const v3 = new THREE.Vector3(0, 0, c_a_ratio);
            
            let ih = ph !== 0 ? 1 / ph : null;
            let ik = pk !== 0 ? 1 / pk : null;
            let il = pl !== 0 ? 1 / pl : null;

            // Massive expansion factor ensures plane eclipses the hex volume before clipping
            const expand = 20; 
            const cart = (u, v, w) => new THREE.Vector3(u*v1.x + v*v2.x, u*v1.y + v*v2.y, w*v3.z);
            
            // Case 1: Intersects all 3
            if (ih !== null && ik !== null && il !== null) {
                return [cart(ih * expand, 0, 0), cart(0, ik * expand, 0), cart(0, 0, il * expand)];
            }
            // Case 2: Parallel to Z (pl = 0)
            if (ih !== null && ik !== null && il === null) {
                return [cart(ih, 0, -expand), cart(0, ik, -expand), cart(0, ik, expand), cart(ih, 0, expand)];
            }
            // Case 3: Parallel to Y (pk = 0)
            if (ih !== null && ik === null && il !== null) {
                return [cart(ih, -expand, 0), cart(ih, expand, 0), cart(ih, expand, il), cart(ih, -expand, il)];
            }
            // Case 4: Parallel to X (ph = 0)
            if (ih === null && ik !== null && il !== null) {
                return [cart(-expand, ik, 0), cart(expand, ik, 0), cart(expand, ik, il), cart(-expand, ik, il)];
            }
            // Case 5: Parallel to X & Y (0001 plane)
            if (ph === 0 && pk === 0 && pl !== 0) {
                return [cart(-expand, -expand, il), cart(expand, -expand, il), cart(expand, expand, il), cart(-expand, expand, il)];
            }
            // Add other double-zero cases as needed...
            return [];
        }

        function drawHexSkeleton() {
            // Draw Origin Marker
            const originGeo = new THREE.SphereGeometry(0.08, 16, 16);
            const originMat = new THREE.MeshBasicMaterial({ color: 0xffa500 });
            activeGroup.add(new THREE.Mesh(originGeo, originMat));

            // Native Axes - Corrected a3 Color to match C-axis
            drawAxis(new THREE.Vector3(1.5, 0, 0), 0xff5555, 'a1', 'x-lbl'); // Red
            drawAxis(new THREE.Vector3(-0.75, 1.3, 0), 0x55ff55, 'a2', 'y-lbl'); // Green
            drawAxis(new THREE.Vector3(-0.75, -1.3, 0), 0x5555ff, 'a3', 'z-lbl'); // Blue (Fixed)
            drawAxis(new THREE.Vector3(0, 0, 2.1), 0x5555ff, 'c', 'z-lbl'); // Blue
        }

        function renderMillerGeometry(h, k, l) {
            activeGroup.clear();
            drawHexSkeleton();

            if (!isDirectionMode) {
                const pts = getHexPlanePts(h, k, l);
                if (pts.length >= 3) {
                    const geometry = new THREE.BufferGeometry();
                    const vertices = new Float32Array(pts.length * 3);
                    pts.forEach((p, i) => {
                        vertices[i*3] = p.x; vertices[i*3+1] = p.y; vertices[i*3+2] = p.z;
                    });
                    geometry.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
                    
                    // Simple triangulation for polygon mapping
                    let indices = [];
                    for (let i = 1; i < pts.length - 1; i++) {
                        indices.push(0, i, i + 1);
                    }
                    geometry.setIndex(indices);
                    geometry.computeVertexNormals();

                    const mesh = new THREE.Mesh(geometry, planeMaterial);
                    activeGroup.add(mesh);
                }
            } else {
                // Direction Vector rendering logic goes here
            }
        }

        // --- SECTION 4: Direction Math UI Table Logic ---
        function updateDirectionMath(hx, hy, hz, tx, ty, tz) {
            let dx = hx - tx; let dy = hy - ty; let dz = hz - tz;

            document.getElementById('dir-head-val').innerText = `${hx}, ${hy}, ${hz}`;
            document.getElementById('dir-tail-val').innerText = `${tx}, ${ty}, ${tz}`;
            document.getElementById('dir-diff-val').innerText = `${dx}, ${dy}, ${dz}`;

            const gcd = (a, b) => b === 0 ? a : gcd(b, a % b);
            let divisor = Math.abs(gcd(dx, gcd(dy, dz)));
            if (divisor === 0) divisor = 1; 

            let rx = dx / divisor; let ry = dy / divisor; let rz = dz / divisor;
            document.getElementById('dir-reduce-val').innerText = `${rx}, ${ry}, ${rz}`;

            let formatNeg = (val) => val < 0 ? `-${Math.abs(val)}` : val; 
            document.getElementById('dir-final-val').innerText = `[${formatNeg(rx)} ${formatNeg(ry)} ${formatNeg(rz)}]`;
        }

        // --- INTERACTION HOOKS ---
        function toggleSystem() {
            isHexagonalMode = !isHexagonalMode;
            document.getElementById('toggle-system').innerText = isHexagonalMode ? "Switch to Cubic" : "Switch to Hexagonal";
            planeMaterial.clippingPlanes = isHexagonalMode ? hexClippingPlanes : [];
            // Re-render trigger
            renderMillerGeometry(1, 1, 0); // Example redraw
        }

        function toggleMode() {
            isDirectionMode = !isDirectionMode;
            document.getElementById('toggle-mode').innerText = isDirectionMode ? "Switch to Plane" : "Switch to Direction";
            document.getElementById('direction-math-panel').style.display = isDirectionMode ? "block" : "none";
            // Re-render trigger
            renderMillerGeometry(1, 1, 0);
        }

        // Init
        renderMillerGeometry(-1, -1, 2); // Initial test plane

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // Window resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>

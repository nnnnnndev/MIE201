<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Diffusion Kinetics: The Professor's Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { margin: 0; background: #020205; color: white; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        #ui { 
            width: 340px; background: rgba(5, 5, 15, 0.98); border-right: 1px solid #00ffff; 
            display: flex; flex-direction: column; padding: 25px; box-sizing: border-box; z-index: 100;
        }

        .header { font-weight: 900; font-size: 1.2rem; color: #fff; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; border-bottom: 1px solid #1a1a3a; padding-bottom: 10px;}
        
        .stat-card { background: #000; border: 1px solid #223; padding: 12px; border-radius: 8px; margin-bottom: 10px; }
        .stat-label { font-size: 0.65rem; color: #888; text-transform: uppercase; }
        .stat-val { font-size: 1.4rem; font-weight: 900; font-family: 'Courier New', monospace; }

        .slider-wrap { margin: 20px 0; }
        label { display: flex; justify-content: space-between; font-size: 0.8rem; color: #00ffff; margin-bottom: 8px; font-weight: 600; text-transform: uppercase; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #ff00ff; height: 4px; }
        
        button { 
            width: 100%; padding: 12px; background: #0a0a1a; border: 1px solid #445; color: #fff; 
            cursor: pointer; border-radius: 6px; font-weight: bold; margin-bottom: 10px; text-transform: uppercase;
        }
        #btn-start { background: #00ffff; color: #000; border: none; }

        #main-content { flex-grow: 1; display: flex; flex-direction: column; background: #05050a; position: relative; }
        #canvas-wrap { flex: 3; position: relative; border-bottom: 1px solid #1a1a3a; }
        #graph-wrap { flex: 2; padding: 20px; box-sizing: border-box; background: #020205; }
        canvas { display: block; width: 100%; height: 100%; }
    </style>
</head>
<body>

<div id="ui">
    <div class="header">Kinetic Explorer</div>
    
    <div class="stat-card">
        <div class="stat-label">Interstitial (Cyan) Laps</div>
        <div class="stat-val" id="int-val" style="color: #00ffff;">0</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Vacancy (Magenta) Laps</div>
        <div class="stat-val" id="vac-val" style="color: #ff00ff;">0</div>
    </div>

    <div class="slider-wrap">
        <label>Temperature (K) <b id="disp-t">1000</b></label>
        <input type="range" id="in-t" min="600" max="1600" step="10" value="1000">
    </div>

    <button id="btn-start" onclick="toggleSim()">▶ Start Simulation</button>
    <button onclick="resetSim()">Reset All</button>

    <div style="font-size: 0.7rem; color: #556; line-height: 1.4; margin-top: auto;">
        <b>Note:</b> Vacancy exchange probability is artificially boosted for classroom demonstration. Real-world rates are orders of magnitude slower.
    </div>
</div>

<div id="main-content">
    <div id="canvas-wrap">
        <canvas id="sim-canvas"></canvas>
    </div>
    <div id="graph-wrap">
        <canvas id="chart-canvas"></canvas>
    </div>
</div>

<script>
    const canvas = document.getElementById('sim-canvas');
    const ctx = canvas.getContext('2d');
    let chart;

    let T = 1000;
    let isRunning = false;
    let time = 0;
    let animationId;

    const spacing = 32;
    const atomRadius = 10;
    const gridRows = 8;
    let gridCols;

    // Atoms
    let intAtom = { c: 0, r: 3.5, laps: 0 }; 
    let vacTracer = { c: 0, r: 4, laps: 0 };
    let vacancies = [];

    function init() {
        window.addEventListener('resize', resize);
        document.getElementById('in-t').oninput = (e) => {
            T = parseInt(e.target.value);
            document.getElementById('disp-t').innerText = T;
        };
        resize();
        initChart();
        resetSim();
    }

    function resize() {
        const wrap = document.getElementById('canvas-wrap');
        canvas.width = wrap.clientWidth;
        canvas.height = wrap.clientHeight;
        gridCols = Math.floor((canvas.width - 100) / spacing);
        draw();
    }

    function toggleSim() {
        isRunning = !isRunning;
        document.getElementById('btn-start').innerText = isRunning ? "|| Pause" : "▶ Resume";
        if (isRunning) animate();
    }

    function resetSim() {
        isRunning = false;
        time = 0;
        intAtom = { c: 0, r: 3.5, laps: 0 };
        vacTracer = { c: 0, r: 4, laps: 0 };
        // Scatter vacancies randomly across the grid
        vacancies = [];
        for(let i=0; i<8; i++) {
            vacancies.push({ 
                c: Math.floor(Math.random() * gridCols), 
                r: Math.floor(Math.random() * gridRows) 
            });
        }
        updateUI();
        draw();
        updateChart();
    }

    function updateUI() {
        document.getElementById('int-val').innerText = intAtom.laps;
        document.getElementById('vac-val').innerText = vacTracer.laps;
    }

    function animate() {
        if (!isRunning) return;
        time += 0.05;

        const jumpProb = (T - 400) / 1200;

        // --- INTERSTITIAL: TRUE RANDOM WALK ---
        // High frequency, centered in 4-atom voids
        for(let i=0; i<20; i++) {
            if (Math.random() < 0.1 * jumpProb) {
                const dir = Math.floor(Math.random() * 4);
                if (dir === 0) intAtom.c++;
                else if (dir === 1) intAtom.c--;
                else if (dir === 2) intAtom.r++;
                else intAtom.r--;

                // Clamp & Lap
                if (intAtom.r < 0.5) intAtom.r = 0.5;
                if (intAtom.r > 6.5) intAtom.r = 6.5;
                if (intAtom.c < 0) intAtom.c = 0;
                if (intAtom.c >= gridCols) { intAtom.c = 0; intAtom.laps++; updateUI(); }
            }
        }

        // --- VACANCY: TRUE RANDOM WALK (SPED UP) ---
        // Vacancies move randomly
        vacancies.forEach(v => {
            if (Math.random() * 0.5 < jumpProb) {
                const dirs = [[0,1], [1,0], [0,-1], [-1,0]];
                const d = dirs[Math.floor(Math.random() * 4)];
                let nc = v.c + d[0], nr = v.r + d[1];

                if (nc >= 0 && nc < gridCols && nr >= 0 && nr < gridRows) {
                    // Check for interaction with Tracer
                    if (nc === vacTracer.c && nr === vacTracer.r) {
                        // High swap probability for engagement
                        if (Math.random() < 0.9) {
                            vacTracer.c = v.c; vacTracer.r = v.r;
                            v.c = nc; v.r = nr;
                        }
                    } else {
                        v.c = nc; v.r = nr;
                    }
                }
            }
        });

        if (vacTracer.c >= gridCols) { vacTracer.c = 0; vacTracer.laps++; updateUI(); }
        if (vacTracer.c < 0) vacTracer.c = 0;

        if (Math.floor(time * 10) % 5 === 0) updateChart();
        
        draw();
        animationId = requestAnimationFrame(animate);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const ox = 50, oy = canvas.height/2 - (gridRows * spacing)/2;

        // Bulk atoms
        for(let r=0; r<gridRows; r++) {
            for(let c=0; c<gridCols; c++) {
                let isV = vacancies.find(v => v.c === c && v.r === r);
                let isT = vacTracer.c === c && vacTracer.r === r;
                let x = ox + c * spacing, y = oy + r * spacing;

                if (isT) drawAtom(x, y, atomRadius*1.2, "#ff00ff", true);
                else if (isV) drawAtom(x, y, atomRadius, "#ff00ff", false);
                else drawAtom(x, y, atomRadius, "#221a10", true);
            }
        }

        // Interstitial - Centered in 4-atom void
        let ix = ox + intAtom.c * spacing + spacing/2;
        let iy = oy + intAtom.r * spacing + spacing/2;
        drawAtom(ix, iy, atomRadius * 0.7, "#00ffff", true);
    }

    function drawAtom(x, y, r, col, fill) {
        ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
        if (fill) { ctx.fillStyle = col; ctx.fill(); }
        else { ctx.strokeStyle = col; ctx.setLineDash([2,2]); ctx.stroke(); ctx.setLineDash([]); }
    }

    function initChart() {
        const ctxChart = document.getElementById('chart-canvas').getContext('2d');
        chart = new Chart(ctxChart, {
            type: 'line',
            data: { labels: Array.from({length: 50}, (_, i) => i), datasets: [
                { label: 'Concentration C(x,t)', borderColor: '#00ffff', data: [], borderWeight: 2, pointRadius: 0, fill: true, backgroundColor: 'rgba(0, 255, 255, 0.05)' }
            ]},
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: {
                    y: { min: 0, max: 1, grid: { color: '#1a1a3a' }, ticks: { color: '#555' } },
                    x: { title: { display: true, text: 'Distance (x)', color: '#555' }, grid: { display: false } }
                },
                plugins: { legend: { display: false } }
            }
        });
    }

    function erf(x) {
        const a = [0.254829592, -0.284496736, 1.421413741, -1.453152027, 1.061405429];
        const p = 0.3275911;
        const sign = (x < 0) ? -1 : 1;
        x = Math.abs(x);
        const t = 1.0 / (1.0 + p * x);
        const y = 1.0 - (((((a[4] * t + a[3]) * t) + a[2]) * t + a[1]) * t + a[0]) * t * Math.exp(-x * x);
        return sign * y;
    }

    function updateChart() {
        const Cs = 1.0, C0 = 0.05;
        const D0 = 1e-4;
        const Q = 80000; 
        const R = 8.314;
        const D = D0 * Math.exp(-Q / (R * T));
        const effectiveTime = time * 5000;

        const newData = [];
        for (let x = 0; x < 50; x++) {
            const val = Cs - (Cs - C0) * erf(x / (2 * Math.sqrt(D * effectiveTime + 0.1)));
            newData.push(val);
        }
        chart.data.datasets[0].data = newData;
        chart.update('none');
    }

    init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Kinetic Explorer: The Time-Scale Lab</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { margin: 0; background: #020205; color: white; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        #ui { 
            width: 350px; background: rgba(5, 5, 15, 0.98); border-right: 1px solid #00ffff; 
            display: flex; flex-direction: column; padding: 25px; box-sizing: border-box; z-index: 100;
        }

        .header { font-weight: 900; font-size: 1.1rem; color: #fff; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .sub-header { font-size: 0.7rem; color: #00ffff; margin-bottom: 20px; opacity: 0.8; border-bottom: 1px solid #1a1a3a; padding-bottom: 10px; }
        
        .stat-card { background: #000; border: 1px solid #223; padding: 12px; border-radius: 8px; margin-bottom: 10px; position: relative; }
        .stat-label { font-size: 0.6rem; color: #888; text-transform: uppercase; }
        .stat-val { font-size: 1.4rem; font-weight: 900; font-family: 'Courier New', monospace; }

        .slider-wrap { margin: 18px 0; }
        label { display: flex; justify-content: space-between; font-size: 0.75rem; color: #00ffff; margin-bottom: 8px; font-weight: 600; text-transform: uppercase; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #ff00ff; height: 4px; }
        
        select { width: 100%; padding: 10px; background: #0a0a1a; border: 1px solid #445; color: #00ffff; border-radius: 6px; font-weight: bold; margin-bottom: 20px; outline: none; }

        button { 
            width: 100%; padding: 12px; background: #0a0a1a; border: 1px solid #445; color: #fff; 
            cursor: pointer; border-radius: 6px; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; transition: 0.2s;
        }
        #btn-start { background: #00ffff; color: #000; border: none; box-shadow: 0 0 15px rgba(0, 255, 255, 0.3); }

        #main-content { flex-grow: 1; display: flex; flex-direction: column; background: #05050a; }
        #canvas-wrap { flex: 3; position: relative; border-bottom: 1px solid #1a1a3a; cursor: crosshair; }
        #graph-wrap { flex: 2; padding: 20px; box-sizing: border-box; background: #020205; }
        canvas { display: block; width: 100%; height: 100%; }

        .finish-gate { position: absolute; left: 60px; top: 0; bottom: 0; width: 4px; background: #00ffff; opacity: 0.3; box-shadow: 0 0 20px #00ffff; }
    </style>
</head>
<body>

<div id="ui">
    <div class="header">Kinetic Explorer</div>
    <div class="sub-header">Diffusion Race: Right → Left</div>
    
    <div class="stat-card">
        <div class="stat-label">Interstitial (Cyan) Laps</div>
        <div class="stat-val" id="int-val" style="color: #00ffff;">0</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Vacancy (Magenta) Laps</div>
        <div class="stat-val" id="vac-val" style="color: #ff00ff;">0</div>
    </div>

    <div class="slider-wrap">
        <label>Temperature (K) <b id="disp-t">1000</b></label>
        <input type="range" id="in-t" min="600" max="1600" step="10" value="1000">
    </div>

    <div class="slider-wrap">
        <label>Vacancy Speed Boost</label>
        <select id="boost-select">
            <option value="1000">1,000x Speedup</option>
            <option value="10000">10,000x Speedup</option>
            <option value="50000">50,000x Speedup</option>
            <option value="100000" selected>100,000x (Simulation Mode)</option>
        </select>
    </div>

    <button id="btn-start" onclick="toggleSim()">▶ Start Simulation</button>
    <button onclick="resetSim()">Reset Lattice</button>

    <div style="font-size: 0.65rem; color: #556; line-height: 1.4; margin-top: auto;">
        *Note: At 1,000K, a real vacancy swap occurs roughly once every 10^7 vibrations. The tracer is "sped up" here so you don't have to wait until next semester.
    </div>
</div>

<div id="main-content">
    <div id="canvas-wrap">
        <div class="finish-gate"></div>
        <canvas id="sim-canvas"></canvas>
    </div>
    <div id="graph-wrap">
        <canvas id="chart-canvas"></canvas>
    </div>
</div>

<script>
    const canvas = document.getElementById('sim-canvas');
    const ctx = canvas.getContext('2d');
    let chart;

    let T = 1000;
    let isRunning = false;
    let time = 0;
    let animationId;

    const spacing = 34;
    const atomRadius = 11;
    const gridRows = 8;
    let gridCols;

    let intAtom = { c: 0, r: 3, laps: 0 }; 
    let vacTracer = { c: 0, r: 4, laps: 0 };
    let vacancies = [];

    function init() {
        window.addEventListener('resize', resize);
        document.getElementById('in-t').oninput = (e) => {
            T = parseInt(e.target.value);
            document.getElementById('disp-t').innerText = T;
        };
        resize();
        initChart();
        resetSim();
    }

    function resize() {
        const wrap = document.getElementById('canvas-wrap');
        canvas.width = wrap.clientWidth;
        canvas.height = wrap.clientHeight;
        gridCols = Math.floor((canvas.width - 120) / spacing);
        draw();
    }

    function toggleSim() {
        isRunning = !isRunning;
        document.getElementById('btn-start').innerText = isRunning ? "|| Pause" : "▶ Resume";
        if (isRunning) animate();
    }

    function resetSim() {
        isRunning = false;
        time = 0;
        gridCols = Math.floor((canvas.width - 120) / spacing);
        // Start on the far RIGHT for the race
        intAtom = { c: gridCols - 2, r: 3.5, laps: 0 };
        vacTracer = { c: gridCols - 1, r: 4, laps: 0 };
        
        // Distribute 15 vacancies throughout the entire grid
        vacancies = [];
        for(let i=0; i<15; i++) {
            vacancies.push({ 
                c: Math.floor(Math.random() * gridCols), 
                r: Math.floor(Math.random() * gridRows) 
            });
        }
        updateUI();
        draw();
    }

    function updateUI() {
        document.getElementById('int-val').innerText = intAtom.laps;
        document.getElementById('vac-val').innerText = vacTracer.laps;
    }

    function animate() {
        if (!isRunning) return;
        time += 0.05;

        const boost = parseInt(document.getElementById('boost-select').value);
        const jumpFreq = ((T - 400) / 1200) * (boost / 100000);

        // --- INTERSTITIAL: Drift Left (towards finish) ---
        // Jump 10 times more often than the vacancy tracer's BASE rate
        for(let i=0; i<25; i++) {
            if (Math.random() < 0.1 * ((T - 400) / 1200)) {
                const move = Math.random();
                let nc = intAtom.c, nr = intAtom.r;
                if (move < 0.50) nc--;      // 50% Left (Race direction)
                else if (move < 0.70) nc++; // 20% Back
                else if (move < 0.85) nr++; 
                else nr--;

                if (nr >= 0.5 && nr <= gridRows - 1.5 && nc <= gridCols - 2) {
                    intAtom.c = nc; intAtom.r = nr;
                }
                if (intAtom.c < 0) { intAtom.c = gridCols - 2; intAtom.laps++; updateUI(); }
            }
        }

        // --- VACANCY: Drift Right to push Tracer Left ---
        // Vacancies move randomly but drift RIGHT
        vacancies.forEach(v => {
            if (Math.random() < 0.8 * jumpFreq) {
                const move = Math.random();
                let dc=0, dr=0;
                if (move < 0.45) dc = 1;     // Bias RIGHT to push tracer LEFT
                else if (move < 0.65) dc = -1;
                else if (move < 0.825) dr = 1;
                else dr = -1;

                let nc = v.c + dc, nr = v.r + dr;
                if (nc >= 0 && nc < gridCols && nr >= 0 && nr < gridRows) {
                    // Interaction logic
                    if (nc === vacTracer.c && nr === vacTracer.r) {
                        // SWAP
                        vacTracer.c = v.c; vacTracer.r = v.r;
                        v.c = nc; v.r = nr;
                    } else if (!vacancies.find(o => o.c === nc && o.r === nr)) {
                        v.c = nc; v.r = nr;
                    }
                }
            }
        });

        if (vacTracer.c < 0) { vacTracer.c = gridCols - 1; vacTracer.laps++; updateUI(); }

        if (Math.floor(time * 10) % 5 === 0) updateChart();
        draw();
        animationId = requestAnimationFrame(animate);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const ox = 60, oy = canvas.height/2 - (gridRows * spacing)/2;

        // BULK: International Orange
        for(let r=0; r<gridRows; r++) {
            for(let c=0; c<gridCols; c++) {
                let isV = vacancies.find(v => v.c === c && v.r === r);
                let isT = vacTracer.c === c && vacTracer.r === r;
                let x = ox + c * spacing, y = oy + r * spacing;

                if (isT) drawAtom(x, y, atomRadius*1.3, "#ff00ff", true);
                else if (isV) drawAtom(x, y, atomRadius, "#ff00ff", false);
                else drawAtom(x, y, atomRadius, "#ff4e00", true); 
            }
        }

        // INTERSTITIAL: In the quad-void center
        let ix = ox + intAtom.c * spacing + spacing/2;
        let iy = oy + intAtom.r * spacing + spacing/2;
        drawAtom(ix, iy, atomRadius * 0.65, "#00ffff", true);
    }

    function drawAtom(x, y, r, col, fill) {
        ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
        if (fill) { 
            ctx.fillStyle = col; 
            ctx.fill(); 
            if(col !== "#ff4e00") { ctx.shadowBlur=12; ctx.shadowColor=col; }
        } else { 
            ctx.strokeStyle = col; ctx.lineWidth = 2; ctx.setLineDash([3,2]); ctx.stroke(); ctx.setLineDash([]); ctx.shadowBlur=0;
        }
    }

    function initChart() {
        const ctxChart = document.getElementById('chart-canvas').getContext('2d');
        chart = new Chart(ctxChart, {
            type: 'line',
            data: { labels: Array.from({length: 60}, (_, i) => 60 - i), datasets: [
                { label: 'C(x,t)', borderColor: '#00ffff', data: [], borderWeight: 2, pointRadius: 0, fill: true, backgroundColor: 'rgba(0, 255, 255, 0.05)' }
            ]},
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: {
                    y: { min: 0, max: 1, grid: { color: '#1a1a3a' }, ticks: { display: false } },
                    x: { grid: { display: false }, ticks: { display: false }, reverse: true }
                },
                plugins: { legend: { display: false } }
            }
        });
    }

    function erf(x) {
        const a = [0.254829592, -0.284496736, 1.421413741, -1.453152027, 1.061405429];
        const p = 0.3275911;
        const sign = (x < 0) ? -1 : 1;
        x = Math.abs(x);
        const t = 1.0 / (1.0 + p * x);
        const y = 1.0 - (((((a[4] * t + a[3]) * t) + a[2]) * t + a[1]) * t + a[0]) * t * Math.exp(-x * x);
        return sign * y;
    }

    function updateChart() {
        const Cs = 1.0, C0 = 0.05;
        const D = 1e-4 * Math.exp(-85000 / (8.314 * T));
        const effectiveTime = time * 5000;
        const newData = [];
        for (let x = 0; x < 60; x++) {
            const val = Cs - (Cs - C0) * erf(x / (2 * Math.sqrt(D * effectiveTime + 0.1)));
            newData.push(val);
        }
        chart.data.datasets[0].data = newData;
        chart.update('none');
    }

    init();
</script>
</body>
</html>

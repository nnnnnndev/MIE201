<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ch 7: Strengthening Mechanisms</title>
    <style>
        :root { --bg: #050505; --cyan: #00ffff; --magenta: #ff00ff; --yellow: #ffff00; --orange: #ff8c00; --silver: #cccccc; --grid: rgba(255, 0, 255, 0.15); }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; display: flex; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--cyan); overflow: hidden; font-weight: 900; }
        
        #sidebar { width: 340px; background: rgba(0,0,0,0.95); border-right: 2px solid var(--magenta); padding: 20px; display: flex; flex-direction: column; z-index: 100; box-shadow: 10px 0 30px rgba(0,0,0,0.8); }
        h1 { font-size: 0.85rem; color: var(--magenta); text-transform: uppercase; margin: 0 0 15px 0; border-bottom: 1px solid var(--magenta); padding-bottom: 5px; letter-spacing: 1px; }
        
        select { background: #111; color: var(--cyan); border: 1px solid var(--cyan); padding: 10px; margin-bottom: 20px; font-weight: bold; width: 100%; cursor: pointer; font-size: 0.9rem; }
        
        .control-block { background: #0a0a0a; border: 1px solid #333; padding: 15px; margin-bottom: 15px; border-radius: 4px; }
        .label-row { display: flex; justify-content: space-between; font-size: 0.8rem; color: #fff; margin-bottom: 10px; text-transform: uppercase; }
        input[type=range] { width: 100%; accent-color: var(--magenta); cursor: pointer; }

        #readouts { margin-top: auto; border: 1px solid var(--cyan); padding: 15px; background: rgba(0, 255, 255, 0.05); }
        .stat { display: flex; justify-content: space-between; font-size: 1.1rem; margin: 8px 0; color: var(--yellow); }
        .stat-main { font-size: 1.3rem; color: #00ff00; border-top: 1px solid #444; padding-top: 10px; margin-top: 10px; }
        
        #stage { flex: 1; display: flex; flex-direction: column; background: radial-gradient(circle at center, #111 0%, #000 100%); position: relative; }
        
        /* Top Panel Tabs */
        .tab-bar { display: flex; border-bottom: 2px solid #333; background: rgba(0,0,0,0.9); z-index: 10; }
        .tab-btn { flex: 1; padding: 15px; background: transparent; color: #666; border: none; outline: none; font-family: 'Segoe UI', sans-serif; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: 0.3s; font-size: 0.9rem; }
        .tab-btn:hover { color: var(--cyan); background: rgba(0, 255, 255, 0.05); }
        .tab-btn.active { color: var(--magenta); border-bottom: 3px solid var(--magenta); background: rgba(255, 0, 255, 0.05); color: #fff; }

        /* View Containers */
        .view-container { flex: 1; padding: 20px; gap: 20px; overflow: hidden; }
        #view-sim { display: flex; flex-direction: column; }
        #view-news { display: none; flex-direction: column; overflow-y: auto; padding-right: 15px; }

        .panel { background: rgba(0,0,0,0.8); border: 1px solid #333; border-radius: 8px; box-shadow: 0 5px 20px rgba(0,0,0,0.5); position: relative; display: flex; flex-direction: column; }
        
        /* Plot Area */
        #plot-container { flex: 1; min-height: 250px; padding: 10px; overflow: hidden; }
        svg { width: 100%; height: 100%; overflow: visible; }
        .axis { stroke: var(--magenta); stroke-width: 2; }
        .grid { stroke: var(--grid); stroke-width: 1; }
        .curve { fill: none; stroke: var(--cyan); stroke-width: 4; filter: drop-shadow(0 0 5px var(--cyan)); }
        .tracker { fill: var(--magenta); stroke: #fff; stroke-width: 2; filter: drop-shadow(0 0 8px var(--magenta)); }
        .tracker-line { stroke: var(--yellow); stroke-width: 1.5; stroke-dasharray: 4,4; }
        .math-lbl { fill: var(--cyan); font-size: 13px; font-family: 'Times New Roman', serif; font-style: italic; }
        .math-eq { fill: #fff; font-size: 16px; font-family: 'Times New Roman', serif; font-style: italic; font-weight: normal; }
        text { fill: var(--magenta); font-size: 12px; font-family: 'Consolas', monospace; font-weight: bold; }
        .axis-lbl { fill: var(--yellow); font-size: 14px; text-transform: uppercase; font-family: 'Segoe UI', sans-serif; }

        /* News Feed Area */
        .news-card { background: #111; border-left: 4px solid var(--cyan); padding: 20px; margin-bottom: 15px; border-radius: 0 8px 8px 0; transition: transform 0.2s; }
        .news-card:hover { transform: translateX(3px); background: #141414; border-left-color: var(--magenta); }
        .news-header { display: flex; justify-content: space-between; margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 8px; }
        .news-concept { color: var(--yellow); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        .news-source { color: #888; font-size: 0.85rem; }
        .news-title { color: #fff; font-size: 1.3rem; margin-bottom: 5px; text-decoration: none; display: inline-block; transition: 0.2s; font-weight: bold; }
        .news-title:hover { color: var(--cyan); }
        .news-authors { color: #777; font-size: 0.85rem; font-style: italic; margin-bottom: 12px; }
        .news-summary { color: #ccc; font-size: 0.95rem; line-height: 1.5; font-weight: normal; margin-bottom: 15px; }
        
        .preview-toggle { background: #222; color: var(--cyan); border: 1px solid #444; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; text-transform: uppercase; font-weight: bold; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .preview-toggle:hover { background: #333; border-color: var(--cyan); }
        .abstract-preview { display: none; background: #0a0a0a; border: 1px solid #333; padding: 15px; margin-top: 10px; border-radius: 4px; color: #aaa; font-size: 0.9rem; line-height: 1.6; border-left: 2px solid var(--yellow); }

        /* Sim Area */
        #sim-container { flex: 1.5; display: flex; flex-direction: column; cursor: crosshair; overflow: hidden; }
        .sim-title { font-size: 0.8rem; color: var(--yellow); text-transform: uppercase; padding: 10px; border-bottom: 1px solid #333; letter-spacing: 1px; text-align: center; }
        .sim-hint { font-size: 0.7rem; color: #aaa; text-align: center; margin-top: -5px; padding-bottom: 5px; }
        canvas { width: 100%; height: 100%; flex: 1; display: block; }

        /* Magnified Inset Overlay */
        #inset-overlay { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 450px; background: rgba(10,10,10,0.95); border: 2px solid var(--cyan); border-radius: 8px; padding: 20px; box-shadow: 0 0 50px rgba(0,255,255,0.2); z-index: 200; cursor: pointer; }
        .inset-title { color: var(--cyan); text-align: center; text-transform: uppercase; margin-bottom: 15px; font-size: 1.1rem; border-bottom: 1px solid var(--cyan); padding-bottom: 5px; }
        #inset-svg { width: 100%; height: 250px; }
    </style>
</head>
<body>

<div id="sidebar">
    <h1>Strengthening Mechanism</h1>
    <select id="mode-select">
        <option value="hp">Grain Size Reduction (Hall-Petch)</option>
        <option value="ss">Solid Solution Alloying (Cu-Ni)</option>
        <option value="cw">Strain Hardening (Cold Work)</option>
    </select>

    <h1>Control Parameter</h1>
    <div class="control-block">
        <div class="label-row"><span id="param-lbl">Grain Size (d)</span><span id="param-val">--</span></div>
        <input type="range" id="main-slider" min="0" max="100" value="0">
    </div>

    <div id="readouts">
        <div class="stat"><span id="lbl-sigma0">Base Yield (&sigma;<sub>0</sub>):</span><span id="val-sigma0">50 MPa</span></div>
        <div class="stat" style="color: var(--cyan);"><span>Increase (&Delta;&sigma;):</span><span id="out-delta">0 MPa</span></div>
        <div class="stat stat-main"><span>Total Yield (&sigma;<sub>y</sub>):</span><span id="out-total">50 MPa</span></div>
    </div>
</div>

<div id="stage">
    <div class="tab-bar">
        <button class="tab-btn active" id="tab-sim" onclick="switchTab('sim')">Analytical Plot & Simulation</button>
        <button class="tab-btn" id="tab-news" onclick="switchTab('news')">Real-World Context</button>
    </div>

    <div id="view-sim" class="view-container">
        <div class="panel" id="plot-container">
            <svg id="plot"></svg>
        </div>
        
        <div class="panel" id="sim-container">
            <div class="sim-title">Microscopic Dislocation Glide</div>
            <div class="sim-hint" id="sim-hint">Watch lattice misorientation at Grain Boundaries (dashed yellow)</div>
            <canvas id="sim-canvas"></canvas>
        </div>
    </div>

    <div id="view-news" class="view-container">
        </div>

    <div id="inset-overlay" onclick="closeInset()">
        <div class="inset-title" id="inset-title">Mechanism Schematic</div>
        <svg id="inset-svg"></svg>
        <div style="text-align: center; color: #666; font-size: 0.7rem; margin-top: 10px;">CLICK ANYWHERE TO CLOSE</div>
    </div>
</div>

<script>
    // --- Real-World Data Feed with DOIs and Abstracts ---
    const realWorldFeed = [
        {
            title: "Strength and ductility of nanocrystalline and ultrafine grain metals",
            authors: "Meyers, M. A., et al.",
            date: "2006", source: "Progress in Materials Science",
            concept: "Hall-Petch & Grain Boundaries",
            summary: "A comprehensive review detailing the physical limitations of the Hall-Petch equation. When grain sizes drop below ~10 nm, the traditional dislocation pile-up mechanism collapses, and the material begins to soften via grain boundary sliding.",
            abstract: "The mechanical behavior of nanocrystalline and ultrafine-grained metals deviates significantly from coarse-grained counterparts. This paper reviews the transition from dislocation-mediated plasticity (governed by the classical Hall-Petch relationship) to grain-boundary-mediated plasticity (inverse Hall-Petch). It structurally models how dislocations emit, glide, and annihilate entirely at grain boundaries when the physical grain volume is too small to support traditional dislocation forests.",
            url: "https://doi.org/10.1016/j.pmatsci.2006.02.002", tags: ["hp"]
        },
        {
            title: "Making ultrahard and tough nanocrystalline metals with gradient structures",
            authors: "Lu, K.",
            date: "2014", source: "Science (AAAS)",
            concept: "Grain Boundary Tiling",
            summary: "Seminal paper demonstrating that embedding a gradient of nanoscale grain sizes forces continuous dislocation interactions, achieving theoretical strength limits without catastrophic brittle failure.",
            abstract: "Materials scientists have long sought to create metals that are both extremely strong and highly ductile. Usually, increasing strength inherently compromises ductility. Here, we demonstrate that a spatial gradient in grain size—from tens of nanometers at the surface to macroscopic sizes in the core—forces dislocations to accumulate and interact dynamically. This gradient structure generates a unique strain-hardening mechanism.",
            url: "https://doi.org/10.1126/science.1255940", tags: ["hp"]
        },
        {
            title: "Solid solution hardening of high-entropy alloys",
            authors: "Senkov, O. N., et al.",
            date: "2011", source: "Intermetallics",
            concept: "Solid Solution Pinning",
            summary: "Explores how High-Entropy Alloys maximize solid solution strengthening by creating massive, chaotic localized lattice strains that trap moving dislocations.",
            abstract: "In traditional alloys, solid solution strengthening relies on one primary element doped with minority solutes. In multiprincipal element (high-entropy) alloys, every atom can be considered a solute. The immense variability in atomic radii and shear moduli creates overlapping, high-intensity tensile and compressive stress fields that effectively pin edge dislocations, drastically increasing the yield stress and thermal stability.",
            url: "https://doi.org/10.1016/j.intermet.2011.08.004", tags: ["ss"]
        },
        {
            title: "Kinetics of flow and strain-hardening",
            authors: "Mecking, H., Kocks, U. F.",
            date: "1981", source: "Acta Metallurgica",
            concept: "Strain Hardening / Cold Work",
            summary: "The foundational physics paper establishing the modern understanding of the square-root dependence of yield stress on dislocation density (ρ^1/2).",
            abstract: "We present a unified macroscopic phenomenological description of strain hardening in FCC metals. The flow stress is governed by the square root of the total dislocation density. Strain hardening is modeled as a competition between athermal dislocation storage (forest dislocation generation) and thermally activated dynamic recovery, providing the definitive explanation for the parabolic nature of the stress-strain curve.",
            url: "https://doi.org/10.1016/0001-6160(81)90147-1", tags: ["cw"]
        },
        {
            title: "Breaking the Inverse Hall-Petch Limit with Amorphous Boundaries",
            authors: "Hu, J., et al.",
            date: "2020", source: "Science",
            concept: "Nanocrystalline Boundaries",
            summary: "By introducing amorphous complexions at the boundaries, engineers prevented grain boundary sliding, pushing the strength of copper to unprecedented limits.",
            abstract: "The classic Hall-Petch relationship breaks down at extreme nanoscales because grain boundary sliding becomes energetically favorable to dislocation glide. By engineering ultra-thin amorphous (glassy) phase complexions at the grain boundaries of copper alloys, we suppressed boundary sliding. The amorphous boundaries act as perfect blockers for dislocations.",
            url: "https://doi.org/10.1126/science.aay7508", tags: ["hp"]
        }
    ];

    // --- Tab Logic & Feed Rendering ---
    let activeTab = 'sim';

    function switchTab(tabId) {
        activeTab = tabId;
        document.getElementById('tab-sim').classList.remove('active');
        document.getElementById('tab-news').classList.remove('active');
        document.getElementById('view-sim').style.display = 'none';
        document.getElementById('view-news').style.display = 'none';

        document.getElementById(`tab-${tabId}`).classList.add('active');
        document.getElementById(`view-${tabId}`).style.display = 'flex';

        if(tabId === 'sim') setTimeout(updateState, 10); 
    }

    window.toggleAbstract = function(id) {
        const previewDiv = document.getElementById(`abstract-${id}`);
        previewDiv.style.display = (previewDiv.style.display === 'block') ? 'none' : 'block';
    }

    function renderFeed(currentMode) {
        const container = document.getElementById('view-news');
        container.innerHTML = '';
        const filteredFeed = realWorldFeed.filter(article => article.tags.includes(currentMode));
        const displayFeed = filteredFeed.length > 0 ? filteredFeed : realWorldFeed;

        displayFeed.forEach((article, index) => {
            container.innerHTML += `
                <div class="news-card">
                    <div class="news-header">
                        <span class="news-concept">${article.concept}</span>
                        <span class="news-source">${article.source} | ${article.date}</span>
                    </div>
                    <a href="${article.url}" target="_blank" class="news-title">${article.title} &nearr;</a>
                    <div class="news-authors">${article.authors}</div>
                    <div class="news-summary">${article.summary}</div>
                    <button class="preview-toggle" onclick="toggleAbstract(${index})">&#9660; Read Abstract</button>
                    <div class="abstract-preview" id="abstract-${index}"><strong>ABSTRACT:</strong><br><br>${article.abstract}</div>
                </div>
            `;
        });
    }

    // --- Physics Models (Completely Overhauled Base Equations) ---
    const MODELS = {
        hp: {
            title: "Grain Size (d)", unit: "μm", xLabel: "d⁻¹/² (μm⁻¹/²)",
            minRaw: 100, maxRaw: 1,  // Slider 0-100 maps to 100um down to 1um
            sigma0: 50, k: 150,
            calcX: (raw) => Math.pow(raw, -0.5), // Linear X-axis
            calcY: function(x) { return this.sigma0 + this.k * x; }, 
            formatRaw: (r) => r.toFixed(1), formatX: (x) => x.toFixed(2),
            yAxisMax: 250, xAxisMin: 0, xAxisMax: 1.0
        },
        ss: {
            title: "Ni Concentration (C)", unit: "wt%", xLabel: "Ni Concentration (wt%)",
            minRaw: 0, maxRaw: 100,
            sigmaCu: 60, sigmaNi: 120, k: 800,
            calcX: (raw) => raw, // Raw Parabolic Dome X-axis
            calcY: function(x) { 
                let f = x/100; 
                return this.sigmaCu*(1-f) + this.sigmaNi*(f) + this.k * f * (1-f); 
            }, 
            formatRaw: (r) => r.toFixed(1), formatX: (x) => x.toFixed(0),
            yAxisMax: 350, xAxisMin: 0, xAxisMax: 100
        },
        cw: {
            title: "Cold Work (%CW)", unit: "%", xLabel: "Cold Work (%CW)",
            minRaw: 0, maxRaw: 50,
            sigma0: 50, k: 45,
            calcX: (raw) => raw, // Raw Sqrt Curve X-axis
            calcY: function(x) { return this.sigma0 + this.k * Math.sqrt(x); }, 
            formatRaw: (r) => r.toFixed(1), formatX: (x) => x.toFixed(0),
            yAxisMax: 400, xAxisMin: 0, xAxisMax: 50
        }
    };

    let mode = 'hp';
    let sliderNorm = 0;

    const select = document.getElementById('mode-select');
    const slider = document.getElementById('main-slider');
    const svgPlot = document.getElementById('plot');
    const canvas = document.getElementById('sim-canvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('inset-overlay');

    // --- State Update ---
    function updateState() {
        mode = select.value;
        sliderNorm = parseInt(slider.value) / 100;
        
        const m = MODELS[mode];
        const rawVal = m.minRaw + sliderNorm * (m.maxRaw - m.minRaw);
        const xVal = m.calcX(rawVal);
        const totalSigma = m.calcY(xVal);
        const baseSigma = m.calcY(m.calcX(m.minRaw)); // Base is value at slider = 0
        const deltaSigma = totalSigma - baseSigma;

        document.getElementById('param-lbl').innerText = m.title;
        document.getElementById('param-val').innerText = m.formatRaw(rawVal) + ' ' + m.unit;
        
        document.getElementById('lbl-sigma0').innerHTML = mode === 'ss' ? `Cu Base Yield (&sigma;<sub>Cu</sub>):` : `Base Yield (&sigma;<sub>0</sub>):`;
        document.getElementById('val-sigma0').innerText = Math.round(baseSigma) + ' MPa';
        
        document.getElementById('out-delta').innerText = '+ ' + Math.round(deltaSigma) + ' MPa';
        document.getElementById('out-total').innerText = Math.round(totalSigma) + ' MPa';

        renderFeed(mode); 
        
        if (activeTab === 'sim') {
            renderPlot(m, xVal, totalSigma);
            initLattice(rawVal); 
        }
    }

    // --- Analytical Plot (With Explicit Math Callouts) ---
    function renderPlot(m, currentX, currentY) {
        svgPlot.innerHTML = '';
        const w = svgPlot.clientWidth, h = svgPlot.clientHeight;
        if(w === 0 || h === 0) return; 
        
        const pad = { l: 60, r: 30, t: 30, b: 50 };
        const xMin = m.xAxisMin, xMax = m.xAxisMax, yMax = m.yAxisMax;

        const mX = (x) => pad.l + ((x - xMin) / (xMax - xMin)) * (w - pad.l - pad.r);
        const mY = (y) => h - pad.b - (y / yMax) * (h - pad.t - pad.b);

        // Grid
        for(let y=0; y<=yMax; y+=50) {
            let py = mY(y);
            svgPlot.innerHTML += `<line class="grid" x1="${pad.l}" y1="${py}" x2="${w-pad.r}" y2="${py}"/>`;
            if(y % 100 === 0) svgPlot.innerHTML += `<text x="${pad.l-10}" y="${py+4}" text-anchor="end">${y}</text>`;
        }

        // Axes
        svgPlot.innerHTML += `<line class="axis" x1="${pad.l}" y1="${h-pad.b}" x2="${w-pad.r}" y2="${h-pad.b}"/>`;
        svgPlot.innerHTML += `<line class="axis" x1="${pad.l}" y1="${pad.t}" x2="${pad.l}" y2="${h-pad.b}"/>`;
        svgPlot.innerHTML += `<text class="axis-lbl" x="${w/2}" y="${h-10}" text-anchor="middle">${m.xLabel}</text>`;
        svgPlot.innerHTML += `<text class="axis-lbl" transform="rotate(-90, 20, ${h/2})" x="20" y="${h/2}" text-anchor="middle">Yield Stress (&sigma;y) [MPa]</text>`;

        // Draw Specific Math Callouts based on Mode
        if(mode === 'hp') {
            // Draw Intercept dashed line
            svgPlot.innerHTML += `<line stroke="rgba(255,255,255,0.5)" stroke-width="1" stroke-dasharray="4,4" x1="${pad.l}" y1="${mY(m.sigma0)}" x2="${w-pad.r}" y2="${mY(m.sigma0)}"/>`;
            svgPlot.innerHTML += `<text x="${pad.l + 10}" y="${mY(m.sigma0) - 5}" class="math-lbl" fill="#fff">&sigma;&#x2080;</text>`;
            
            // Draw Slope Triangle
            const triX1 = 0.4, triX2 = 0.7;
            const triY1 = m.calcY(triX1), triY2 = m.calcY(triX2);
            svgPlot.innerHTML += `<line stroke="var(--yellow)" stroke-width="2" x1="${mX(triX1)}" y1="${mY(triY1)}" x2="${mX(triX2)}" y2="${mY(triY1)}"/>`;
            svgPlot.innerHTML += `<line stroke="var(--yellow)" stroke-width="2" x1="${mX(triX2)}" y1="${mY(triY1)}" x2="${mX(triX2)}" y2="${mY(triY2)}"/>`;
            svgPlot.innerHTML += `<text x="${mX(triX2) + 8}" y="${mY((triY1+triY2)/2)}" class="math-lbl" fill="var(--yellow)">k_y</text>`;
            
            // Equation
            svgPlot.innerHTML += `<text x="${w - 180}" y="${pad.t + 20}" class="math-eq">&sigma;y = &sigma;&#x2080; + k_y d&#x207B;&#x00B9;&#x141F;&#x00B2;</text>`;
        } else if (mode === 'cw') {
            svgPlot.innerHTML += `<text x="${w - 180}" y="${pad.t + 20}" class="math-eq">&sigma;y = &sigma;&#x2080; + A&radic;(%CW)</text>`;
        } else if (mode === 'ss') {
            svgPlot.innerHTML += `<text x="${w - 180}" y="${pad.t + 20}" class="math-eq">&sigma;y &propto; c(1-c)</text>`;
        }

        // Draw Mathematical Curve
        let pts = "";
        for(let i=0; i<=100; i++) {
            let sn = i/100;
            let raw = m.minRaw + sn * (m.maxRaw - m.minRaw);
            let x = m.calcX(raw);
            let y = m.calcY(x);
            pts += `${mX(x)},${mY(y)} `;
        }
        svgPlot.innerHTML += `<polyline class="curve" points="${pts}"/>`;

        // Tracker Node
        let tx = mX(currentX), ty = mY(currentY);
        svgPlot.innerHTML += `<line class="tracker-line" x1="${pad.l}" y1="${ty}" x2="${tx}" y2="${ty}"/>`;
        svgPlot.innerHTML += `<line class="tracker-line" x1="${tx}" y1="${h-pad.b}" x2="${tx}" y2="${ty}"/>`;
        svgPlot.innerHTML += `<circle class="tracker" cx="${tx}" cy="${ty}" r="6"/>`;
    }

    // --- Microscopic Simulation ---
    let obstacles = [];
    let grains = [];
    let atomTypes = []; // For SS alloy mix
    let dislocation = { x: 0, state: 'moving', pauseTimer: 0, activeObs: null };
    const rows = 12, cols = 40;
    let slipPath = [];
    
    function initLattice(rawVal) {
        obstacles = []; grains = []; slipPath = []; atomTypes = [];
        dislocation.state = 'moving'; dislocation.pauseTimer = 0; dislocation.activeObs = null;

        if (mode === 'hp') {
            document.getElementById('sim-hint').innerText = "Watch lattice misorientation at Grain Boundaries (dashed yellow)";
            // Map grain size (100 to 1) to number of displayed grains (1 to 6)
            let numGrains = Math.floor(1 + ((100 - rawVal) / 99) * 5); 
            let grainWidth = 1.0 / numGrains;
            for(let i=0; i<numGrains; i++) {
                grains.push({ left: i * grainWidth, right: (i+1) * grainWidth, theta: (Math.random() - 0.5) * 30 * (Math.PI/180) });
                if(i < numGrains-1) obstacles.push({ type: 'gb', colRatio: (i+1)*grainWidth, passed: false });
            }
        } else {
            grains = [{ left: 0, right: 1, theta: 0 }];
            if (mode === 'ss') {
                document.getElementById('sim-hint').innerText = "Copper (Orange) lattice with Nickel (Grey) solutes. Click stalled dislocation to view Solute Pinning schematic.";
                // rawVal is wt% Ni. Generate array for random atom drawing
                for(let r = -rows; r < rows; r++) {
                    let rowArr = [];
                    for(let c = -2; c < cols+4; c++) {
                        rowArr.push((Math.random() * 100 < rawVal) ? 'Ni' : 'Cu');
                    }
                    atomTypes.push(rowArr);
                }
                let numSolutes = Math.floor(sliderNorm * 40); // Actual glide path obstacles
                for(let i=0; i<numSolutes; i++) obstacles.push({ type: 'solute', col: Math.floor(Math.random()*(cols-4))+2, passed: false });
            } else if (mode === 'cw') {
                document.getElementById('sim-hint').innerText = "Click stalled dislocation to view Jog Formation schematic";
                let numForest = Math.floor(sliderNorm * 30);
                for(let i=0; i<numForest; i++) obstacles.push({ type: 'forest', col: Math.floor(Math.random()*(cols-4))+2, passed: false });
            }
        }
    }

    function calculateSlipPath(w, h) {
        slipPath = [{x: 0, y: h/2}];
        let currentY = h/2;
        grains.forEach(g => {
            let dx = (g.right - g.left) * w;
            currentY += dx * Math.tan(g.theta);
            slipPath.push({x: g.right * w, y: currentY});
        });
    }

    function drawCanvas() {
        if (activeTab !== 'sim') return; 
        const w = canvas.clientWidth, h = canvas.clientHeight;
        if(w === 0 || h === 0) return; 
        
        if(canvas.width !== w || canvas.height !== h) {
            canvas.width = w; canvas.height = h;
            calculateSlipPath(w, h);
        }

        ctx.clearRect(0, 0, w, h);
        const cellW = w / cols;
        const cellH = h / rows;
        if(slipPath.length === 0) calculateSlipPath(w, h);

        // Draw Grains (Tiled Arrays oriented to slip path)
        grains.forEach((g, i) => {
            const pxLeft = g.left * w;
            const pxRight = g.right * w;
            const pStart = slipPath[i];
            
            ctx.save();
            ctx.beginPath(); ctx.rect(pxLeft, 0, pxRight - pxLeft, h); ctx.clip();
            ctx.translate(pStart.x, pStart.y); ctx.rotate(g.theta);
            
            const overdrawCols = Math.ceil((pxRight - pxLeft) / cellW) + 4;
            for(let r = -rows; r < rows; r++) {
                for(let c = -2; c < overdrawCols; c++) {
                    ctx.beginPath(); ctx.arc(c * cellW, r * cellH, 2.5, 0, Math.PI*2);
                    if(mode === 'ss') {
                        // Use pre-generated array to keep colors stable
                        let aType = atomTypes[r + rows][c + 2];
                        ctx.fillStyle = aType === 'Ni' ? 'var(--silver)' : 'var(--orange)';
                    } else {
                        ctx.fillStyle = '#555';
                    }
                    ctx.fill();
                }
            }
            ctx.restore();

            if (i > 0) {
                ctx.strokeStyle = 'var(--yellow)'; ctx.lineWidth = 2; ctx.setLineDash([5, 5]);
                ctx.beginPath(); ctx.moveTo(pxLeft, 0); ctx.lineTo(pxLeft, h); ctx.stroke(); ctx.setLineDash([]);
                let diff = Math.abs((g.theta - grains[i-1].theta) * (180/Math.PI)).toFixed(1);
                ctx.fillStyle = 'var(--yellow)'; ctx.font = "12px Consolas";
                ctx.fillText(`GB (Δθ≈${diff}°)`, pxLeft + 5, 20);
            }
        });

        // Continuous Slip Path
        ctx.strokeStyle = 'rgba(0, 255, 255, 0.4)'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(slipPath[0].x, slipPath[0].y);
        for(let i=1; i<slipPath.length; i++) ctx.lineTo(slipPath[i].x, slipPath[i].y);
        ctx.stroke();

        // Draw Interactive Obstacles (SS & CW)
        obstacles.forEach(obs => {
            if(obs.type === 'gb') return; 
            let ox = obs.col * cellW + cellW/2;
            let obsGrain = grains.find(g => ox >= g.left * w && ox <= g.right * w) || grains[grains.length-1];
            let obsPStart = slipPath[grains.indexOf(obsGrain)];
            let obsGlobalY = obsPStart.y + (ox - (obsGrain.left * w)) * Math.tan(obsGrain.theta);
            
            if (obs.type === 'solute') {
                ctx.fillStyle = 'var(--silver)'; ctx.shadowColor = 'var(--silver)'; ctx.shadowBlur = 8;
                ctx.beginPath(); ctx.arc(ox, obsGlobalY + cellH*0.2, 5, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;
            } else if (obs.type === 'forest') {
                ctx.strokeStyle = 'var(--magenta)'; ctx.lineWidth = 2; ctx.shadowColor = 'var(--magenta)'; ctx.shadowBlur = 5;
                ctx.beginPath(); ctx.moveTo(ox-5, obsGlobalY-5); ctx.lineTo(ox+5, obsGlobalY+5); ctx.moveTo(ox-5, obsGlobalY+5); ctx.lineTo(ox+5, obsGlobalY-5); ctx.stroke(); ctx.shadowBlur = 0;
            }
        });

        // Dislocation Logic
        if (dislocation.state === 'moving') {
            dislocation.x += cellW * 0.15; 
            obstacles.forEach(obs => {
                let ox = (obs.col !== undefined) ? obs.col * cellW + cellW/2 : obs.colRatio * w;
                if(Math.abs(dislocation.x - ox) < cellW*0.2 && !obs.passed) {
                    dislocation.state = 'paused'; dislocation.pauseTimer = (obs.type === 'gb') ? 60 : 40; dislocation.activeObs = obs.type; obs.passed = true; 
                }
            });
            if (dislocation.x > w) { dislocation.x = 0; obstacles.forEach(o => o.passed = false); }
        } else {
            dislocation.pauseTimer--;
            if(dislocation.pauseTimer <= 0) { dislocation.state = 'moving'; dislocation.activeObs = null; }
        }

        let activeGrain = grains.find(g => dislocation.x >= g.left * w && dislocation.x <= g.right * w) || grains[grains.length-1];
        let dStart = slipPath[grains.indexOf(activeGrain)];
        let dGlobalY = dStart.y + (dislocation.x - (activeGrain.left * w)) * Math.tan(activeGrain.theta);

        ctx.save();
        ctx.translate(dislocation.x, dGlobalY); ctx.rotate(activeGrain.theta);
        
        ctx.strokeStyle = (dislocation.state === 'paused') ? '#ff3333' : '#00ff00';
        ctx.lineWidth = 4; ctx.shadowColor = ctx.strokeStyle; ctx.shadowBlur = 12;
        
        ctx.beginPath(); ctx.moveTo(0, 5); ctx.lineTo(0, -cellH * 2.5); ctx.moveTo(-cellW*1.2, 5); ctx.lineTo(cellW*1.2, 5); ctx.stroke(); ctx.shadowBlur = 0;
        
        if (dislocation.state === 'paused' && dislocation.activeObs !== 'gb') {
            ctx.rotate(-activeGrain.theta); 
            ctx.fillStyle = '#fff'; ctx.font = "10px sans-serif"; ctx.fillText("CLICK", -15, -cellH * 3);
        }
        ctx.restore();
    }

    function loop() {
        requestAnimationFrame(loop);
        drawCanvas();
    }

    // --- Interactive Insets ---
    canvas.addEventListener('click', (e) => {
        if (dislocation.state === 'paused' && dislocation.activeObs !== 'gb') showInset(dislocation.activeObs);
    });

    function showInset(type) {
        overlay.style.display = 'block';
        const isvg = document.getElementById('inset-svg');
        const title = document.getElementById('inset-title');
        
        if (type === 'solute') {
            title.innerText = "Solid Solution Pinning";
            isvg.innerHTML = `
                <g transform="translate(225, 125)">
                    <circle cx="0" cy="0" r="80" fill="none" stroke="rgba(255,140,0,0.15)" stroke-width="20"/>
                    <circle cx="0" cy="0" r="50" fill="none" stroke="rgba(255,140,0,0.3)" stroke-width="15"/>
                    <line x1="0" y1="5" x2="0" y2="-60" stroke="#00ff00" stroke-width="6"/>
                    <line x1="-30" y1="5" x2="30" y2="5" stroke="#00ff00" stroke-width="6"/>
                    <path d="M -60 -40 Q 0 -10 60 -40" fill="none" stroke="#ff3333" stroke-width="4" stroke-dasharray="8,4"/>
                    <text x="0" y="-45" fill="#ff3333" font-size="14px" font-weight="bold" text-anchor="middle">Compressive Field (C)</text>
                    <circle cx="0" cy="40" r="20" fill="var(--silver)"/>
                    <text x="0" y="45" fill="#000" font-size="14px" font-weight="bold" text-anchor="middle">Ni</text>
                    <path d="M -60 40 Q 0 10 60 40" fill="none" stroke="var(--silver)" stroke-width="4" stroke-dasharray="8,4"/>
                    <text x="0" y="75" fill="var(--silver)" font-size="14px" font-weight="bold" text-anchor="middle">Tensile Field (T) Neutralized</text>
                </g>
            `;
        } else if (type === 'forest') {
            title.innerText = "Forest Dislocation Jog Formation";
            isvg.innerHTML = `
                <g transform="translate(225, 125)">
                    <line x1="-100" y1="-80" x2="100" y2="80" stroke="#ff00ff" stroke-width="8" opacity="0.6"/>
                    <text x="110" y="90" fill="#ff00ff" font-size="12px">Forest ⊥</text>
                    <path d="M -150 0 L -20 0 L 20 40 L 150 40" fill="none" stroke="#00ff00" stroke-width="6" stroke-linejoin="round"/>
                    <circle cx="0" cy="20" r="30" fill="rgba(255,0,0,0.4)" filter="blur(5px)"/>
                    <circle cx="0" cy="20" r="10" fill="#ff3333"/>
                    <line x1="-15" y1="5" x2="35" y2="25" stroke="#fff" stroke-width="2"/>
                    <text x="0" y="-15" fill="#ff3333" font-size="16px" font-weight="bold" text-anchor="middle">JOG (Δ Energy Required)</text>
                </g>
            `;
        }
    }

    function closeInset() { overlay.style.display = 'none'; }

    // --- Listeners & Init ---
    select.addEventListener('change', updateState);
    slider.addEventListener('input', updateState);
    window.addEventListener('resize', () => { 
        if(activeTab === 'sim') {
            calculateSlipPath(canvas.clientWidth, canvas.clientHeight); 
            updateState(); 
        }
    });

    updateState();
    loop(); 
</script>
</body>

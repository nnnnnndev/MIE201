<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ch 7: Strengthening Mechanisms</title>
    <style>
        :root { --bg: #050505; --cyan: #00ffff; --magenta: #ff00ff; --yellow: #ffff00; --grid: rgba(255, 0, 255, 0.15); --atom: #555; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; display: flex; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--cyan); overflow: hidden; font-weight: 900; }
        
        #sidebar { width: 340px; background: rgba(0,0,0,0.95); border-right: 2px solid var(--magenta); padding: 20px; display: flex; flex-direction: column; z-index: 100; box-shadow: 10px 0 30px rgba(0,0,0,0.8); }
        h1 { font-size: 0.85rem; color: var(--magenta); text-transform: uppercase; margin: 0 0 15px 0; border-bottom: 1px solid var(--magenta); padding-bottom: 5px; letter-spacing: 1px; }
        
        select { background: #111; color: var(--cyan); border: 1px solid var(--cyan); padding: 10px; margin-bottom: 20px; font-weight: bold; width: 100%; cursor: pointer; font-size: 0.9rem; }
        
        .control-block { background: #0a0a0a; border: 1px solid #333; padding: 15px; margin-bottom: 15px; border-radius: 4px; }
        .label-row { display: flex; justify-content: space-between; font-size: 0.8rem; color: #fff; margin-bottom: 10px; text-transform: uppercase; }
        input[type=range] { width: 100%; accent-color: var(--magenta); cursor: pointer; }

        #readouts { margin-top: auto; border: 1px solid var(--cyan); padding: 15px; background: rgba(0, 255, 255, 0.05); }
        .stat { display: flex; justify-content: space-between; font-size: 1.1rem; margin: 8px 0; color: var(--yellow); }
        .stat-main { font-size: 1.3rem; color: #00ff00; border-top: 1px solid #444; padding-top: 10px; margin-top: 10px; }
        
        #stage { flex: 1; display: flex; flex-direction: column; padding: 20px; gap: 20px; background: radial-gradient(circle at center, #111 0%, #000 100%); position: relative; }
        
        .panel { background: rgba(0,0,0,0.8); border: 1px solid #333; border-radius: 8px; box-shadow: 0 5px 20px rgba(0,0,0,0.5); position: relative; display: flex; flex-direction: column; }
        
        /* Top Panel Tabs */
        .tab-bar { display: flex; border-bottom: 1px solid #333; background: #0a0a0a; border-radius: 8px 8px 0 0; overflow: hidden; }
        .tab-btn { flex: 1; padding: 10px; background: transparent; color: #666; border: none; outline: none; font-family: 'Segoe UI', sans-serif; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: 0.3s; }
        .tab-btn:hover { color: var(--cyan); background: rgba(0, 255, 255, 0.05); }
        .tab-btn.active { color: var(--magenta); border-bottom: 2px solid var(--magenta); background: rgba(255, 0, 255, 0.05); }

        /* Plot Area */
        #plot-container { flex: 1; min-height: 250px; padding: 10px; }
        svg { width: 100%; height: 100%; overflow: visible; }
        .axis { stroke: var(--magenta); stroke-width: 2; }
        .grid { stroke: var(--grid); stroke-width: 1; }
        .curve { fill: none; stroke: var(--cyan); stroke-width: 4; filter: drop-shadow(0 0 5px var(--cyan)); }
        .tracker { fill: var(--magenta); stroke: #fff; stroke-width: 2; filter: drop-shadow(0 0 8px var(--magenta)); }
        .tracker-line { stroke: var(--yellow); stroke-width: 1.5; stroke-dasharray: 4,4; }
        text { fill: var(--magenta); font-size: 12px; font-family: 'Consolas', monospace; font-weight: bold; }
        .axis-lbl { fill: var(--yellow); font-size: 14px; text-transform: uppercase; }

        /* News Feed Area */
        #news-container { display: none; flex: 1; padding: 15px; overflow-y: auto; max-height: 250px; }
        .news-card { background: #111; border-left: 3px solid var(--cyan); padding: 12px; margin-bottom: 10px; border-radius: 0 4px 4px 0; }
        .news-header { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .news-concept { color: var(--yellow); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        .news-source { color: #888; font-size: 0.75rem; }
        .news-title { color: #fff; font-size: 1rem; margin-bottom: 5px; text-decoration: none; display: inline-block; transition: 0.2s; }
        .news-title:hover { color: var(--cyan); text-decoration: underline; }
        .news-summary { color: #aaa; font-size: 0.85rem; line-height: 1.4; font-weight: normal; }

        /* Sim Area */
        #sim-container { flex: 1.5; display: flex; flex-direction: column; cursor: crosshair; }
        .sim-title { font-size: 0.8rem; color: var(--yellow); text-transform: uppercase; padding: 10px; border-bottom: 1px solid #333; letter-spacing: 1px; text-align: center; }
        .sim-hint { font-size: 0.7rem; color: #aaa; text-align: center; margin-top: -5px; padding-bottom: 5px; }
        canvas { width: 100%; height: 100%; flex: 1; display: block; }

        /* Magnified Inset Overlay */
        #inset-overlay { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 450px; background: rgba(10,10,10,0.95); border: 2px solid var(--cyan); border-radius: 8px; padding: 20px; box-shadow: 0 0 50px rgba(0,255,255,0.2); z-index: 200; cursor: pointer; }
        .inset-title { color: var(--cyan); text-align: center; text-transform: uppercase; margin-bottom: 15px; font-size: 1.1rem; border-bottom: 1px solid var(--cyan); padding-bottom: 5px; }
        #inset-svg { width: 100%; height: 250px; }
    </style>
</head>
<body>

<div id="sidebar">
    <h1>Strengthening Mechanism</h1>
    <select id="mode-select">
        <option value="hp">Grain Size Reduction (Hall-Petch)</option>
        <option value="ss">Solid Solution Alloying</option>
        <option value="cw">Strain Hardening (Cold Work)</option>
    </select>

    <h1>Control Parameter</h1>
    <div class="control-block">
        <div class="label-row"><span id="param-lbl">Grain Boundaries</span><span id="param-val">0</span></div>
        <input type="range" id="main-slider" min="0" max="100" value="0">
    </div>

    <div id="readouts">
        <div class="stat"><span>Base Yield (&sigma;<sub>0</sub>):</span><span>50 MPa</span></div>
        <div class="stat" style="color: var(--cyan);"><span>Increase (&Delta;&sigma;):</span><span id="out-delta">0 MPa</span></div>
        <div class="stat stat-main"><span>Total Yield (&sigma;<sub>y</sub>):</span><span id="out-total">50 MPa</span></div>
    </div>
</div>

<div id="stage">
    <div class="panel">
        <div class="tab-bar">
            <button class="tab-btn active" id="tab-plot" onclick="switchTab('plot')">Analytical Plot</button>
            <button class="tab-btn" id="tab-news" onclick="switchTab('news')">Real-World Context</button>
        </div>
        <div id="plot-container">
            <svg id="plot"></svg>
        </div>
        <div id="news-container">
            </div>
    </div>
    
    <div class="panel" id="sim-container">
        <div class="sim-title">Microscopic Dislocation Glide</div>
        <div class="sim-hint" id="sim-hint">Watch lattice misorientation at Grain Boundaries (dashed yellow)</div>
        <canvas id="sim-canvas"></canvas>
    </div>

    <div id="inset-overlay" onclick="closeInset()">
        <div class="inset-title" id="inset-title">Mechanism Schematic</div>
        <svg id="inset-svg"></svg>
        <div style="text-align: center; color: #666; font-size: 0.7rem; margin-top: 10px;">CLICK ANYWHERE TO CLOSE</div>
    </div>
</div>

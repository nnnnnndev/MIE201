<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter 9: Topological Phase Engine</title>
    <style>
        :root {
            --bg: #050505;
            --panel: #111;
            --cyan: #00ffff;
            --magenta: #ff00ff;
            --yellow: #ffff00;
            --orange: #ff8800;
            --silver: #cccccc;
            --grid: #222;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--silver); height: 100vh; display: flex; overflow: hidden; }

        /* Sidebar Layout */
        #sidebar { width: 340px; background: var(--panel); border-right: 2px solid #333; display: flex; flex-direction: column; z-index: 10; }
        #stage { flex: 1; display: flex; flex-direction: column; position: relative; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); }

        .header { padding: 20px; border-bottom: 1px solid #333; text-align: center; }
        .header h1 { color: var(--cyan); font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; }
        
        .control-group { padding: 20px; border-bottom: 1px solid #333; }
        .label { font-size: 0.85rem; color: var(--yellow); text-transform: uppercase; margin-bottom: 10px; display: block; font-weight: bold;}
        
        /* Toggle Switch */
        .toggle-container { display: flex; background: #000; border: 1px solid #444; border-radius: 4px; overflow: hidden; }
        .toggle-btn { flex: 1; padding: 10px; text-align: center; cursor: pointer; transition: 0.3s; font-size: 0.9rem; font-weight: bold; text-transform: uppercase; }
        .toggle-btn.active { background: rgba(0, 255, 255, 0.1); color: var(--cyan); border-bottom: 2px solid var(--cyan); }
        .toggle-btn:not(.active) { color: #666; }

        /* Readouts */
        .readout-panel { padding: 20px; margin-top: auto; background: rgba(255, 0, 255, 0.05); border-top: 1px solid var(--magenta); }
        .stat { display: flex; justify-content: space-between; margin: 8px 0; font-family: 'Consolas', monospace; font-size: 1.1rem; }
        .stat .val { color: #fff; font-weight: bold; }

        canvas { width: 100%; height: 100%; display: block; touch-action: none; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="header">
            <h1>Phase Engine: Ag-Cu</h1>
        </div>
        
        <div class="control-group">
            <span class="label">Interaction Mode</span>
            <div class="toggle-container">
                <div class="toggle-btn active" id="btn-navigator" onclick="setMode('navigator')">Navigator</div>
                <div class="toggle-btn" id="btn-architect" onclick="setMode('architect')">Architect</div>
            </div>
            <p id="mode-desc" style="margin-top: 15px; font-size: 0.85rem; color: #888; line-height: 1.4;">
                Hover over the diagram to cast a tie-line and calculate phase fractions.
            </p>
        </div>

        <div class="readout-panel">
            <span class="label">Lever Rule Telemetry</span>
            <div class="stat"><span>Temp (°C):</span> <span class="val" id="out-t">--</span></div>
            <div class="stat"><span>Comp (wt% Cu):</span> <span class="val" id="out-c">--</span></div>
            <hr style="border-color:#333; margin:15px 0;">
            <div class="stat" style="color: var(--yellow);"><span>Phase Region:</span> <span class="val" id="out-region">--</span></div>
            <div class="stat" style="color: var(--orange);"><span>W(L):</span> <span class="val" id="out-wl">--</span></div>
            <div class="stat" style="color: var(--cyan);"><span>W(Solid):</span> <span class="val" id="out-ws">--</span></div>
        </div>
    </div>

    <div id="stage">
        <canvas id="plotCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('plotCanvas');
        const ctx = canvas.getContext('2d');

        // State
        let mode = 'navigator';
        let mouseX = 0, mouseY = 0;
        let activeNode = null;

        // Coordinate Boundaries
        const T_MIN = 0, T_MAX = 1200;
        const C_MIN = 0, C_MAX = 100;
        const PAD = 60; // Padding for axes

        // Topological Nodes (Ag-Cu defaults)
        let nodes = {
            tmA: { c: 0, t: 962, fixed: true },
            tmB: { c: 100, t: 1085, fixed: true },
            eut: { c: 28.1, t: 779, fixed: false },
            solA: { c: 8.8, t: 779, fixed: false },
            solB: { c: 92.1, t: 779, fixed: false },
            termA: { c: 1, t: 0, fixed: true },
            termB: { c: 99, t: 0, fixed: true }
        };

        // --- MATH & UTILS ---
        function mapX(c) { return PAD + (c / C_MAX) * (canvas.width - PAD * 2); }
        function mapY(t) { return canvas.height - PAD - (t / T_MAX) * (canvas.height - PAD * 2); }
        function invX(x) { return ((x - PAD) / (canvas.width - PAD * 2)) * C_MAX; }
        function invY(y) { return ((canvas.height - PAD - y) / (canvas.height - PAD * 2)) * T_MAX; }

        // Bezier Interpolation (for Tie-Line intersection at a specific T)
        function getC_onCurve(T, nodeTop, nodeBot, isConvex) {
            if (T > nodeTop.t || T < nodeBot.t) return null;
            let ratio = (nodeTop.t - T) / (nodeTop.t - nodeBot.t);
            // Power curve to simulate thermodynamic sag/bulge
            let p = isConvex ? 0.6 : 1.5; 
            let c = nodeTop.c + (nodeBot.c - nodeTop.c) * Math.pow(ratio, p);
            return c;
        }

        function drawCurve(nodeTop, nodeBot, isConvex, color) {
            ctx.beginPath();
            ctx.moveTo(mapX(nodeTop.c), mapY(nodeTop.t));
            let pts = 20;
            for(let i=0; i<=pts; i++){
                let t = nodeTop.t - (i/pts)*(nodeTop.t - nodeBot.t);
                let c = getC_onCurve(t, nodeTop, nodeBot, isConvex);
                ctx.lineTo(mapX(c), mapY(t));
            }
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        // --- RENDER LOOP ---
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Draw Axes
            ctx.strokeStyle = '#555'; ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(PAD, PAD); ctx.lineTo(PAD, canvas.height - PAD); // Y
            ctx.lineTo(canvas.width - PAD, canvas.height - PAD); // X
            ctx.lineTo(canvas.width - PAD, PAD); // Right border
            ctx.stroke();

            // Labels
            ctx.fillStyle = '#fff'; ctx.font = '14px sans-serif';
            ctx.fillText('Temperature (°C)', PAD + 10, PAD - 10);
            ctx.fillText('Composition (wt% Cu)', canvas.width/2 - 50, canvas.height - 20);

            // 2. Draw Phase Boundaries
            // Liquidus (Concave/Sagging)
            drawCurve(nodes.tmA, nodes.eut, false, '#ff00ff'); 
            drawCurve(nodes.tmB, nodes.eut, false, '#ff00ff');
            // Solidus (Convex/Bulging)
            drawCurve(nodes.tmA, nodes.solA, true, '#00ffff');
            drawCurve(nodes.tmB, nodes.solB, true, '#00ffff');
            // Solvus (Convex)
            drawCurve(nodes.solA, nodes.termA, true, '#00ffff');
            drawCurve(nodes.solB, nodes.termB, true, '#00ffff');
            
            // Eutectic Isotherm
            ctx.beginPath();
            ctx.moveTo(mapX(nodes.solA.c), mapY(nodes.solA.t));
            ctx.lineTo(mapX(nodes.solB.c), mapY(nodes.solB.t));
            ctx.strokeStyle = '#ffff00';
            ctx.lineWidth = 3;
            ctx.stroke();

            // Region Labels
            ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.font = 'bold 24px sans-serif';
            ctx.fillText('L', mapX(50), mapY(950));
            ctx.fillText('α', mapX(4), mapY(600));
            ctx.fillText('β', mapX(96), mapY(600));
            ctx.fillText('L + α', mapX(15), mapY(820));
            ctx.fillText('L + β', mapX(65), mapY(850));
            ctx.fillText('α + β', mapX(50), mapY(400));

            // 3. Interactions
            if (mode === 'architect') {
                drawNodes();
            } else if (mode === 'navigator') {
                handleTieLine();
            }
        }

        function drawNodes() {
            for (let key in nodes) {
                let n = nodes[key];
                if (!n.fixed) {
                    ctx.beginPath();
                    ctx.arc(mapX(n.c), mapY(n.t), 8, 0, Math.PI*2);
                    ctx.fillStyle = '#ff8800';
                    ctx.fill();
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            }
        }

        function handleTieLine() {
            let curC = invX(mouseX);
            let curT = invY(mouseY);
            
            // Bounds check
            if(curC < 0 || curC > 100 || curT < 0 || curT > T_MAX) return;

            // Draw Crosshair
            ctx.beginPath();
            ctx.arc(mouseX, mouseY, 5, 0, Math.PI*2);
            ctx.fillStyle = '#fff'; ctx.fill();

            let region = "Single Phase";
            let wL = "-", wS = "-";
            let tieLeft = null, tieRight = null;

            // Check L + alpha
            if (curT > nodes.eut.t && curT < nodes.tmA.t) {
                let cSolidus = getC_onCurve(curT, nodes.tmA, nodes.solA, true);
                let cLiquidus = getC_onCurve(curT, nodes.tmA, nodes.eut, false);
                if (curC > cSolidus && curC < cLiquidus) {
                    region = "L + α";
                    tieLeft = cSolidus; tieRight = cLiquidus;
                    wL = ((curC - tieLeft) / (tieRight - tieLeft)).toFixed(2);
                    wS = ((tieRight - curC) / (tieRight - tieLeft)).toFixed(2);
                }
            }
            // Check L + beta
            if (curT > nodes.eut.t && curT < nodes.tmB.t) {
                let cLiquidus = getC_onCurve(curT, nodes.tmB, nodes.eut, false);
                let cSolidus = getC_onCurve(curT, nodes.tmB, nodes.solB, true);
                if (curC > cLiquidus && curC < cSolidus) {
                    region = "L + β";
                    tieLeft = cLiquidus; tieRight = cSolidus;
                    wS = ((curC - tieLeft) / (tieRight - tieLeft)).toFixed(2);
                    wL = ((tieRight - curC) / (tieRight - tieLeft)).toFixed(2);
                }
            }
            // Check alpha + beta
            if (curT < nodes.eut.t && curT > 0) {
                let cSolvusA = getC_onCurve(curT, nodes.solA, nodes.termA, true);
                let cSolvusB = getC_onCurve(curT, nodes.solB, nodes.termB, true);
                if (curC > cSolvusA && curC < cSolvusB) {
                    region = "α + β";
                    tieLeft = cSolvusA; tieRight = cSolvusB;
                    // For solid-solid, wL readout represents alpha, wS represents beta
                    wL = ((tieRight - curC) / (tieRight - tieLeft)).toFixed(2); // W_alpha
                    wS = ((curC - tieLeft) / (tieRight - tieLeft)).toFixed(2); // W_beta
                }
            }

            // Draw Tie-Line
            if (tieLeft !== null && tieRight !== null) {
                ctx.beginPath();
                ctx.moveTo(mapX(tieLeft), mouseY);
                ctx.lineTo(mapX(tieRight), mouseY);
                ctx.strokeStyle = '#fff';
                ctx.setLineDash([5, 5]);
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.setLineDash([]); // reset

                // Highlight intersections
                ctx.fillStyle = '#00ffff';
                ctx.beginPath(); ctx.arc(mapX(tieLeft), mouseY, 4, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(mapX(tieRight), mouseY, 4, 0, Math.PI*2); ctx.fill();
            }

            // Update Telemetry
            document.getElementById('out-t').innerText = Math.round(curT);
            document.getElementById('out-c').innerText = curC.toFixed(1);
            document.getElementById('out-region').innerText = region;
            document.getElementById('out-wl').innerText = wL;
            document.getElementById('out-ws').innerText = wS;
        }

        // --- EVENTS ---
        function setMode(newMode) {
            mode = newMode;
            document.getElementById('btn-navigator').classList.toggle('active', mode === 'navigator');
            document.getElementById('btn-architect').classList.toggle('active', mode === 'architect');
            
            if(mode === 'architect') {
                document.getElementById('mode-desc').innerText = "Drag the orange invariant nodes to warp the thermodynamic boundaries.";
                canvas.style.cursor = 'grab';
            } else {
                document.getElementById('mode-desc').innerText = "Hover over the diagram to cast a tie-line and calculate phase fractions.";
                canvas.style.cursor = 'crosshair';
            }
            draw();
        }

        canvas.addEventListener('mousemove', (e) => {
            let rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;

            if (mode === 'architect' && activeNode) {
                // Drag Logic
                let newC = invX(mouseX);
                let newT = invY(mouseY);
                
                // Constraints
                if(newC < 5) newC = 5; if(newC > 95) newC = 95;
                if(newT > 900) newT = 900; if(newT < 200) newT = 200;

                if (activeNode === 'eut') {
                    nodes.eut.c = newC; nodes.eut.t = newT;
                    // Force isotherm to follow
                    nodes.solA.t = newT; nodes.solB.t = newT;
                } else if (activeNode === 'solA') {
                    if (newC >= nodes.eut.c) newC = nodes.eut.c - 1; // Must stay left of eutectic
                    nodes.solA.c = newC;
                } else if (activeNode === 'solB') {
                    if (newC <= nodes.eut.c) newC = nodes.eut.c + 1; // Must stay right of eutectic
                    nodes.solB.c = newC;
                }
            }
            draw();
        });

        canvas.addEventListener('mousedown', (e) => {
            if (mode !== 'architect') return;
            canvas.style.cursor = 'grabbing';
            // Hit test nodes
            for (let key in nodes) {
                let n = nodes[key];
                if (!n.fixed) {
                    let dx = mouseX - mapX(n.c);
                    let dy = mouseY - mapY(n.t);
                    if (Math.sqrt(dx*dx + dy*dy) < 15) {
                        activeNode = key;
                        break;
                    }
                }
            }
        });

        canvas.addEventListener('mouseup', () => {
            activeNode = null;
            if (mode === 'architect') canvas.style.cursor = 'grab';
        });

        // Init
        function resize() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            draw();
        }
        window.addEventListener('resize', resize);
        resize();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter 9: Phase Engine V9 (Generic A-B)</title>
    <style>
        :root {
            --bg: #050505;
            --panel: #111;
            --cyan: #00ffff;
            --magenta: #ff00ff;
            --yellow: #ffff00;
            --orange: #ff8800;
            --silver: #cccccc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--silver); height: 100vh; display: flex; overflow: hidden; }

        #sidebar { width: 380px; background: var(--panel); border-right: 2px solid #333; display: flex; flex-direction: column; z-index: 10; overflow-y: auto; }
        #stage { flex: 1; display: flex; flex-direction: column; position: relative; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); }

        .header { padding: 20px; border-bottom: 1px solid #333; text-align: center; }
        .header h1 { color: var(--cyan); font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; }
        
        .control-group { padding: 20px; border-bottom: 1px solid #333; }
        .label { font-size: 0.85rem; color: var(--yellow); text-transform: uppercase; margin-bottom: 10px; display: block; font-weight: bold;}
        
        .toggle-container { display: flex; background: #000; border: 1px solid #444; border-radius: 4px; overflow: hidden; margin-bottom: 15px; }
        .toggle-btn { flex: 1; padding: 10px; text-align: center; cursor: pointer; transition: 0.3s; font-size: 0.9rem; font-weight: bold; text-transform: uppercase; }
        .toggle-btn.active { background: rgba(0, 255, 255, 0.1); color: var(--cyan); border-bottom: 2px solid var(--cyan); }
        .toggle-btn:not(.active) { color: #666; }

        .btn-row { display: flex; gap: 10px; }
        button.action-btn { flex: 1; background: #222; color: #fff; border: 1px solid var(--orange); padding: 8px 12px; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; font-weight: bold; transition: 0.2s; }
        button.action-btn:hover { background: var(--orange); color: #000; }

        .readout-panel { padding: 20px; margin-top: auto; background: rgba(255, 0, 255, 0.05); border-top: 1px solid var(--magenta); }
        .stat { display: flex; justify-content: space-between; margin: 8px 0; font-family: 'Consolas', monospace; font-size: 1.1rem; }
        .stat .val { color: #fff; font-weight: bold; }

        #math-panel { display: none; padding: 15px; background: #000; border: 1px dashed var(--cyan); margin-top: 15px; font-family: 'Consolas', monospace; font-size: 0.95rem; line-height: 1.6; }
        .math-line { color: var(--silver); margin-bottom: 6px; }
        .math-hl { color: #fff; font-weight: bold; }

        canvas { width: 100%; height: 100%; display: block; touch-action: none; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="header">
            <h1>Generic A-B Sandbox</h1>
        </div>
        
        <div class="control-group">
            <span class="label">Interaction Mode</span>
            <div class="toggle-container">
                <div class="toggle-btn active" id="btn-navigator" onclick="setMode('navigator')">Navigator</div>
                <div class="toggle-btn" id="btn-architect" onclick="setMode('architect')">Architect</div>
            </div>
            
            <div class="btn-row" id="preset-controls">
                <button class="action-btn" onclick="snapTo(1)">Snap E1</button>
                <button class="action-btn" onclick="snapTo(2)">Snap E2</button>
            </div>
            
            <p id="mode-desc" style="margin-top: 15px; font-size: 0.85rem; color: #888; line-height: 1.4;">
                Hover across the intermetallic boundary. <strong>Click</strong> to freeze.
            </p>

            <div id="math-panel">
                <div class="label" style="color:var(--cyan)">Math Expansion (Mole Fractions)</div>
                <div id="math-content"></div>
            </div>
        </div>

        <div class="readout-panel">
            <span class="label">Lever Rule Telemetry</span>
            <div class="stat"><span>Temp (K):</span> <span class="val" id="out-t">--</span></div>
            <div class="stat"><span>Comp (at% B):</span> <span class="val" id="out-c">--</span></div>
            <hr style="border-color:#333; margin:15px 0;">
            <div class="stat" style="color: var(--yellow);"><span>Region:</span> <span class="val" id="out-region">--</span></div>
            <div class="stat" style="color: var(--cyan);"><span id="lbl-left">X(Phase 1):</span> <span class="val" id="out-w1">--</span></div>
            <div class="stat" style="color: var(--orange);"><span id="lbl-right">X(Phase 2):</span> <span class="val" id="out-w2">--</span></div>
        </div>
    </div>

    <div id="stage">
        <canvas id="plotCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('plotCanvas');
        const ctx = canvas.getContext('2d');

        let mode = 'navigator';
        let mouseX = 0, mouseY = 0;
        let activeNode = null;
        let activeNodeKey = null;
        let activeSys = null;
        let isFrozen = false;
        let lastMathState = null;

        const PAD = 70;

        // --- THE PROCEDURAL PILLAR ENGINE (A-B Generic) ---
        const engineDef = {
            name: "A-B Generic",
            T_MAX: 1200,
            subsystems: [
                {
                    id: 'sys1', bounds: [0, 66.7], lblL: 'α', lblR: 'AB₂',
                    nodes: {
                        tmL: {c: 0, t: 1000, fixed: false, dragAxis: 'y'}, // Unlocked Y
                        tmR: {c: 66.7, t: 1100, fixed: false, dragAxis: 'y'}, // The AB2 Peak
                        eut: {c: 35, t: 600, fixed: false, dragAxis: 'both'},
                        solL: {c: 10, t: 600, fixed: false, dragAxis: 'x'},
                        solR: {c: 65, t: 600, fixed: false, dragAxis: 'x'},
                        termL: {c: 2, t: 0, fixed: true},
                        termR: {c: 66, t: 0, fixed: true}
                    }
                },
                {
                    id: 'sys2', bounds: [66.7, 100], lblL: 'AB₂', lblR: 'β',
                    nodes: {
                        tmL: {c: 66.7, t: 1100, fixed: false, dragAxis: 'y'}, // Linked to sys1.tmR
                        tmR: {c: 100, t: 800, fixed: false, dragAxis: 'y'}, // Unlocked Y
                        eut: {c: 85, t: 500, fixed: false, dragAxis: 'both'},
                        solL: {c: 68, t: 500, fixed: false, dragAxis: 'x'},
                        solR: {c: 95, t: 500, fixed: false, dragAxis: 'x'},
                        termL: {c: 67.5, t: 0, fixed: true},
                        termR: {c: 98, t: 0, fixed: true}
                    }
                }
            ]
        };

        function mapX(c) { return PAD + (c / 100) * (canvas.width - PAD * 2); }
        function mapY(t) { return canvas.height - PAD - (t / engineDef.T_MAX) * (canvas.height - PAD * 2); }
        function invX(x) { return Math.max(0, Math.min(100, ((x - PAD) / (canvas.width - PAD * 2)) * 100)); }
        function invY(y) { return Math.max(0, Math.min(engineDef.T_MAX, ((canvas.height - PAD - y) / (canvas.height - PAD * 2)) * engineDef.T_MAX)); }

        function getC_onCurve(T, nodeTop, nodeBot, isConvex) {
            if (T > nodeTop.t || T < nodeBot.t) return null;
            if (nodeTop.t === nodeBot.t) return nodeTop.c;
            let ratio = (nodeTop.t - T) / (nodeTop.t - nodeBot.t);
            let p = isConvex ? 1.4 : 0.7; 
            let c = nodeTop.c + (nodeBot.c - nodeTop.c) * Math.pow(ratio, p);
            return Math.max(0, Math.min(100, c));
        }

        function drawCurve(nodeTop, nodeBot, isConvex, color) {
            ctx.beginPath();
            ctx.moveTo(mapX(nodeTop.c), mapY(nodeTop.t));
            let pts = 30;
            for(let i=0; i<=pts; i++){
                let t = nodeTop.t - (i/pts)*(nodeTop.t - nodeBot.t);
                let c = getC_onCurve(t, nodeTop, nodeBot, isConvex);
                ctx.lineTo(mapX(c), mapY(t));
            }
            ctx.strokeStyle = color; ctx.lineWidth = 3; ctx.stroke();
        }

        function drawAxisLabel(text, x, y, color) {
            ctx.font = 'bold 12px sans-serif';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            let w = ctx.measureText(text).width + 10;
            ctx.fillStyle = '#050505'; ctx.fillRect(x - w/2, y - 10, w, 20);
            ctx.fillStyle = color; ctx.fillText(text, x, y);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Axes
            ctx.strokeStyle = '#555'; ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(PAD, PAD); ctx.lineTo(PAD, canvas.height - PAD);
            ctx.lineTo(canvas.width - PAD, canvas.height - PAD);
            ctx.lineTo(canvas.width - PAD, PAD);
            ctx.stroke();

            ctx.fillStyle = '#888'; ctx.font = '12px sans-serif';
            ctx.textAlign = 'center'; ctx.textBaseline = 'top';
            for(let i=0; i<=100; i+=10) {
                let x = mapX(i);
                ctx.beginPath(); ctx.moveTo(x, canvas.height - PAD); ctx.lineTo(x, canvas.height - PAD + 5); ctx.stroke();
                ctx.fillText(i, x, canvas.height - PAD + 10);
            }
            
            ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
            for(let i=0; i<=engineDef.T_MAX; i+=200) {
                let y = mapY(i);
                ctx.beginPath(); ctx.moveTo(PAD, y); ctx.lineTo(PAD - 5, y); ctx.stroke();
                ctx.fillText(i, PAD - 10, y);
            }

            ctx.fillStyle = '#fff'; ctx.font = '14px sans-serif';
            ctx.fillText('Temp (K)', PAD - 10, PAD - 20);
            ctx.textAlign = 'center';
            ctx.fillText('Composition (at% B)', canvas.width/2, canvas.height - 20);

            // Boundaries
            engineDef.subsystems.forEach(sys => {
                let n = sys.nodes;
                drawCurve(n.tmL, n.eut, false, '#ff00ff'); 
                drawCurve(n.tmR, n.eut, false, '#ff00ff'); 
                drawCurve(n.tmL, n.solL, true, '#00ffff'); 
                drawCurve(n.tmR, n.solR, true, '#00ffff'); 
                drawCurve(n.solL, n.termL, true, '#00ffff'); 
                drawCurve(n.solR, n.termR, true, '#00ffff'); 
                
                ctx.beginPath();
                ctx.moveTo(mapX(n.solL.c), mapY(n.solL.t));
                ctx.lineTo(mapX(n.solR.c), mapY(n.solR.t));
                ctx.strokeStyle = '#ffff00'; ctx.lineWidth = 3; ctx.stroke();
            });

            // Region Labels
            ctx.fillStyle = 'rgba(255,255,255,0.4)'; 
            ctx.font = 'bold 20px sans-serif';
            ctx.fillText('L', mapX(50), mapY(1150)); 
            
            let alphaC = engineDef.subsystems[0].nodes.solL.c * 0.4;
            let betaC = engineDef.subsystems[1].nodes.solR.c + (100 - engineDef.subsystems[1].nodes.solR.c) * 0.6;
            ctx.fillText('α', mapX(alphaC), mapY(300)); 
            ctx.fillText('β', mapX(betaC), mapY(300)); 
            ctx.fillText('AB₂', mapX(66.7), mapY(300)); 

            engineDef.subsystems.forEach(sys => {
                let n = sys.nodes;
                let tL = n.solL.t + (n.tmL.t - n.solL.t) * 0.35;
                let cL1 = getC_onCurve(tL, n.tmL, n.solL, true) ?? n.tmL.c;
                let cR1 = getC_onCurve(tL, n.tmL, n.eut, false) ?? n.tmL.c;
                if(cR1 > cL1) ctx.fillText(`L+${sys.lblL}`, mapX((cL1+cR1)/2), mapY(tL));

                let tR = n.solR.t + (n.tmR.t - n.solR.t) * 0.35;
                let cL2 = getC_onCurve(tR, n.tmR, n.eut, false) ?? n.tmR.c;
                let cR2 = getC_onCurve(tR, n.tmR, n.solR, true) ?? n.tmR.c;
                if(cR2 > cL2) ctx.fillText(`L+${sys.lblR}`, mapX((cL2+cR2)/2), mapY(tR));

                let tBot = n.eut.t * 0.5;
                ctx.fillText(`${sys.lblL}+${sys.lblR}`, mapX(n.eut.c), mapY(tBot));
            });

            if (mode === 'architect') drawNodes();
            else if (mode === 'navigator') handleTieLine();
        }

        function drawNodes() {
            engineDef.subsystems.forEach(sys => {
                for (let key in sys.nodes) {
                    let n = sys.nodes[key];
                    if (!n.fixed) {
                        ctx.beginPath(); ctx.arc(mapX(n.c), mapY(n.t), 7, 0, Math.PI*2);
                        ctx.fillStyle = '#ff8800'; ctx.fill();
                        ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
                    }
                }
            });
        }

        function handleTieLine() {
            let curC = invX(mouseX); let curT = invY(mouseY);
            if(curC < 0 || curC > 100 || curT < 0 || curT > engineDef.T_MAX) return;

            let actSys = engineDef.subsystems.find(s => curC >= s.bounds[0] && curC < s.bounds[1]);
            if (!actSys) actSys = engineDef.subsystems[engineDef.subsystems.length - 1];

            let s = actSys.nodes;
            let region = "Single Phase", tieLeft = null, tieRight = null;
            let lbl1 = "-", lbl2 = "-", w1 = "-", w2 = "-", cLName = "", cRName = "";

            let isLiqL = curT > s.tmL.t;
            let isLiqR = curT > s.tmR.t;

            let cSolL = isLiqL ? s.tmL.c : (getC_onCurve(curT, s.tmL, s.solL, true) ?? (getC_onCurve(curT, s.solL, s.termL, true) ?? s.solL.c));
            let cSolR = isLiqR ? s.tmR.c : (getC_onCurve(curT, s.tmR, s.solR, true) ?? (getC_onCurve(curT, s.solR, s.termR, true) ?? s.solR.c));
            
            let cLiqL = isLiqL ? s.tmL.c : getC_onCurve(curT, s.tmL, s.eut, false);
            let cLiqR = isLiqR ? s.tmR.c : getC_onCurve(curT, s.tmR, s.eut, false);

            if (curT > s.eut.t) {
                if (curC < cSolL) region = actSys.lblL;
                else if (curC > cSolR) region = actSys.lblR; 
                else if (cLiqL !== null && curC >= cSolL && curC <= cLiqL) {
                    region = `L + ${actSys.lblL}`; tieLeft = cSolL; tieRight = cLiqL;
                    lbl1 = actSys.lblL; lbl2 = 'L'; cLName = `C${actSys.lblL}`; cRName = 'CL';
                }
                else if (cLiqR !== null && curC >= cLiqR && curC <= cSolR) {
                    region = `L + ${actSys.lblR}`; tieLeft = cLiqR; tieRight = cSolR;
                    lbl1 = 'L'; lbl2 = actSys.lblR; cLName = 'CL'; cRName = `C${actSys.lblR}`;
                }
                else region = "L";
            } else { 
                if (curC < cSolL) region = actSys.lblL;
                else if (curC > cSolR) region = actSys.lblR;
                else {
                    region = `${actSys.lblL} + ${actSys.lblR}`; tieLeft = cSolL; tieRight = cSolR;
                    lbl1 = actSys.lblL; lbl2 = actSys.lblR; cLName = `C${actSys.lblL}`; cRName = `C${actSys.lblR}`;
                }
            }

            if (tieLeft !== null && tieRight !== null) {
                let vL = parseFloat(tieLeft.toFixed(1)); let v0 = parseFloat(curC.toFixed(1)); let vR = parseFloat(tieRight.toFixed(1));
                let R_val = parseFloat((v0 - vL).toFixed(1)); let S_val = parseFloat((vR - v0).toFixed(1)); let Tot_val = parseFloat((vR - vL).toFixed(1));
                
                let w1_num = S_val / Tot_val;
                w1 = w1_num.toFixed(2); w2 = (1.00 - w1_num).toFixed(2); 

                if (isFrozen) {
                    ctx.fillStyle = 'rgba(255, 136, 0, 0.2)'; ctx.fillRect(mapX(vL), mapY(curT)-15, mapX(v0)-mapX(vL), 30);
                    ctx.fillStyle = 'rgba(0, 255, 255, 0.2)'; ctx.fillRect(mapX(v0), mapY(curT)-15, mapX(vR)-mapX(v0), 30);

                    ctx.setLineDash([4, 4]); ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
                    ctx.beginPath(); ctx.moveTo(mapX(vL), mapY(curT)); ctx.lineTo(mapX(vL), canvas.height - PAD); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(mapX(v0), mapY(curT)); ctx.lineTo(mapX(v0), canvas.height - PAD); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(mapX(vR), mapY(curT)); ctx.lineTo(mapX(vR), canvas.height - PAD); ctx.stroke();
                    ctx.setLineDash([]);

                    ctx.fillStyle = '#ff8800'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
                    ctx.fillText(`R = ${R_val}`, mapX(vL + R_val/2), mapY(curT) - 22);
                    ctx.fillStyle = '#00ffff'; ctx.fillText(`S = ${S_val}`, mapX(v0 + S_val/2), mapY(curT) - 22);

                    let axisY = canvas.height - PAD + 20;
                    drawAxisLabel(`${cLName}=${vL}`, mapX(vL), axisY, '#00ffff');
                    drawAxisLabel(`C0=${v0}`, mapX(v0), axisY, '#ffffff');
                    drawAxisLabel(`${cRName}=${vR}`, mapX(vR), axisY, '#ff8800');

                    lastMathState = { isSinglePhase: false, cLName, cRName, lbl1, lbl2, cL: vL, c0: v0, cR: vR, R: R_val, S: S_val, tot: Tot_val, w1, w2 };
                }

                ctx.beginPath(); ctx.moveTo(mapX(vL), mapY(curT)); ctx.lineTo(mapX(vR), mapY(curT));
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.stroke();
                
                ctx.fillStyle = '#00ffff';
                ctx.beginPath(); ctx.arc(mapX(vL), mapY(curT), 5, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(mapX(vR), mapY(curT), 5, 0, Math.PI*2); ctx.fill();
            } else {
                w1 = "1.00"; w2 = "0.00"; lbl1 = region; lbl2 = "None";
                if (isFrozen) {
                    let v0 = parseFloat(curC.toFixed(1));
                    ctx.setLineDash([4, 4]); ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
                    ctx.beginPath(); ctx.moveTo(mapX(v0), mapY(curT)); ctx.lineTo(mapX(v0), canvas.height - PAD); ctx.stroke();
                    ctx.setLineDash([]);
                    drawAxisLabel(`C0=${v0}`, mapX(v0), canvas.height - PAD + 20, '#ffffff');
                    lastMathState = { isSinglePhase: true, region: region, c0: v0 };
                }
            }

            ctx.beginPath(); ctx.arc(mapX(curC), mapY(curT), 6, 0, Math.PI*2);
            ctx.fillStyle = isFrozen ? '#ff00ff' : '#fff'; ctx.fill();

            document.getElementById('out-t').innerText = Math.round(curT); document.getElementById('out-c').innerText = curC.toFixed(1);
            document.getElementById('out-region').innerText = region;
            document.getElementById('lbl-left').innerText = `X(${lbl1}):`; document.getElementById('out-w1').innerText = w1;
            document.getElementById('lbl-right').innerText = `X(${lbl2}):`; document.getElementById('out-w2').innerText = w2;
        }

        function updateMathPanel() {
            let panel = document.getElementById('math-panel');
            let content = document.getElementById('math-content');
            if(!isFrozen || !lastMathState) { panel.style.display = 'none'; return; }
            panel.style.display = 'block'; let m = lastMathState;
            content.replaceChildren(); 

            const addLine = (parts, css = "") => {
                let div = document.createElement('div'); div.className = 'math-line'; if(css) div.style.cssText = css;
                parts.forEach(p => {
                    if(typeof p === 'string') div.appendChild(document.createTextNode(p));
                    else {
                        let span = document.createElement('span'); span.className = 'math-hl';
                        if(p.color) span.style.color = p.color; span.textContent = p.text; div.appendChild(span);
                    }
                });
                content.appendChild(div);
            };
            const addDiv = () => { let hr = document.createElement('hr'); hr.style.cssText = "border-color:#333; margin:10px 0;"; content.appendChild(hr); };

            if (m.isSinglePhase) {
                addLine(["1. Identify Region:"], "color:#aaa;"); addLine(["\u00A0\u00A0Region = ", {text: m.region, color: "var(--cyan)"}]); addLine(["\u00A0\u00A0C0 = ", {text: m.c0}]);
                addDiv(); addLine(["2. Apply Lever Rule:"], "color:#aaa;"); addLine(["\u00A0\u00A0X(", m.region, ") = ", {text: "1.00", color: "var(--cyan)"}]);
            } else {
                addLine(["1. Intersections:"], "color:#aaa;");
                addLine(["\u00A0\u00A0", m.cLName, " = ", {text: m.cL, color: "var(--cyan)"}]); addLine(["\u00A0\u00A0C0 = ", {text: m.c0}]); addLine(["\u00A0\u00A0", m.cRName, " = ", {text: m.cR, color: "var(--orange)"}]);
                addDiv(); addLine(["2. Segments:"], "color:#aaa;");
                addLine(["\u00A0\u00A0Total = ", m.cR, " - ", m.cL, " = ", {text: m.tot}]); addLine(["\u00A0\u00A0R = ", m.c0, " - ", m.cL, " = ", {text: m.R, color: "var(--orange)"}]); addLine(["\u00A0\u00A0S = ", m.cR, " - ", m.c0, " = ", {text: m.S, color: "var(--cyan)"}]);
                addDiv(); addLine(["3. Lever Rule:"], "color:#aaa;");
                addLine(["\u00A0\u00A0X(", m.lbl1, ") = ", m.S, " / ", m.tot, " = ", {text: m.w1, color: "var(--cyan)"}]); addLine(["\u00A0\u00A0X(", m.lbl2, ") = ", m.R, " / ", m.tot, " = ", {text: m.w2, color: "var(--orange)"}]);
            }
        }

        function snapTo(sysNum) {
            setMode('navigator'); let sys = engineDef.subsystems[sysNum - 1];
            mouseX = mapX(sys.nodes.eut.c); mouseY = mapY(sys.nodes.eut.t - 1); 
            isFrozen = true; draw(); updateMathPanel();
        }

        function setMode(newMode) {
            mode = newMode; isFrozen = false; updateMathPanel();
            document.getElementById('btn-navigator').classList.toggle('active', mode === 'navigator');
            document.getElementById('btn-architect').classList.toggle('active', mode === 'architect');
            document.getElementById('preset-controls').style.display = mode === 'navigator' ? 'flex' : 'none';
            canvas.style.cursor = mode === 'architect' ? 'grab' : 'crosshair'; draw();
        }

        canvas.addEventListener('mousemove', (e) => {
            if (isFrozen && mode === 'navigator') return;
            let rect = canvas.getBoundingClientRect(); mouseX = e.clientX - rect.left; mouseY = e.clientY - rect.top;

            if (mode === 'architect' && activeNode) {
                let newC = invX(mouseX); let newT = invY(mouseY);
                if(newT > engineDef.T_MAX-50) newT = engineDef.T_MAX-50; if(newT < 100) newT = 100;

                // Restrict X-axis dragging to maintain system topology
                if (activeNode.dragAxis === 'y') newC = activeNode.c; 
                else if (activeNode.dragAxis === 'x') newT = activeNode.t;

                if (activeNodeKey === 'tmR' && activeSys.id === 'sys1') {
                    // Moving the peak updates both subsystems
                    activeSys.nodes.tmR.t = newT;
                    engineDef.subsystems[1].nodes.tmL.t = newT;
                } else if (activeNodeKey === 'eut') {
                    activeNode.c = newC; activeNode.t = newT;
                    activeSys.nodes.solL.t = newT; activeSys.nodes.solR.t = newT;
                } else if (activeNodeKey === 'solL') {
                    if (newC >= activeSys.nodes.eut.c) newC = activeSys.nodes.eut.c - 0.5;
                    activeNode.c = newC;
                } else if (activeNodeKey === 'solR') {
                    if (newC <= activeSys.nodes.eut.c) newC = activeSys.nodes.eut.c + 0.5;
                    activeNode.c = newC;
                } else {
                    activeNode.c = newC; activeNode.t = newT;
                }
            }
            draw();
        });

        canvas.addEventListener('mousedown', (e) => {
            if (mode === 'navigator') { isFrozen = !isFrozen; updateMathPanel(); draw(); return; }
            canvas.style.cursor = 'grabbing';
            for (let sys of engineDef.subsystems) {
                for (let key in sys.nodes) {
                    let n = sys.nodes[key];
                    if (!n.fixed) {
                        let dx = mouseX - mapX(n.c); let dy = mouseY - mapY(n.t);
                        if (dx*dx + dy*dy < 100) { activeNode = n; activeNodeKey = key; activeSys = sys; break; }
                    }
                }
                if (activeNode) break;
            }
        });

        canvas.addEventListener('mouseup', () => { activeNode = null; if (mode === 'architect') canvas.style.cursor = 'grab'; });

        function resize() { canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight; draw(); }
        window.addEventListener('resize', resize); resize();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ch 6: Materials Property Simulator // Industrial Grade</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; display: flex; font-family: 'Arial Black', sans-serif; background: #050505; color: #00ffff; overflow: hidden; font-weight: 900; }
        #ui-panel { width: 400px; background: rgba(0, 0, 0, 0.95); border-right: 3px solid #ff00ff; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; z-index: 10; box-shadow: 5px 0 20px rgba(255, 0, 255, 0.2); overflow-y: auto; }
        
        h2 { margin: 0 0 15px 0; font-size: 1rem; color: #ff00ff; text-transform: uppercase; letter-spacing: 2px; border-bottom: 2px solid rgba(255,0,255,0.5); padding-bottom: 8px; }
        
        select { background: #111; color: #00ffff; border: 2px solid #00ffff; padding: 10px; width: 100%; font-weight: 900; margin-bottom: 20px; cursor: pointer; font-size: 1rem; }
        
        .control-block { border: 1px solid #333; padding: 12px; margin-bottom: 12px; border-radius: 4px; background: #0a0a0a; }
        .label-row { display: flex; justify-content: space-between; font-size: 0.75rem; margin-bottom: 6px; color: #ff00ff; }
        input[type=range] { width: 100%; accent-color: #00ffff; cursor: pointer; }

        #metrics { margin-top: auto; border: 2px solid #00ffff; padding: 15px; background: #001111; }
        .m-row { display: flex; justify-content: space-between; font-size: 1.1rem; margin-bottom: 5px; }

        #graph-area { flex: 1; background: #000; position: relative; }
        svg { width: 100%; height: 100%; }
        
        .main-curve { fill: none; stroke: #00ffff; stroke-width: 4; filter: drop-shadow(0 0 6px #00ffff); stroke-linejoin: round; }
        .offset-line { stroke: #ffaa00; stroke-width: 2; stroke-dasharray: 8,4; filter: drop-shadow(0 0 4px #ffaa00); }
        .axis { stroke: #ff00ff; stroke-width: 2; }
        .inset-box { fill: rgba(5,5,5,0.9); stroke: #444; stroke-width: 2; }
        text { fill: #ff00ff; font-size: 12px; }
    </style>
</head>
<body>

<div id="ui-panel">
    <h2>Material Selector</h2>
    <select id="mat-select">
        <option value="316ss">316 Stainless Steel (Annealed)</option>
        <option value="mild">A36 Mild Steel (Discontinuous Yield)</option>
        <option value="6061">Aluminum 6061-T6</option>
        <option value="ti64">Ti-6Al-4V (Grade 5)</option>
    </select>

    <h2>Fine-Tune Nodes</h2>
    <div class="control-block">
        <div class="label-row"><span>Yield Stress (MPa)</span><span id="v-ys">290</span></div>
        <input type="range" id="s-ys" min="50" max="1100" value="290">
        <div class="label-row" style="margin-top:10px;"><span>Yield Strain</span><span id="v-ye">0.0015</span></div>
        <input type="range" id="s-ye" min="0.0005" max="0.01" step="0.0001" value="0.0015">
    </div>

    <div class="control-block">
        <div class="label-row"><span>UTS Stress (MPa)</span><span id="v-uts">580</span></div>
        <input type="range" id="s-uts" min="100" max="1300" value="580">
        <div class="label-row" style="margin-top:10px;"><span>UTS Strain</span><span id="v-utse">0.40</span></div>
        <input type="range" id="s-utse" min="0.05" max="0.6" step="0.01" value="0.4">
    </div>

    <div class="control-block">
        <div class="label-row"><span>Fracture Stress (MPa)</span><span id="v-fs">450</span></div>
        <input type="range" id="s-fs" min="50" max="1200" value="450">
        <div class="label-row" style="margin-top:10px;"><span>Fracture Strain</span><span id="v-fe">0.55</span></div>
        <input type="range" id="s-fe" min="0.1" max="0.8" step="0.01" value="0.55">
    </div>

    <div id="metrics">
        <div class="m-row"><span>Modulus (E):</span><span id="out-e">--</span></div>
        <div class="m-row"><span>Ductility:</span><span id="out-el">--</span></div>
    </div>
</div>

<div id="graph-area">
    <svg id="canvas"></svg>
</div>

<script>
const materials = {
    "316ss": { ys: 290, ye: 0.0015, uts: 580, utse: 0.45, fs: 480, fe: 0.60, disc: false },
    "mild":  { ys: 250, ye: 0.0012, uts: 400, utse: 0.20, fs: 300, fe: 0.35, disc: true },
    "6061":  { ys: 275, ye: 0.004,  uts: 310, utse: 0.12, fs: 250, fe: 0.17, disc: false },
    "ti64":  { ys: 880, ye: 0.0075, uts: 950, utse: 0.10, fs: 700, fe: 0.14, disc: false }
};

let currentMat = "316ss";
const svg = document.getElementById('canvas');

function updateInputs(key) {
    const m = materials[key];
    document.getElementById('s-ys').value = m.ys;
    document.getElementById('s-ye').value = m.ye;
    document.getElementById('s-uts').value = m.uts;
    document.getElementById('s-utse').value = m.utse;
    document.getElementById('s-fs').value = m.fs;
    document.getElementById('s-fe').value = m.fe;
    draw();
}

document.getElementById('mat-select').onchange = (e) => {
    currentMat = e.target.value;
    updateInputs(currentMat);
};

// Physics/Hierarchy Constraints
function getValidState() {
    let s = {
        ys: parseInt(document.getElementById('s-ys').value),
        ye: parseFloat(document.getElementById('s-ye').value),
        uts: parseInt(document.getElementById('s-uts').value),
        utse: parseFloat(document.getElementById('s-utse').value),
        fs: parseInt(document.getElementById('s-fs').value),
        fe: parseFloat(document.getElementById('s-fe').value),
        disc: materials[currentMat].disc
    };

    if(s.uts < s.ys) s.uts = s.ys + 10;
    if(s.fs > s.uts) s.fs = s.uts - 10;
    if(s.utse < s.ye + 0.02) s.utse = s.ye + 0.02;
    if(s.fe < s.utse + 0.02) s.fe = s.utse + 0.02;

    document.getElementById('v-ys').innerText = s.ys;
    document.getElementById('v-ye').innerText = s.ye.toFixed(4);
    document.getElementById('v-uts').innerText = s.uts;
    document.getElementById('v-utse').innerText = s.utse.toFixed(2);
    document.getElementById('v-fs').innerText = s.fs;
    document.getElementById('v-fe').innerText = s.fe.toFixed(2);
    
    document.getElementById('out-e').innerText = (s.ys / s.ye / 1000).toFixed(1) + " GPa";
    document.getElementById('out-el').innerText = (s.fe * 100).toFixed(1) + " %";

    return s;
}

function draw() {
    svg.innerHTML = '';
    const s = getValidState();
    const w = svg.clientWidth, h = svg.clientHeight;
    const pad = { l: 80, r: 50, t: 50, b: 80 };

    const mX = (val) => pad.l + (val / 0.7) * (w - pad.l - pad.r);
    const mY = (val) => h - pad.b - (val / 1400) * (h - pad.t - pad.b);

    // Axes
    const ax = (x1, y1, x2, y2) => {
        const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
        l.setAttribute("x1", x1); l.setAttribute("y1", y1); l.setAttribute("x2", x2); l.setAttribute("y2", y2);
        l.setAttribute("class", "axis"); svg.appendChild(l);
    };
    ax(pad.l, pad.t, pad.l, h-pad.b);
    ax(pad.l, h-pad.b, w-pad.r, h-pad.b);

    // --- CURVE GENERATION ---
    let points = [];
    // 1. Elastic Linear
    points.push({x: 0, y: 0});
    
    if(s.disc) {
        // Discontinuous Yield Path (Mild Steel)
        const upperY = s.ys + 30;
        const lowerY = s.ys;
        points.push({x: s.ye * 0.95, y: upperY}); // Upper Yield
        points.push({x: s.ye * 1.05, y: lowerY}); // Drop to Lower
        points.push({x: s.ye + 0.02, y: lowerY}); // Plateau
    } else {
        points.push({x: s.ye, y: s.ys});
    }

    // 2. Plastic Arches
    // Sample points for the spline
    const steps = 100;
    let d = `M ${mX(0)} ${mY(0)} L ${mX(points[1].x)} ${mY(points[1].y)}`;

    // Spline from Yield End to UTS to Fracture
    const startX = points[points.length-1].x;
    const startY = points[points.length-1].y;
    
    // Cubic Hermite Interpolation for smooth plastic flow
    for(let i=1; i<=steps; i++) {
        const t = i/steps;
        let currX, currY;
        if(t < 0.5) { // To UTS
            const localT = t / 0.5;
            currX = startX + (s.utse - startX) * localT;
            // Parabolic hardening
            currY = startY + (s.uts - startY) * (1 - Math.pow(1-localT, 2));
        } else { // To Fracture
            const localT = (t - 0.5) / 0.5;
            currX = s.utse + (s.fe - s.utse) * localT;
            // Necking drop
            currY = s.uts - (s.uts - s.fs) * Math.pow(localT, 2);
        }
        d += ` L ${mX(currX)} ${mY(currY)}`;
    }

    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    path.setAttribute("d", d); path.setAttribute("class", "main-curve");
    svg.appendChild(path);

    // --- INSET ---
    const iW = 350, iH = 220;
    const iX0 = w - iW - 70, iY0 = pad.t + 20;
    const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
    rect.setAttribute("x", iX0); rect.setAttribute("y", iY0); rect.setAttribute("width", iW); rect.setAttribute("height", iH);
    rect.setAttribute("class", "inset-box"); svg.appendChild(rect);

    const inX = (val) => iX0 + 50 + (val / 0.012) * (iW - 70);
    const inY = (val) => iY0 + iH - 40 - (val / (s.ys + 150)) * (iH - 60);

    // Offset Line (Yellow)
    const offL = document.createElementNS("http://www.w3.org/2000/svg", "line");
    const E = s.ys / s.ye;
    offL.setAttribute("x1", inX(0.002)); offL.setAttribute("y1", inY(0));
    offL.setAttribute("x2", inX(0.002 + (s.ys/E))); offL.setAttribute("y2", inY(s.ys));
    offL.setAttribute("class", "offset-line"); svg.appendChild(offL);

    // Inset Curve
    let iD = `M ${inX(0)} ${inY(0)} L ${inX(points[1].x)} ${inY(points[1].y)}`;
    if(s.disc) iD += ` L ${inX(s.ye*1.05)} ${inY(s.ys)} L ${inX(0.012)} ${inY(s.ys)}`;
    else iD += ` L ${inX(0.012)} ${inY(s.ys + (0.012-s.ye)*2000)}`; // Slight curve extension

    const iPath = document.createElementNS("http://www.w3.org/2000/svg", "path");
    iPath.setAttribute("d", iD); iPath.setAttribute("class", "main-curve");
    iPath.setAttribute("stroke-width", "3");
    svg.appendChild(iPath);

    // Labels
    const label = (txt, x, y, size="14px", color="#ff00ff") => {
        const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
        t.textContent = txt; t.setAttribute("x", x); t.setAttribute("y", y);
        t.setAttribute("font-size", size); t.setAttribute("fill", color);
        svg.appendChild(t);
    };
    label("ELASTIC ZOOM", iX0 + 10, iY0 + 20, "12px", "#fff");
    label("STRAIN (ε)", w/2, h-30);
    label("STRESS (σ)", 20, h/2);
}

window.onresize = draw;
document.querySelectorAll('input').forEach(i => i.oninput = draw);
updateInputs("316ss");
</script>

</body>
</html>

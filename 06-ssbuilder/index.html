<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Materials Simulator // Pro-Grade</title>
    <style>
        :root { --bg: #050505; --cyan: #00ffff; --magenta: #ff00ff; --yellow: #ffff00; --grid: rgba(255, 0, 255, 0.15); }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; display: flex; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--cyan); overflow: hidden; }
        
        #sidebar { width: 340px; background: rgba(0,0,0,0.95); border-right: 2px solid var(--magenta); padding: 20px; display: flex; flex-direction: column; z-index: 100; }
        h1 { font-size: 0.85rem; color: var(--magenta); text-transform: uppercase; margin: 0 0 15px; border-bottom: 1px solid var(--magenta); padding-bottom: 5px; letter-spacing: 1px; }
        
        select { background: #111; color: var(--cyan); border: 1px solid var(--cyan); padding: 10px; margin-bottom: 20px; font-weight: bold; width: 100%; cursor: pointer; }
        
        .control-group { background: #0a0a0a; border: 1px solid #222; padding: 12px; margin-bottom: 15px; border-radius: 4px; }
        .label-row { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--magenta); margin-bottom: 8px; font-weight: bold;}
        input[type=range] { width: 100%; accent-color: var(--cyan); cursor: pointer; }

        #readouts { margin-top: auto; border: 1px solid var(--cyan); padding: 15px; background: rgba(0, 255, 255, 0.05); }
        .stat { display: flex; justify-content: space-between; font-size: 0.9rem; margin: 5px 0; font-weight: bold;}

        #stage { flex: 1; position: relative; background: radial-gradient(circle at center, #111 0%, #000 100%); }
        svg { width: 100%; height: 100%; }
        
        .curve-main { fill: none; stroke: var(--cyan); stroke-width: 4; filter: drop-shadow(0 0 6px rgba(0,255,255,0.5)); stroke-linejoin: round; }
        .curve-inset { fill: none; stroke: var(--cyan); stroke-width: 3; stroke-linejoin: round; }
        .offset-line { fill: none; stroke: var(--yellow); stroke-width: 2; stroke-dasharray: 6,4; }
        .grid-line { stroke: var(--grid); stroke-width: 1; }
        .axis-line { stroke: var(--magenta); stroke-width: 2; }
        text { fill: var(--magenta); font-size: 11px; font-weight: bold; font-family: 'Consolas', monospace; }
        .axis-label { fill: var(--yellow); font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .inset-bg { fill: rgba(0,0,0,0.8); stroke: rgba(0,255,255,0.3); stroke-width: 2; rx: 5; }
    </style>
</head>
<body>

<div id="sidebar">
    <h1>Material Selector</h1>
    <select id="mat-select">
        <option value="mild">A36 Mild Steel (Discontinuous)</option>
        <option value="6061">6061-T6 Aluminum</option>
        <option value="316ss">316 Stainless Steel</option>
        <option value="ti64">Ti-6Al-4V (Grade 5)</option>
    </select>

    <h1>Fine-Tune Curve</h1>
    <div class="control-group">
        <div class="label-row"><span>Yield Stress (&sigma;<sub>y</sub>)</span><span id="txt-ys">--</span></div>
        <input type="range" id="sl-ys" min="100" max="1100">
    </div>

    <div class="control-group">
        <div class="label-row"><span>UTS Stress (&sigma;<sub>uts</sub>)</span><span id="txt-uts">--</span></div>
        <input type="range" id="sl-uts" min="200" max="1300">
        <div class="label-row" style="margin-top:10px;"><span>UTS Strain (&epsilon;<sub>uts</sub>)</span><span id="txt-utse">--</span></div>
        <input type="range" id="sl-utse" min="0.05" max="0.5" step="0.01">
    </div>

    <div class="control-group">
        <div class="label-row"><span>Fracture Strain (&epsilon;<sub>f</sub>)</span><span id="txt-fe">--</span></div>
        <input type="range" id="sl-fe" min="0.1" max="0.8" step="0.01">
    </div>

    <div id="readouts">
        <div class="stat"><span>Modulus (E):</span><span id="val-e">--</span></div>
        <div class="stat"><span>Ductility:</span><span id="val-el">--</span></div>
    </div>
</div>

<div id="stage">
    <svg id="plot"></svg>
</div>

<script>
const LIB = {
    "mild":  { ys: 250, e: 200, uts: 400, utse: 0.22, fe: 0.35, fs: 320, disc: true },
    "6061":  { ys: 275, e: 69,  uts: 310, utse: 0.12, fe: 0.17, fs: 250, disc: false },
    "316ss": { ys: 290, e: 193, uts: 580, utse: 0.45, fe: 0.60, fs: 480, disc: false },
    "ti64":  { ys: 880, e: 114, uts: 950, utse: 0.10, fe: 0.14, fs: 750, disc: false }
};

let state = {...LIB["mild"]};
const svg = document.getElementById('plot');

function sync(key) {
    state = {...LIB[key]};
    document.getElementById('sl-ys').value = state.ys;
    document.getElementById('sl-uts').value = state.uts;
    document.getElementById('sl-utse').value = state.utse;
    document.getElementById('sl-fe').value = state.fe;
    render();
}

function update() {
    state.ys = parseInt(document.getElementById('sl-ys').value);
    state.uts = parseInt(document.getElementById('sl-uts').value);
    state.utse = parseFloat(document.getElementById('sl-utse').value);
    state.fe = parseFloat(document.getElementById('sl-fe').value);
    if(state.uts <= state.ys) state.uts = state.ys + 20;
    if(state.fe <= state.utse) state.fe = state.utse + 0.05;
    state.fs = state.uts * 0.82;

    document.getElementById('txt-ys').innerText = state.ys + " MPa";
    document.getElementById('txt-uts').innerText = state.uts + " MPa";
    document.getElementById('txt-utse').innerText = state.utse.toFixed(2);
    document.getElementById('txt-fe').innerText = state.fe.toFixed(2);
    document.getElementById('val-e').innerText = state.e + " GPa";
    document.getElementById('val-el').innerText = (state.fe * 100).toFixed(1) + "% EL";
}

function solveCurve(s) {
    let pts = [];
    const ye = (s.ys / (s.e * 1000));
    
    if(s.disc) {
        // Discontinuous Yield (A36 profile: UYP, LYP, Plateau)
        const propLimit = ye * 0.90;
        const uyp = s.ys + 25;
        const lyp = s.ys - 15;
        const plateauEnd = ye + 0.015;

        for(let x=0; x <= propLimit; x += propLimit/10) pts.push({x, y: x * s.e * 1000});
        pts.push({x: ye * 0.98, y: uyp}); // Spike to UYP
        pts.push({x: ye * 1.02, y: lyp}); // Drop to LYP
        
        // Jagged Plateau effect
        for(let x=ye*1.02; x<=plateauEnd; x+=0.003) {
            pts.push({x, y: lyp + (Math.random() * 6 - 3)});
        }
        pts.push({x: plateauEnd, y: lyp});
    } else {
        // Continuous Yield (Gradual Proportional Fillet)
        const propLimit = ye * 0.75;
        for(let x=0; x <= propLimit; x += propLimit/10) pts.push({x, y: x * s.e * 1000});
        
        for(let i=1; i<=15; i++) {
            let t = i/15;
            let x = propLimit + (ye - propLimit) * t;
            let linearY = x * s.e * 1000;
            // Sine blend to round off the corner
            let blend = Math.sin(t * Math.PI/2);
            pts.push({x, y: linearY * (1 - blend*0.1) }); 
        }
    }

    // Plastic Strain Hardening
    let startX = pts[pts.length-1].x;
    let startY = pts[pts.length-1].y;
    for(let i=1; i<=100; i++) {
        let t = i/100;
        let x = startX + (s.utse - startX) * t;
        let y = startY + (s.uts - startY) * Math.pow(t, 0.45); 
        pts.push({x, y});
    }

    // Necking to Fracture
    for(let i=1; i<=50; i++) {
        let t = i/50;
        let x = s.utse + (s.fe - s.utse) * t;
        let y = s.uts - (s.uts - s.fs) * (t * t);
        pts.push({x, y});
    }
    return pts;
}

function render() {
    svg.innerHTML = '';
    update();
    const w = svg.clientWidth, h = svg.clientHeight;
    const pad = { l: 80, r: 40, t: 40, b: 80 }; // Reduced padding to maximize space

    // Main Plot Scales
    const maxStrain = Math.max(0.6, Math.ceil(state.fe * 10) / 10);
    const maxStress = 1200;
    
    const mX = (v) => pad.l + (v / maxStrain) * (w - pad.l - pad.r);
    const mY = (v) => h - pad.b - (v / maxStress) * (h - pad.t - pad.b);

    // --- MAIN GRID & LABELS ---
    for(let s=200; s<=maxStress; s+=200) {
        let y = mY(s);
        svg.innerHTML += `<line class="grid-line" x1="${pad.l}" y1="${y}" x2="${w-pad.r}" y2="${y}"/>`;
        svg.innerHTML += `<text x="${pad.l - 10}" y="${y+4}" text-anchor="end">${s}</text>`;
    }
    for(let e=0.1; e<=maxStrain; e+=0.1) {
        let x = mX(e);
        svg.innerHTML += `<line class="grid-line" x1="${x}" y1="${pad.t}" x2="${x}" y2="${h-pad.b}"/>`;
        svg.innerHTML += `<text x="${x}" y="${h-pad.b + 20}" text-anchor="middle">${e.toFixed(1)}</text>`;
    }

    // Axes
    svg.innerHTML += `<line class="axis-line" x1="${pad.l}" y1="${h-pad.b}" x2="${w-pad.r}" y2="${h-pad.b}"/>`;
    svg.innerHTML += `<line class="axis-line" x1="${pad.l}" y1="${pad.t}" x2="${pad.l}" y2="${h-pad.b}"/>`;
    
    svg.innerHTML += `<text class="axis-label" x="${w/2}" y="${h-20}" text-anchor="middle">Engineering Strain (mm/mm)</text>`;
    svg.innerHTML += `<text class="axis-label" transform="rotate(-90, 25, ${h/2})" x="25" y="${h/2}" text-anchor="middle">Engineering Stress (MPa)</text>`;

    // Main Curve
    const pts = solveCurve(state);
    let d = `M ${mX(pts[0].x)} ${mY(pts[0].y)}`;
    for(let i=1; i<pts.length; i++) d += ` L ${mX(pts[i].x)} ${mY(pts[i].y)}`;
    svg.innerHTML += `<path class="curve-main" d="${d}"/>`;

    // --- MASSIVE DYNAMIC INSET ---
    // Make inset take up ~35% of the upper right area
    const iW = Math.min(450, w * 0.35);
    const iH = Math.min(350, h * 0.45);
    const iX0 = w - pad.r - iW - 20; 
    const iY0 = pad.t + 20;

    svg.innerHTML += `<rect class="inset-bg" x="${iX0}" y="${iY0}" width="${iW}" height="${iH}"/>`;

    // Inset Scales: Strict micro-strain domain
    const ye = (state.ys / (state.e * 1000));
    // Domain goes to at least 0.008, or slightly past the yield point for Titanium
    const inMaxE = Math.max(0.008, ye * 1.5); 
    const inMaxS = state.ys * 1.3;

    const inPad = {l: 50, r: 20, t: 30, b: 40};
    const inX = (v) => iX0 + inPad.l + (v / inMaxE) * (iW - inPad.l - inPad.r);
    const inY = (v) => iY0 + iH - inPad.b - (v / inMaxS) * (iH - inPad.t - inPad.b);

    // Inset Axes
    svg.innerHTML += `<line class="axis-line" x1="${inX(0)}" y1="${inY(0)}" x2="${inX(inMaxE)}" y2="${inY(0)}"/>`;
    svg.innerHTML += `<line class="axis-line" x1="${inX(0)}" y1="${inY(inMaxS)}" x2="${inX(0)}" y2="${inY(0)}"/>`;

    // Inset Ticks (Micro-strain)
    for(let se=0.001; se<=inMaxE; se+=0.001) {
        let ix = inX(se);
        svg.innerHTML += `<line class="axis-line" x1="${ix}" y1="${inY(0)}" x2="${ix}" y2="${inY(0)+5}"/>`;
        // Label every 0.002 to avoid crowding
        if(Math.round(se*1000) % 2 === 0) {
            svg.innerHTML += `<text x="${ix}" y="${inY(0)+18}" text-anchor="middle" font-size="9px">${se.toFixed(3)}</text>`;
        }
    }
    // Inset Stress Ticks
    for(let ss=100; ss<=inMaxS; ss+=100) {
        let iy = inY(ss);
        svg.innerHTML += `<text x="${inX(0)-5}" y="${iy+4}" text-anchor="end" font-size="9px">${ss}</text>`;
    }

    // 0.2% Offset Line
    const x1_off = 0.002;
    const y1_off = 0;
    const x2_off = inMaxE;
    const y2_off = (inMaxE - 0.002) * state.e * 1000;
    svg.innerHTML += `<line class="offset-line" x1="${inX(x1_off)}" y1="${inY(y1_off)}" x2="${inX(x2_off)}" y2="${inY(y2_off)}"/>`;
    svg.innerHTML += `<text x="${inX(0.002)}" y="${inY(0)-10}" text-anchor="middle" fill="var(--yellow)">0.2%</text>`;

    // Inset Curve
    let id = `M ${inX(pts[0].x)} ${inY(pts[0].y)}`;
    for(let i=1; i<pts.length; i++) {
        if(pts[i].x > inMaxE || pts[i].y > inMaxS) {
            // Draw one more point past the boundary so it doesn't gap
            id += ` L ${inX(pts[i].x)} ${inY(pts[i].y)}`;
            break;
        }
        id += ` L ${inX(pts[i].x)} ${inY(pts[i].y)}`;
    }
    svg.innerHTML += `<path class="curve-inset" d="${id}"/>`;

    // Yield Point Marker
    if(!state.disc) {
        svg.innerHTML += `<circle cx="${inX(ye + 0.002)}" cy="${inY(state.ys)}" r="4" fill="var(--magenta)"/>`;
        svg.innerHTML += `<text x="${inX(ye + 0.002) - 10}" y="${inY(state.ys) - 10}" text-anchor="end" font-size="12px">&sigma;y = ${state.ys} MPa</text>`;
    }
}

document.getElementById('mat-select').onchange = (e) => sync(e.target.value);
document.querySelectorAll('input').forEach(i => i.oninput = render);
window.onresize = render;
sync("mild");
</script>
</body>
</html>

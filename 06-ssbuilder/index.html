<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Materials Simulator // Pro-Grade</title>
    <style>
        :root { --bg: #050505; --cyan: #00ffff; --magenta: #ff00ff; --yellow: #ffff00; --orange: #ffaa00; --red: #ff3333; --purple: #cc00ff; --grid: rgba(255, 0, 255, 0.1); }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; display: flex; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--cyan); overflow: hidden; }
        
        #sidebar { width: 340px; background: rgba(0,0,0,0.95); border-right: 2px solid var(--magenta); padding: 20px; display: flex; flex-direction: column; z-index: 100; overflow-y: auto; }
        h1 { font-size: 0.85rem; color: var(--magenta); text-transform: uppercase; margin: 15px 0 10px; border-bottom: 1px solid var(--magenta); padding-bottom: 5px; letter-spacing: 1px; }
        h1:first-of-type { margin-top: 0; }
        
        select { background: #111; color: var(--cyan); border: 1px solid var(--cyan); padding: 10px; margin-bottom: 10px; font-weight: bold; width: 100%; cursor: pointer; }
        
        .control-group { background: #0a0a0a; border: 1px solid #222; padding: 12px; margin-bottom: 15px; border-radius: 4px; }
        .label-row { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--magenta); margin-bottom: 8px; font-weight: bold;}
        input[type=range] { width: 100%; accent-color: var(--cyan); cursor: pointer; }

        #readouts { margin-top: auto; border: 1px solid var(--cyan); padding: 10px; background: rgba(0, 255, 255, 0.05); }
        .stat { display: flex; justify-content: space-between; font-size: 0.8rem; margin: 6px 0; font-weight: bold;}
        .stat.orange { color: var(--orange); }
        .stat.red { color: var(--red); }
        .stat.purple { color: var(--purple); border-top: 1px solid #333; padding-top: 5px; font-size: 0.9rem;}
        .sub-stat { font-size: 0.7rem; color: #888; margin-top: -4px; margin-bottom: 6px; text-align: right; }

        #stage { flex: 1; position: relative; background: radial-gradient(circle at center, #111 0%, #000 100%); }
        svg { width: 100%; height: 100%; }
        
        .curve-main { fill: none; stroke: var(--cyan); stroke-width: 4; filter: drop-shadow(0 0 6px rgba(0,255,255,0.4)); }
        .curve-inset { fill: none; stroke: var(--cyan); stroke-width: 3; }
        .offset-line { fill: none; stroke: var(--yellow); stroke-width: 1.5; stroke-dasharray: 4,3; }
        .indicator-line { fill: none; stroke-width: 2; stroke-dasharray: 4,4; }
        .grid-line { stroke: var(--grid); stroke-width: 1; }
        .axis-line { stroke: var(--magenta); stroke-width: 2; }
        text { fill: var(--magenta); font-size: 11px; font-weight: bold; font-family: 'Consolas', monospace; }
        .axis-label { fill: var(--yellow); font-size: 14px; text-transform: uppercase; }
        .inset-bg { fill: #080808; stroke: rgba(0,255,255,0.3); stroke-width: 2; rx: 4; }
    </style>
</head>
<body>

<div id="sidebar">
    <h1>Material</h1>
    <select id="mat-select">
        <option value="ti64">Ti-6Al-4V (Grade 5)</option>
        <option value="mild">A36 Mild Steel</option>
        <option value="6061">6061-T6 Aluminum</option>
        <option value="316ss">316 Stainless Steel</option>
    </select>

    <h1>Inset Layout</h1>
    <select id="aspect-toggle">
        <option value="tall" selected>Tall (75% Viewport)</option>
        <option value="wide">Wide (16:9)</option>
        <option value="square">Square (1:1)</option>
    </select>

    <h1>Geometry Control</h1>
    <div class="control-group">
        <div class="label-row"><span>Yield Stress (&sigma;<sub>y</sub>)</span><span id="txt-ys">--</span></div>
        <input type="range" id="sl-ys" min="100" max="1100">
    </div>

    <div class="control-group">
        <div class="label-row"><span>UTS Stress (&sigma;<sub>uts</sub>)</span><span id="txt-uts">--</span></div>
        <input type="range" id="sl-uts" min="200" max="1300">
        <div class="label-row" style="margin-top:10px;"><span>UTS Strain (&epsilon;<sub>uts</sub>)</span><span id="txt-utse">--</span></div>
        <input type="range" id="sl-utse" min="0.05" max="0.5" step="0.01">
    </div>

    <div class="control-group">
        <div class="label-row"><span>Fracture Strain (&epsilon;<sub>f</sub>)</span><span id="txt-fe">--</span></div>
        <input type="range" id="sl-fe" min="0.1" max="0.8" step="0.01">
    </div>

    <div id="readouts">
        <div class="stat red"><span>&epsilon;<sub>fracture</sub> (Total):</span><span id="val-ef">--</span></div>
        <div class="stat orange"><span>&epsilon;<sub>P</sub> (Prop. Limit):</span><span id="val-ep">--</span></div>
        <div class="sub-stat">Opt 1 Approx: <span id="val-opt1">--</span></div>
        <div class="stat orange"><span>&epsilon;<sub>recovery</sub> (Unloading):</span><span id="val-er">--</span></div>
        <div class="stat purple"><span>True Ductility (%EL):</span><span id="val-el">--</span></div>
    </div>
</div>

<div id="stage">
    <svg id="plot"></svg>
</div>

<script>
const LIB = {
    "mild":  { ys: 250, e: 200, uts: 400, utse: 0.22, fe: 0.35, fs: 320, disc: true },
    "6061":  { ys: 275, e: 69,  uts: 310, utse: 0.12, fe: 0.17, fs: 250, disc: false },
    "316ss": { ys: 290, e: 193, uts: 580, utse: 0.45, fe: 0.60, fs: 480, disc: false },
    "ti64":  { ys: 880, e: 114, uts: 950, utse: 0.10, fe: 0.14, fs: 750, disc: false }
};

let state = {...LIB["ti64"]};
const svg = document.getElementById('plot');

function sync(key) {
    state = {...LIB[key]};
    document.getElementById('sl-ys').value = state.ys;
    document.getElementById('sl-uts').value = state.uts;
    document.getElementById('sl-utse').value = state.utse;
    document.getElementById('sl-fe').value = state.fe;
    render();
}

function updateCalculations() {
    state.ys = parseInt(document.getElementById('sl-ys').value);
    state.uts = parseInt(document.getElementById('sl-uts').value);
    state.utse = parseFloat(document.getElementById('sl-utse').value);
    state.fe = parseFloat(document.getElementById('sl-fe').value);
    if(state.uts <= state.ys) state.uts = state.ys + 20;
    if(state.fe <= state.utse) state.fe = state.utse + 0.05;
    state.fs = state.uts * 0.82;

    const eMod = state.e * 1000;
    
    // Method 1: Strain at Proportional Limit
    const epsP = state.disc ? (state.ys * 0.90) / eMod : (state.ys * 0.50) / eMod;
    const opt1Plastic = state.fe - epsP;

    // Method 2: True Elastic Recovery at Failure
    const epsRecovery = state.fs / eMod; 
    const truePlastic = state.fe - epsRecovery;

    document.getElementById('txt-ys').innerText = state.ys + " MPa";
    document.getElementById('txt-uts').innerText = state.uts + " MPa";
    document.getElementById('txt-utse').innerText = state.utse.toFixed(2);
    document.getElementById('txt-fe').innerText = state.fe.toFixed(2);
    
    document.getElementById('val-ef').innerText = state.fe.toFixed(3);
    document.getElementById('val-ep').innerText = epsP.toFixed(4);
    document.getElementById('val-opt1').innerText = (opt1Plastic * 100).toFixed(2) + "%";
    document.getElementById('val-er').innerText = epsRecovery.toFixed(4);
    document.getElementById('val-el').innerText = (truePlastic * 100).toFixed(2) + "%";

    return { epsP, truePlastic };
}

function solveCurve(s) {
    let pts = [];
    const eMod = s.e * 1000;
    let startX = 0, startY = 0;
    
    if(s.disc) {
        const ye = s.ys / eMod;
        const propLimitX = ye * 0.90;
        const uyp = s.ys + 25;
        const lyp = s.ys - 15; 
        const plateauEnd = ye + 0.015;
        for(let x=0; x <= propLimitX; x += propLimitX/10) pts.push({x, y: x * eMod});
        pts.push({x: ye * 0.98, y: uyp});
        pts.push({x: ye * 1.02, y: lyp});
        for(let x=ye*1.02; x<=plateauEnd; x+=0.002) pts.push({x, y: lyp + (Math.random() * 6 - 3)});
        pts.push({x: plateauEnd, y: lyp});
        startX = plateauEnd; startY = lyp;
    } else {
        const yieldY = s.ys;
        const hookeX = s.ys / eMod;
        const yieldX = hookeX + 0.002;
        const propLimitY = s.ys * 0.50; 
        const propLimitX = propLimitY / eMod;
        for(let x=0; x <= propLimitX; x += propLimitX/10) pts.push({x, y: x * eMod});
        for(let i=1; i<=20; i++) {
            let t = i/20;
            let x = (1-t)*(1-t)*propLimitX + 2*(1-t)*t*hookeX + t*t*yieldX;
            let y = (1-t)*(1-t)*propLimitY + 2*(1-t)*t*yieldY + t*t*yieldY;
            pts.push({x, y});
        }
        startX = yieldX; startY = yieldY;
    }
    for(let i=1; i<=80; i++) {
        let t = i/80;
        let x = startX + (s.utse - startX) * t;
        let y = startY + (s.uts - startY) * Math.pow(t, 0.45); 
        pts.push({x, y});
    }
    for(let i=1; i<=40; i++) {
        let t = i/40;
        let x = s.utse + (s.fe - s.utse) * t;
        let y = s.uts - (s.uts - s.fs) * (t * t);
        pts.push({x, y});
    }
    return pts;
}

function render() {
    svg.innerHTML = '';
    const { epsP, truePlastic } = updateCalculations();
    const w = svg.clientWidth, h = svg.clientHeight;
    const pad = { l: 80, r: 40, t: 40, b: 80 }; 

    const maxStrain = Math.max(0.6, Math.ceil(state.fe * 10) / 10);
    const maxStress = 1200;
    const mX = (v) => pad.l + (v / maxStrain) * (w - pad.l - pad.r);
    const mY = (v) => h - pad.b - (v / maxStress) * (h - pad.t - pad.b);

    // Axes
    svg.innerHTML += `<line class="axis-line" x1="${pad.l}" y1="${h-pad.b}" x2="${w-pad.r}" y2="${h-pad.b}"/>`;
    svg.innerHTML += `<line class="axis-line" x1="${pad.l}" y1="${pad.t}" x2="${pad.l}" y2="${h-pad.b}"/>`;
    svg.innerHTML += `<text class="axis-label" x="${w/2}" y="${h-20}" text-anchor="middle">Strain &epsilon;</text>`;
    svg.innerHTML += `<text class="axis-label" transform="rotate(-90, 25, ${h/2})" x="25" y="${h/2}" text-anchor="middle">Stress &sigma; (MPa)</text>`;

    const pts = solveCurve(state);
    let d = `M ${mX(pts[0].x)} ${mY(pts[0].y)}`;
    for(let i=1; i<pts.length; i++) d += ` L ${mX(pts[i].x)} ${mY(pts[i].y)}`;
    svg.innerHTML += `<path class="curve-main" d="${d}" fill="none" stroke="var(--cyan)" stroke-width="3"/>`;

    // --- MAIN PLOT INDICATORS ---
    // Total Fracture Strain Line (Red)
    svg.innerHTML += `<line class="indicator-line" stroke="var(--red)" x1="${mX(state.fe)}" y1="${mY(state.fs)}" x2="${mX(state.fe)}" y2="${mY(0)}"/>`;
    svg.innerHTML += `<text x="${mX(state.fe) + 5}" y="${mY(0) - 25}" fill="var(--red)" font-size="12px">&epsilon;_f</text>`;

    // True Plastic Strain Unloading Line (Orange)
    svg.innerHTML += `<line class="indicator-line" stroke="var(--orange)" x1="${mX(state.fe)}" y1="${mY(state.fs)}" x2="${mX(truePlastic)}" y2="${mY(0)}"/>`;
    svg.innerHTML += `<text x="${mX(truePlastic) - 5}" y="${mY(0) - 10}" fill="var(--purple)" font-size="13px" font-weight="bold" text-anchor="end">&epsilon;_plastic (%EL)</text>`;

    // Mark the x-intercept
    svg.innerHTML += `<circle cx="${mX(truePlastic)}" cy="${mY(0)}" r="4" fill="var(--purple)"/>`;


    // --- INSET LAYOUT ---
    const aspect = document.getElementById('aspect-toggle').value;
    let iW, iH;
    if (aspect === 'tall') { iH = h * 0.75; iW = Math.min(w * 0.40, iH * 0.60); }
    else if (aspect === 'wide') { iW = w * 0.45; iH = iW * (9/16); }
    else { iH = Math.min(w * 0.35, h * 0.55); iW = iH; }

    const iX0 = w - pad.r - iW - 20; 
    const iY0 = pad.t + 20;
    svg.innerHTML += `<rect class="inset-bg" x="${iX0}" y="${iY0}" width="${iW}" height="${iH}"/>`;

    const inMaxE = 0.008; 
    const inMaxS = Math.ceil(state.ys * 1.3 / 100) * 100;
    const inPad = {l: 55, r: 20, t: 40, b: 40};
    const inX = (v) => iX0 + inPad.l + (v / inMaxE) * (iW - inPad.l - inPad.r);
    const inY = (v) => iY0 + iH - inPad.b - (v / inMaxS) * (iH - inPad.t - inPad.b);

    // Inset Dynamic Indicators
    const eMod = state.e * 1000;
    
    // 1. Orange: Elastic Limit Line (Method 1 Indicator)
    const yAtP = state.disc ? state.ys * 0.90 : state.ys * 0.50;
    svg.innerHTML += `<line class="indicator-line" stroke="var(--orange)" x1="${inX(epsP)}" y1="${inY(0)}" x2="${inX(epsP)}" y2="${inY(yAtP)}"/>`;
    svg.innerHTML += `<text x="${inX(epsP)}" y="${inY(0)+15}" fill="var(--orange)" text-anchor="middle" font-size="9px">Prop Limit (P)</text>`;

    if(!state.disc) {
        const yieldX = (state.ys / eMod) + 0.002;
        // 0.2% Offset Line (Yellow)
        svg.innerHTML += `<line class="offset-line" x1="${inX(0.002)}" y1="${inY(0)}" x2="${inX((inMaxS/eMod)+0.002)}" y2="${inY(inMaxS)}"/>`;
        svg.innerHTML += `<line class="offset-line" x1="${inX(0)}" y1="${inY(state.ys)}" x2="${inX(yieldX)}" y2="${inY(state.ys)}"/>`;
        svg.innerHTML += `<circle cx="${inX(yieldX)}" cy="${inY(state.ys)}" r="5" fill="var(--magenta)"/>`;
        svg.innerHTML += `<text x="${inX(0)+5}" y="${inY(state.ys)-5}" fill="var(--magenta)" font-weight="bold">&sigma;y = ${state.ys}</text>`;
    } else {
        const lyp = state.ys - 15;
        svg.innerHTML += `<line class="offset-line" x1="${inX(0)}" y1="${inY(lyp)}" x2="${inX(inMaxE)}" y2="${inY(lyp)}"/>`;
        svg.innerHTML += `<text x="${inX(0)+5}" y="${inY(lyp)-5}" fill="var(--yellow)" font-weight="bold">&sigma;y,LYP = ${lyp}</text>`;
    }

    // Inset Axes
    svg.innerHTML += `<line class="axis-line" x1="${inX(0)}" y1="${inY(0)}" x2="${inX(inMaxE)}" y2="${inY(0)}"/>`;
    svg.innerHTML += `<line class="axis-line" x1="${inX(0)}" y1="${inY(inMaxS)}" x2="${inX(0)}" y2="${inY(0)}"/>`;

    // Clip & Curve
    svg.innerHTML += `<defs><clipPath id="cp"><rect x="${inX(0)}" y="${inY(inMaxS)}" width="${inX(inMaxE)-inX(0)}" height="${inY(0)-inY(inMaxS)}"/></clipPath></defs>`;
    let id = `M ${inX(pts[0].x)} ${inY(pts[0].y)}`;
    for(let i=1; i<pts.length; i++) id += ` L ${inX(pts[i].x)} ${inY(pts[i].y)}`;
    svg.innerHTML += `<path class="curve-inset" d="${id}" clip-path="url(#cp)"/>`;
}

document.getElementById('mat-select').onchange = (e) => sync(e.target.value);
document.getElementById('aspect-toggle').onchange = render;
document.querySelectorAll('input').forEach(i => i.oninput = render);
window.onresize = render;
sync("ti64");
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ch 6: Mechanical Props // Advanced Materials Simulator</title>
    <style>
        :root { --bg: #050505; --neon-cyan: #00ffff; --neon-magenta: #ff00ff; --neon-yellow: #ffff00; --grid: rgba(255, 0, 255, 0.15); }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; display: flex; font-family: 'Segoe UI', 'Arial Black', sans-serif; background: var(--bg); color: var(--neon-cyan); overflow: hidden; font-weight: 900; }
        
        #sidebar { width: 380px; background: rgba(0,0,0,0.9); border-right: 2px solid var(--neon-magenta); padding: 20px; display: flex; flex-direction: column; z-index: 100; box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
        h1 { font-size: 0.9rem; color: var(--neon-magenta); text-transform: uppercase; margin: 0 0 15px; border-bottom: 1px solid var(--neon-magenta); padding-bottom: 5px; letter-spacing: 1px; }
        
        select { background: #111; color: var(--neon-cyan); border: 1px solid var(--neon-cyan); padding: 8px; margin-bottom: 20px; font-weight: bold; width: 100%; }
        
        .control-group { background: #111; border: 1px solid #333; padding: 10px; margin-bottom: 12px; border-radius: 4px; }
        .label-box { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--neon-magenta); margin-bottom: 5px; }
        input[type=range] { width: 100%; accent-color: var(--neon-cyan); cursor: pointer; }

        #readouts { margin-top: auto; border: 1px solid var(--neon-cyan); padding: 15px; background: rgba(0, 255, 255, 0.05); }
        .stat { display: flex; justify-content: space-between; font-size: 1rem; margin: 4px 0; }

        #stage { flex: 1; position: relative; }
        svg { width: 100%; height: 100%; }
        
        .curve { fill: none; stroke: var(--neon-cyan); stroke-width: 3.5; filter: drop-shadow(0 0 5px var(--neon-cyan)); }
        .offset { fill: none; stroke: var(--neon-yellow); stroke-width: 2; stroke-dasharray: 6,4; }
        .grid-line { stroke: var(--grid); stroke-width: 1; }
        .axis-main { stroke: var(--neon-magenta); stroke-width: 2.5; }
        text { fill: var(--neon-magenta); font-size: 12px; font-weight: bold; }
        .inset-rect { fill: rgba(0,0,0,0.9); stroke: #444; stroke-width: 2; }
    </style>
</head>
<body>

<div id="sidebar">
    <h1>Material Library</h1>
    <select id="mat-select">
        <option value="316ss">316 Stainless Steel (Annealed)</option>
        <option value="mild">A36 Mild Steel (Discontinuous)</option>
        <option value="6061">6061-T6 Aluminum</option>
        <option value="ti64">Ti-6Al-4V (Grade 5)</option>
    </select>

    <h1>Parameter Adjustment</h1>
    <div class="control-group">
        <div class="label-box"><span>Yield Stress (&sigma;<sub>y</sub>)</span><span id="txt-ys">--</span></div>
        <input type="range" id="sl-ys" min="100" max="1100">
    </div>

    <div class="control-group">
        <div class="label-box"><span>UTS Stress (&sigma;<sub>uts</sub>)</span><span id="txt-uts">--</span></div>
        <input type="range" id="sl-uts" min="200" max="1300">
        <div class="label-box" style="margin-top:8px;"><span>UTS Strain (&epsilon;<sub>uts</sub>)</span><span id="txt-utse">--</span></div>
        <input type="range" id="sl-utse" min="0.05" max="0.5" step="0.01">
    </div>

    <div class="control-group">
        <div class="label-box"><span>Fracture Strain (&epsilon;<sub>f</sub>)</span><span id="txt-fe">--</span></div>
        <input type="range" id="sl-fe" min="0.1" max="0.8" step="0.01">
    </div>

    <div id="readouts">
        <div class="stat"><span>Modulus (E):</span><span id="val-e">--</span></div>
        <div class="stat"><span>Ductility (%EL):</span><span id="val-el">--</span></div>
    </div>
</div>

<div id="stage">
    <svg id="plot"></svg>
</div>

<script>
// Material Presets - Literature Defaults
const LIB = {
    "316ss": { ys: 290, e: 193, uts: 580, utse: 0.45, fe: 0.60, fs: 480, disc: false },
    "mild":  { ys: 250, e: 200, uts: 400, utse: 0.22, fe: 0.35, fs: 320, disc: true },
    "6061":  { ys: 275, e: 69,  uts: 310, utse: 0.12, fe: 0.17, fs: 250, disc: false },
    "ti64":  { ys: 880, e: 114, uts: 950, utse: 0.10, fe: 0.14, fs: 750, disc: false }
};

let state = {...LIB["316ss"]};
const svg = document.getElementById('plot');

function syncInputs(key) {
    state = {...LIB[key]};
    document.getElementById('sl-ys').value = state.ys;
    document.getElementById('sl-uts').value = state.uts;
    document.getElementById('sl-utse').value = state.utse;
    document.getElementById('sl-fe').value = state.fe;
    render();
}

function updateState() {
    state.ys = parseInt(document.getElementById('sl-ys').value);
    state.uts = parseInt(document.getElementById('sl-uts').value);
    state.utse = parseFloat(document.getElementById('sl-utse').value);
    state.fe = parseFloat(document.getElementById('sl-fe').value);

    // Physical Constraints
    if (state.uts <= state.ys) state.uts = state.ys + 20;
    if (state.fe <= state.utse) state.fe = state.utse + 0.05;
    state.fs = state.uts * 0.85; // Simple necking approx for visuals

    // Output Text
    document.getElementById('txt-ys').innerText = state.ys + " MPa";
    document.getElementById('txt-uts').innerText = state.uts + " MPa";
    document.getElementById('txt-utse').innerText = state.utse.toFixed(2);
    document.getElementById('txt-fe').innerText = state.fe.toFixed(2);
    document.getElementById('val-e').innerText = state.e + " GPa";
    document.getElementById('val-el').innerText = (state.fe * 100).toFixed(1) + "%";
}

function generateCurvePoints(s) {
    let pts = [];
    const ye = (s.ys / (s.e * 1000)); // Elastic limit strain
    
    // 1. Elastic Linear
    for(let x=0; x <= ye; x += ye/10) pts.push({x, y: x * (s.e * 1000)});

    if(s.disc) {
        // Lüders Bands / Discontinuous Yield
        let lastX = pts[pts.length-1].x;
        pts.push({x: lastX + 0.0005, y: s.ys + 40}); // Upper Yield
        pts.push({x: lastX + 0.0015, y: s.ys - 10}); // Lower Yield Drop
        pts.push({x: lastX + 0.03, y: s.ys});       // Plateau
    }

    // 2. Strain Hardening (Power Law: sigma = K * eps^n)
    // We approximate to hit the UTS at utse
    let startX = pts[pts.length-1].x;
    let startY = pts[pts.length-1].y;
    let steps = 100;
    for(let i=1; i<=steps; i++) {
        let t = i/steps;
        let x = startX + (s.utse - startX) * t;
        // Smooth parabolic-ish hardening
        let y = startY + (s.uts - startY) * Math.sin((Math.PI/2) * t);
        pts.push({x, y});
    }

    // 3. Necking (UTS to Fracture)
    for(let i=1; i<=50; i++) {
        let t = i/50;
        let x = s.utse + (s.fe - s.utse) * t;
        let y = s.uts - (s.uts - s.fs) * (t * t);
        pts.push({x, y});
    }
    return pts;
}

function render() {
    svg.innerHTML = '';
    updateState();
    const w = svg.clientWidth, h = svg.clientHeight;
    const pad = { l: 80, r: 60, t: 60, b: 80 };

    // Mappers
    const mX = (v) => pad.l + (v / 0.7) * (w - pad.l - pad.r);
    const mY = (v) => h - pad.b - (v / 1400) * (h - pad.t - pad.b);

    // --- GRID & AXES ---
    // Horizontal Grid
    for(let s=200; s<=1200; s+=200) {
        let y = mY(s);
        let l = document.createElementNS("http://www.w3.org/2000/svg", "line");
        l.setAttribute("x1", pad.l); l.setAttribute("y1", y); l.setAttribute("x2", w-pad.r); l.setAttribute("y2", y);
        l.setAttribute("class", "grid-line"); svg.appendChild(l);
        let t = document.createElementNS("http://www.w3.org/2000/svg", "text");
        t.setAttribute("x", pad.l - 10); t.setAttribute("y", y+5); t.setAttribute("text-anchor", "end");
        t.textContent = s; svg.appendChild(t);
    }
    // Vertical Grid
    for(let e=0.1; e<=0.6; e+=0.1) {
        let x = mX(e);
        let l = document.createElementNS("http://www.w3.org/2000/svg", "line");
        l.setAttribute("x1", x); l.setAttribute("y1", pad.t); l.setAttribute("x2", x); l.setAttribute("y2", h-pad.b);
        l.setAttribute("class", "grid-line"); svg.appendChild(l);
        let t = document.createElementNS("http://www.w3.org/2000/svg", "text");
        t.setAttribute("x", x); t.setAttribute("y", h-pad.b + 25); t.setAttribute("text-anchor", "middle");
        t.textContent = e.toFixed(1); svg.appendChild(t);
    }

    // Main Axes
    let xAxis = document.createElementNS("http://www.w3.org/2000/svg", "line");
    xAxis.setAttribute("x1", pad.l); xAxis.setAttribute("y1", h-pad.b); xAxis.setAttribute("x2", w-pad.r); xAxis.setAttribute("y2", h-pad.b);
    xAxis.setAttribute("class", "axis-main"); svg.appendChild(xAxis);
    
    let yAxis = document.createElementNS("http://www.w3.org/2000/svg", "line");
    yAxis.setAttribute("x1", pad.l); yAxis.setAttribute("y1", pad.t); yAxis.setAttribute("x2", pad.l); yAxis.setAttribute("y2", h-pad.b);
    yAxis.setAttribute("class", "axis-main"); svg.appendChild(yAxis);

    // Curve
    const pts = generateCurvePoints(state);
    let d = `M ${mX(pts[0].x)} ${mY(pts[0].y)}`;
    for(let i=1; i<pts.length; i++) d += ` L ${mX(pts[i].x)} ${mY(pts[i].y)}`;
    let path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    path.setAttribute("d", d); path.setAttribute("class", "curve"); svg.appendChild(path);

    // --- INSET (ELASTIC ZOOM) ---
    const iW = 350, iH = 220;
    const iX0 = w - iW - 80, iY0 = pad.t + 20;
    let box = document.createElementNS("http://www.w3.org/2000/svg", "rect");
    box.setAttribute("x", iX0); box.setAttribute("y", iY0); box.setAttribute("width", iW); box.setAttribute("height", iH);
    box.setAttribute("class", "inset-rect"); svg.appendChild(box);

    const inX = (v) => iX0 + 50 + (v / 0.012) * (iW - 70);
    const inY = (v) => iY0 + iH - 40 - (v / 1100) * (iH - 60);

    // Inset 0.2% Offset Line
    let off = document.createElementNS("http://www.w3.org/2000/svg", "line");
    off.setAttribute("x1", inX(0.002)); off.setAttribute("y1", inY(0));
    off.setAttribute("x2", inX(0.002 + 0.006)); off.setAttribute("y2", inY(0.006 * state.e * 1000));
    off.setAttribute("class", "offset"); svg.appendChild(off);

    // Inset Curve
    let id = `M ${inX(pts[0].x)} ${inY(pts[0].y)}`;
    for(let i=1; i<pts.length; i++) {
        if(pts[i].x > 0.012) break;
        id += ` L ${inX(pts[i].x)} ${inY(pts[i].y)}`;
    }
    let ipath = document.createElementNS("http://www.w3.org/2000/svg", "path");
    ipath.setAttribute("d", id); ipath.setAttribute("class", "curve");
    ipath.setAttribute("stroke-width", "2"); svg.appendChild(ipath);

    // Inset Ticks
    for(let s=0; s<=1000; s+=200) {
        let ty = inY(s);
        let t = document.createElementNS("http://www.w3.org/2000/svg", "text");
        t.setAttribute("x", iX0 + 45); t.setAttribute("y", ty+4); t.setAttribute("text-anchor", "end");
        t.setAttribute("font-size", "10px"); t.textContent = s; svg.appendChild(t);
    }
}

document.getElementById('mat-select').onchange = (e) => syncInputs(e.target.value);
document.querySelectorAll('input').forEach(i => i.oninput = render);
window.onresize = render;
syncInputs("316ss");
</script>
</body>
</html>

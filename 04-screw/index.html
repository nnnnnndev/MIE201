<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Defect Engine - Neon Industrial Unified</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TrackballControls.js"></script>
    <style>
        body { margin: 0; background: #020205; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* UI Panel - Matching index(4).html styling */
        #ui { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            background: rgba(5, 5, 15, 0.95); 
            padding: 25px; 
            border-radius: 12px; 
            border: 1px solid #00ffff; 
            width: 300px; 
            z-index: 100; 
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2); 
            display: flex; 
            flex-direction: column;
        }

        .header { font-weight: 900; font-size: 1.4rem; margin-bottom: 5px; color: #fff; letter-spacing: -0.5px; text-transform: uppercase; }
        .sub-header { font-size: 0.75rem; color: #00ffff; margin-bottom: 20px; opacity: 0.8; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #1a1a3a; padding-bottom: 10px;}
        
        .nav-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .mode-btn { 
            padding: 12px; 
            background: #0a0a1a; 
            border: 1px solid #445; 
            color: #888; 
            cursor: pointer; 
            border-radius: 6px; 
            font-weight: bold; 
            transition: 0.3s; 
            text-align: left; 
            font-size: 0.9rem; 
        }
        .mode-btn.active { 
            background: #ff00ff; 
            border-color: #fff; 
            color: #fff; 
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.5); 
        }

        .slider-wrap { margin: 15px 0; }
        label { display: flex; justify-content: space-between; font-size: 0.85rem; color: #00ffff; margin-bottom: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        label b { color: #fff; font-family: 'Courier New', monospace; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #ff00ff; height: 6px; }
        
        #btn-step { 
            width: 100%; 
            padding: 14px; 
            background: #00ffff; 
            border: none; 
            color: #000; 
            cursor: pointer; 
            border-radius: 6px; 
            font-weight: 900; 
            transition: 0.2s; 
            margin-bottom: 15px; 
            letter-spacing: 1px; 
            display: none; 
            text-transform: uppercase;
        }
        #btn-step:active { transform: scale(0.96); background: #00cccc; }

        .legend { font-size: 0.75rem; color: #667; margin-top: 10px; border-top: 1px solid #1a1a3a; padding-top: 15px; line-height: 1.6; }
        .legend-row { display: flex; align-items: center; margin-bottom: 6px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 10px; flex-shrink: 0; }
    </style>
</head>
<body>

<div id="ui">
    <div class="header">Defect Engine</div>
    <div class="sub-header">Unified Crystalline Module</div>
    
    <div class="nav-group">
        <button id="btn-screw" class="mode-btn active" onclick="setMode('screw')">1. Screw Dislocation (3D)</button>
        <button id="btn-edge" class="mode-btn" onclick="setMode('edge')">2. Edge Dislocation (Square)</button>
        <button id="btn-fault" class="mode-btn" onclick="setMode('fault')">3. Stacking Fault (Top-Down)</button>
    </div>

    <button id="btn-step" onclick="stepSlip()">▶ Trigger Slip Step</button>

    <div class="slider-wrap" id="wrap-screw">
        <label>Burgers Vector (b) <b id="val-b">0.50</b></label>
        <input type="range" id="in-b" min="0" max="2" step="0.01" value="0.5" oninput="updateParams()">
    </div>

    <div class="slider-wrap" id="wrap-fault" style="display:none;">
        <label>Fault Line Position <b id="val-w">0.0</b></label>
        <input type="range" id="in-w" min="-4" max="4" step="0.2" value="0.0" oninput="updateParams()">
    </div>

    <div class="slider-wrap">
        <label>Bulk Opacity <b id="val-o">0.60</b></label>
        <input type="range" id="in-o" min="0.05" max="1" step="0.01" value="0.6" oninput="updateParams()">
    </div>

    <div class="legend">
        <div class="legend-row"><div class="dot" style="background: #00ffff; box-shadow: 0 0 8px #00ffff;"></div> <span id="leg-1">Core Strain</span></div>
        <div class="legend-row"><div class="dot" style="background: #ff00ff;"></div> <span id="leg-2">Transition Zone</span></div>
        <div class="legend-row"><div class="dot" style="background: rgba(255, 170, 0, 0.8);"></div> <span id="leg-3">Relaxed Bulk</span></div>
    </div>
</div>

<script>
    /** * DEFECT ENGINE MASTER SCRIPT
     * Integrates 3D Screw (Helical), 2D Edge (Square/Slip), and Planar Fault (Ribbon)
     */
    
    let scene, camera, renderer, controls, instancedMesh, headlamp;
    
    // Simulation Parameters
    let currentMode = 'screw';
    let b = 0.5, bulkOpacity = 0.6, faultX = 0.0, slipPos = 4;
    
    // Matrix Optimization Objects
    const dummy = new THREE.Object3D();
    const color = new THREE.Color();
    const maxAtoms = 2500;

    init();

    function init() {
        // --- SCENE SETUP ---
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(15, 15, 15);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- TRACKBALL CONTROLS ---
        controls = new THREE.TrackballControls(camera, renderer.domElement);
        controls.rotateSpeed = 3.0;
        controls.dynamicDampingFactor = 0.1;

        // --- INDUSTRIAL LIGHTING ---
        scene.add(new THREE.HemisphereLight(0x00ffff, 0xff00ff, 0.2));
        headlamp = new THREE.PointLight(0xffffff, 1.5, 100);
        scene.add(headlamp);
        
        const spot = new THREE.SpotLight(0xffffff, 1);
        spot.position.set(0, 25, 0);
        scene.add(spot);

        // --- ATOM GEOMETRY & MATERIAL ---
        const geometry = new THREE.SphereGeometry(0.24, 32, 32);
        const material = new THREE.MeshPhongMaterial({ 
            transparent: true, 
            opacity: bulkOpacity,
            shininess: 100,
            specular: 0x444444
        });

        instancedMesh = new THREE.InstancedMesh(geometry, material, maxAtoms);
        scene.add(instancedMesh);

        // Initialization
        setMode('screw');
        animate();
    }

    /**
     * UI NAVIGATION & CAMERA AUTOMATION
     */
    function setMode(m) {
        currentMode = m;
        
        // UI Button State
        document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('btn-' + m).classList.add('active');
        
        // Show/Hide contextual controls
        document.getElementById('wrap-screw').style.display = (m === 'screw') ? 'block' : 'none';
        document.getElementById('wrap-fault').style.display = (m === 'fault') ? 'block' : 'none';
        document.getElementById('btn-step').style.display = (m === 'edge') ? 'block' : 'none';

        // Contextual Camera Reset
        if (m === 'screw') {
            camera.position.set(15, 15, 15);
            controls.target.set(0,0,0);
            updateLegendLabels('Screw Core (Cyan)', 'Shear Strain (Magenta)', 'Relaxed Bulk (Yellow)');
        } else if (m === 'edge') {
            camera.position.set(0, 0, 18);
            controls.target.set(0,0,0);
            updateLegendLabels('Extra Half-Plane (Cyan)', 'Dilation/Compression (Magenta)', 'Bulk Lattice (Yellow)');
        } else if (m === 'fault') {
            camera.position.set(0, 20, 0.1); // Top-down perspective
            controls.target.set(0,0,0);
            updateLegendLabels('A-Fault Layer (Cyan)', 'Valid C-Sites (Yellow)', '<span style="color:#ff0000">Mismatch Ribbon (Red)</span>');
        }
        
        updateLattice();
    }

    function updateLegendLabels(l1, l2, l3) {
        document.getElementById('leg-1').innerHTML = l1;
        document.getElementById('leg-2').innerHTML = l2;
        document.getElementById('leg-3').innerHTML = l3;
    }

    function updateParams() {
        b = parseFloat(document.getElementById('in-b').value);
        faultX = parseFloat(document.getElementById('in-w').value);
        bulkOpacity = parseFloat(document.getElementById('in-o').value);
        
        document.getElementById('val-b').innerText = b.toFixed(2);
        document.getElementById('val-w').innerText = faultX.toFixed(1);
        document.getElementById('val-o').innerText = bulkOpacity.toFixed(2);
        
        instancedMesh.material.opacity = bulkOpacity;
        updateLattice();
    }

    function stepSlip() {
        slipPos = (slipPos + 1) % 12; 
        updateLattice();
    }

    /**
     * CORE PHYSICS: LATTICE GENERATION
     */
    function updateLattice() {
        let idx = 0;

        if (currentMode === 'screw') {
            // --- 3D HELICAL SCREW DISLOCATION ---
            const size = 8;
            const offset = (size - 1) / 2;

            for (let x = 0; x < size; x++) {
                for (let y = 0; y < size; y++) {
                    for (let z = 0; z < size; z++) {
                        const posX = x - offset;
                        const posY = y - offset;
                        const posZ = z - offset;

                        // Calculate screw displacement (u_z)
                        const theta = Math.atan2(posY, posX);
                        const uz = (b / (2 * Math.PI)) * theta;
                        
                        dummy.position.set(posX, posY, posZ + uz);
                        dummy.updateMatrix();
                        instancedMesh.setMatrixAt(idx, dummy.matrix);

                        // Strain coloring
                        const rSq = posX*posX + posY*posY;
                        const strain = Math.abs(b) / (rSq + 0.5);
                        
                        if (strain > 0.4) color.setHSL(0.5, 1.0, 0.5 + (strain * 0.1)); // Cyan Core
                        else if (strain > 0.15) color.setHSL(0.85, 1.0, 0.5); // Magenta Transition
                        else color.setHSL(0.12, 1.0, 0.4); // Yellow Bulk
                        
                        instancedMesh.setColorAt(idx++, color);
                    }
                }
            }

        } else if (currentMode === 'edge') {
            // --- 2D SQUARE ARRAY EDGE SLIP ---
            const rows = 10, cols = 14;
            const offsetX = (cols-1)/2, offsetY = (rows-1)/2;

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    let pX = c - offsetX;
                    let pY = r - offsetY;
                    
                    // The Slip Plane logic (Top half migrates)
                    if (r >= 5 && c >= slipPos) {
                        pX += 1.0; // The Step forming at the right
                    }

                    // To show the 'extra half-plane' correctly in a square array, 
                    // we create a slight compression/dilation centered at slipPos.
                    if (r >= 5) {
                        // Top half: Slightly shifted to accommodate the extra plane
                        if (c < slipPos) pX += 0.2; 
                        if (c > slipPos) pX -= 0.2;
                    } else {
                        // Bottom half: Opposite shift to represent strain
                        if (c < slipPos) pX -= 0.2;
                        if (c > slipPos) pX += 0.2;
                    }

                    dummy.position.set(pX, pY, 0);
                    dummy.updateMatrix();
                    instancedMesh.setMatrixAt(idx, dummy.matrix);

                    // Logic-based coloring
                    const isExtraPlane = (r >= 5 && c === slipPos);
                    const isCore = (Math.abs(c - slipPos) < 1.1);
                    
                    if (isExtraPlane) color.setHex(0x00ffff); // Cyan Extra Plane
                    else if (isCore) color.setHex(0xff00ff); // Magenta Strain Field
                    else color.setHex(0xffaa00); // Yellow/Orange Bulk
                    
                    instancedMesh.setColorAt(idx++, color);
                }
            }

        } else if (currentMode === 'fault') {
            // --- TOP-DOWN STACKING FAULT (Partial Dislocation) ---
            const rows = 12, cols = 12;
            const spX = 1.0, spY = 0.866; // Hexagonal spacing
            
            // Layer A (Z = -1)
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    let ax = c * spX + (r % 2) * 0.5 - 6;
                    let ay = r * spY - 5;
                    dummy.position.set(ax, ay, -1);
                    dummy.updateMatrix();
                    instancedMesh.setMatrixAt(idx, dummy.matrix);
                    color.setHex(0x004444); // Bulk Dim Cyan
                    instancedMesh.setColorAt(idx++, color);
                }
            }

            // Layer B (Z = 0)
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    let bx = (c * spX + (r % 2) * 0.5 - 6) + 0.5;
                    let by = (r * spY - 5) + 0.288;
                    dummy.position.set(bx, by, 0);
                    dummy.updateMatrix();
                    instancedMesh.setMatrixAt(idx, dummy.matrix);
                    color.setHex(0x440044); // Bulk Dim Magenta
                    instancedMesh.setColorAt(idx++, color);
                }
            }

            // Layer 3 (Z = 1): The Fault Layer (Split C and A-fault)
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    let ax = c * spX + (r % 2) * 0.5 - 6;
                    let ay = r * spY - 5;
                    let cx = ax - 0.5; // Theoretical C site offset
                    let cy = ay - 0.288;
                    
                    const isFault = cx > faultX;
                    const isRibbon = Math.abs(cx - faultX) < 0.4;

                    if (isFault) {
                        dummy.position.set(ax, ay, 1); // Faulted: Atoms sit directly on A sites
                        color.setHex(0x00ffff); // Cyan
                    } else {
                        dummy.position.set(cx, cy, 1); // Valid: Atoms sit on C sites
                        color.setHex(0xffff00); // Yellow
                    }

                    if (isRibbon) color.setHex(0xff0000); // The Red Mismatch Ribbon

                    dummy.updateMatrix();
                    instancedMesh.setMatrixAt(idx, dummy.matrix);
                    instancedMesh.setColorAt(idx++, color);
                }
            }
        }

        instancedMesh.count = idx;
        instancedMesh.instanceMatrix.needsUpdate = true;
        if(instancedMesh.instanceColor) instancedMesh.instanceColor.needsUpdate = true;
    }

    /**
     * RENDER LOOP & ANIMATION
     */
    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        
        // Sync headlamp to camera for neon highlights
        headlamp.position.copy(camera.position);

        // Ribbon Pulsing Effect in Stacking Fault Mode
        if (currentMode === 'fault') {
            const time = Date.now() * 0.005;
            const glow = 0.5 + Math.sin(time) * 0.3;
            
            // Re-apply pulsing color to the ribbon (indices for Layer 3)
            const baseIdx = 12 * 12 * 2; 
            for (let i = 0; i < 144; i++) {
                const idx = baseIdx + i;
                const r = Math.floor(i / 12);
                const c = i % 12;
                let cx = (c * 1.0 + (r % 2) * 0.5 - 6) - 0.5;
                
                if (Math.abs(cx - faultX) < 0.4) {
                    color.setRGB(1, glow * 0.2, glow * 0.2); // Pulse red
                    instancedMesh.setColorAt(idx, color);
                }
            }
            instancedMesh.instanceColor.needsUpdate = true;
        }

        renderer.render(scene, camera);
    }

    // Resize Handling
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        controls.handleResize();
    });

</script>
</body>
</html>
